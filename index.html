<script>
// Capture automatic install prompt if browser supports it
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  window._pwaPrompt=e;
  document.querySelectorAll('.pwa-install-btn').forEach(function(b){b.style.display='block';});
});
window.addEventListener('appinstalled', function(){
  window._pwaPrompt=null;
  document.querySelectorAll('.pwa-install-btn').forEach(function(b){b.style.display='none';});
  localStorage.setItem('pwa-installed','1');
});

// Show Android install banner if not already installed
(function(){
  if(localStorage.getItem('pwa-installed')) return;
  const isAndroid=/Android/i.test(navigator.userAgent);
  const isChrome=/Chrome/i.test(navigator.userAgent)&&!/EdgA|OPR|SamsungBrowser/i.test(navigator.userAgent);
  if(!isAndroid&&!isChrome) return;
  // Show banner after short delay
  setTimeout(function(){
    if(window._pwaPrompt) return; // automatic prompt available, no need for banner
    if(document.getElementById('android-install-banner')) return;
    const banner=document.createElement('div');
    banner.id='android-install-banner';
    banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#1a2540;border-top:1px solid rgba(255,200,0,.3);padding:.7rem 1rem;display:flex;align-items:center;gap:.7rem;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,.4)';

// Password hashing — uses Web Crypto API (SHA-256 + salt) when available,
// falls back to djb2 for older browsers. Async but handles gracefully.
function hashPwd(s){
  // Synchronous fallback (djb2) for compatibility
  let h=5381;
  for(let i=0;i<s.length;i++) h=((h<<5)+h)^s.charCodeAt(i);
  return (h>>>0).toString(36);
}

// Stronger async hash used for NEW registrations (SHA-256 via Web Crypto)
async function hashPwdStrong(s){
  try{
    const salt="quiniela2026_fifa";
    const data=new TextEncoder().encode(salt+s);
    const hashBuf=await crypto.subtle.digest("SHA-256",data);
    const hashArr=Array.from(new Uint8Array(hashBuf));
    return "sha256:"+hashArr.map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(e){
    return hashPwd(s); // fallback
  }
}

function verifyPwd(input, stored){
  // Supports both old djb2 hashes and new SHA-256 hashes
  if(stored&&stored.startsWith("sha256:")){
    // For SHA-256 we need async — handled in doLogin
    return null; // signal: use async verification
  }
  return hashPwd(input)===stored;
}

function calcStandings(gk,scores){
  const t=GROUPS[gk],s={};
  t.forEach(x=>{s[x]={pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0}});
  MATCHES.filter(m=>m.g===gk).forEach(m=>{
    const sc=scores[m.id];
    if(!sc||sc.h===""||sc.a==="")return;
    const h=parseInt(sc.h),a=parseInt(sc.a);
    if(isNaN(h)||isNaN(a))return;
    s[m.h].pj++;s[m.a].pj++;
    s[m.h].gf+=h;s[m.h].gc+=a;s[m.h].dg+=h-a;
    s[m.a].gf+=a;s[m.a].gc+=h;s[m.a].dg+=a-h;
    if(h>a){s[m.h].pts+=3;s[m.h].pg++;s[m.a].pp++}
    else if(h<a){s[m.a].pts+=3;s[m.a].pg++;s[m.h].pp++}
    else{s[m.h].pts++;s[m.h].pe++;s[m.a].pts++;s[m.a].pe++}
  });
  return t.map(x=>({n:x,...s[x]})).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
}

function scoreGroups(pred,actual){
  let p=0;
  MATCHES.forEach(m=>{
    const pr=pred[m.id],ac=actual[m.id];
    if(!pr||!ac)return;
    const ph=parseInt(pr.h),pa=parseInt(pr.a),ah=parseInt(ac.h),aa=parseInt(ac.a);
    if(isNaN(ph)||isNaN(pa)||isNaN(ah)||isNaN(aa))return;
    if(ph===ah&&pa===aa){p+=5;return}
    const pw=ph>pa?"h":pa>ph?"a":"d",aw=ah>aa?"h":aa>ah?"a":"d";
    if(pw===aw)p+=3;
  });
  return p;
}

// Build KO bracket from group results + picks
function buildBracket(groups,ko){
  const std={};
  Object.keys(GROUPS).forEach(g=>{std[g]=calcStandings(g,groups)});
  // The 8 R32 match IDs that have a 3rd-place slot
  const THIRD_SLOTS=[1,4,6,7,8,9,12,14];

  // Auto-assign thirds using FIFA Annex C lookup table
  const allThirds=Object.keys(GROUPS).map(g=>{
    const s=std[g];return s&&s[2]?{g,team:s[2].n,pts:s[2].pts,dg:s[2].dg,gf:s[2].gf}:null;
  }).filter(Boolean).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
  const top8=allThirds.slice(0,8);
  const top8key=top8.map(t=>t.g).sort().join("");
  const thirdsMap=(top8.length>=8&&THIRDS_TABLE[top8key])||{};
  const thirdTeam={};top8.forEach(t=>{thirdTeam[t.g]=t.team;});

  const slot=(s,matchId)=>{
    if(s.t==="1")return std[s.g]?.[0]?.n||null;
    if(s.t==="2")return std[s.g]?.[1]?.n||null;
    if(s.t==="3"){
      if(thirdsMap[matchId]) return thirdTeam[thirdsMap[matchId]]||null;
      return ko.third?.[matchId]||null; // fallback to manual picks
    }
    return null;
  };
  const R32D=[
    {id:0,h:{t:"2",g:"A"},a:{t:"2",g:"B"}},{id:1,h:{t:"1",g:"E"},a:{t:"3"}},
    {id:2,h:{t:"1",g:"F"},a:{t:"2",g:"C"}},{id:3,h:{t:"1",g:"C"},a:{t:"2",g:"F"}},
    {id:4,h:{t:"1",g:"I"},a:{t:"3"}},{id:5,h:{t:"2",g:"E"},a:{t:"2",g:"I"}},
    {id:6,h:{t:"1",g:"A"},a:{t:"3"}},{id:7,h:{t:"1",g:"L"},a:{t:"3"}},
    {id:8,h:{t:"1",g:"D"},a:{t:"3"}},{id:9,h:{t:"1",g:"G"},a:{t:"3"}},
    {id:10,h:{t:"2",g:"K"},a:{t:"2",g:"L"}},{id:11,h:{t:"1",g:"H"},a:{t:"2",g:"J"}},
    {id:12,h:{t:"1",g:"B"},a:{t:"3"}},{id:13,h:{t:"1",g:"J"},a:{t:"2",g:"H"}},
    {id:14,h:{t:"1",g:"K"},a:{t:"3"}},{id:15,h:{t:"2",g:"D"},a:{t:"2",g:"G"}}
  ];

  // Build label for each slot: "1°E", "2°C", "3°?" etc.
  const slotLabel=(s,matchId)=>{
    if(s.t==="1") return "1°"+s.g;
    if(s.t==="2") return "2°"+s.g;
    if(s.t==="3"){
      if(thirdsMap[matchId]){
        // Find rank of this third among all top8
        const rank=top8.findIndex(t=>t.g===thirdsMap[matchId])+1;
        return "3°"+thirdsMap[matchId]+(rank>0?" #"+rank:"");
      }
      return "3°?";
    }
    return "";
  };

  const r32=R32D.map(m=>({
    id:m.id,
    h:slot(m.h,m.id),
    a:slot(m.a,m.id),
    hLbl:slotLabel(m.h,m.id),
    aLbl:slotLabel(m.a,m.id),
    isThird:m.h.t==="3"||m.a.t==="3",
    thirdSide:m.h.t==="3"?"h":m.a.t==="3"?"a":null
  }));
  // ── R16: only propagate team if they actually won their R32 match ──
  // r32w[i] = ko.r32[i] but validate: the picked winner must be one of the two R32 teams
  const r32wValidated=Array.from({length:16},(_,i)=>{
    const picked=ko.r32?.[i]||null;
    if(!picked) return null;
    const m=r32[i];
    // winner must be one of the two actual teams in that R32 match
    if(m&&(picked===m.h||picked===m.a)) return picked;
    return null; // stale pick — team no longer in this slot
  });

  // ── OFFICIAL FIFA R16 PAIRINGS (from FIFA match schedule) ──
  // M89 = W74 vs W77  →  r32w[1] vs r32w[4]
  // M90 = W73 vs W75  →  r32w[0] vs r32w[2]
  // M91 = W76 vs W78  →  r32w[3] vs r32w[5]
  // M92 = W79 vs W80  →  r32w[6] vs r32w[7]
  // M93 = W83 vs W84  →  r32w[10] vs r32w[11]
  // M94 = W81 vs W82  →  r32w[8]  vs r32w[9]
  // M95 = W86 vs W88  →  r32w[13] vs r32w[15]
  // M96 = W85 vs W87  →  r32w[12] vs r32w[14]
  const r32w=r32wValidated;
  const r16=[
    {id:0, h:r32w[1], a:r32w[4]},   // M89: W74 vs W77
    {id:1, h:r32w[0], a:r32w[2]},   // M90: W73 vs W75
    {id:2, h:r32w[3], a:r32w[5]},   // M91: W76 vs W78
    {id:3, h:r32w[6], a:r32w[7]},   // M92: W79 vs W80
    {id:4, h:r32w[10],a:r32w[11]},  // M93: W83 vs W84
    {id:5, h:r32w[8], a:r32w[9]},   // M94: W81 vs W82
    {id:6, h:r32w[13],a:r32w[15]},  // M95: W86 vs W88
    {id:7, h:r32w[12],a:r32w[14]},  // M96: W85 vs W87
  ];
  const r16w=Array.from({length:8},(_,i)=>{
    const picked=ko.r16?.[i]||null;
    if(!picked) return null;
    const m=r16[i];
    if(m&&(picked===m.h||picked===m.a)) return picked;
    return null;
  });

  // ── OFFICIAL FIFA QF PAIRINGS ──
  // M97 = W89 vs W90  →  r16w[0] vs r16w[1]
  // M98 = W91 vs W92  →  r16w[2] vs r16w[3]
  // M99 = W93 vs W94  →  r16w[4] vs r16w[5]
  // M100= W95 vs W96  →  r16w[6] vs r16w[7]
  const qf=[
    {id:0, h:r16w[0], a:r16w[1]},  // M97: W89 vs W90
    {id:1, h:r16w[2], a:r16w[3]},  // M98: W91 vs W92
    {id:2, h:r16w[4], a:r16w[5]},  // M99: W93 vs W94
    {id:3, h:r16w[6], a:r16w[7]},  // M100: W95 vs W96
  ];
  const qfw=Array.from({length:4},(_,i)=>{
    const picked=ko.qf?.[i]||null;
    if(!picked) return null;
    const m=qf[i];
    if(m&&(picked===m.h||picked===m.a)) return picked;
    return null;
  });

  // ── OFFICIAL FIFA SF PAIRINGS ──
  // qf[0]=M97(LEFT), qf[1]=M99(RIGHT), qf[2]=M98(LEFT), qf[3]=M100(RIGHT)
  // LEFT SF M101 = W97 vs W98 = qfw[0] vs qfw[2]
  // RIGHT SF M102 = W99 vs W100 = qfw[1] vs qfw[3]
  const sf=[
    {id:0, h:qfw[0], a:qfw[2]},  // M101: W97 vs W98 → Dallas (LEFT SF)
    {id:1, h:qfw[1], a:qfw[3]},  // M102: W99 vs W100 → Atlanta (RIGHT SF)
  ];
  const sfw=Array.from({length:2},(_,i)=>{
    const picked=ko.sf?.[i]||null;
    if(!picked) return null;
    const m=sf[i];
    if(m&&(picked===m.h||picked===m.a)) return picked;
    return null;
  });
  const fin={id:0,h:sfw[0],a:sfw[1]};
  const champion=ko.final?.[0]||null;
  const sf0L=sfw[0]?(sf[0].h===sfw[0]?sf[0].a:sf[0].h):null;
  const sf1L=sfw[1]?(sf[1].h===sfw[1]?sf[1].a:sf[1].h):null;
  const f3={id:0,h:sf0L,a:sf1L};
  return {r32,r16,qf,sf,fin,f3,champion,
    r32w,r16w,qfw,sfw,finw:ko.final||{},f3w:ko.f3||{},
    thirdPicks:ko.third||{},
    thirdMatchIds:[1,4,6,7,8,9,12,14],
    top8thirds:top8,
    allThirds,
    thirdsMap};
}

// ── BRACKET SVG ───────────────────────────────────────
function adminBracketSVG(){
  // Build bracket from real actuals (not a participant's predictions)
  const realGroups={};
  MATCHES.forEach(m=>{
    const ac=STATE.actuals[m.id];
    if(ac&&ac.h!==""&&ac.a!=="") realGroups[m.id]=ac;
  });
  const aKO=STATE.actuals._ko||{};
  // Map _ko structure to bracket ko format
  const ko={
    r32:  aKO.r32||{},
    r16:  aKO.r16||{},
    qf:   aKO.qf||{},
    sf:   aKO.sf||{},
    final:aKO.final||{},
    f3:   aKO.f3||{},
  };
  return bracketSVG("admin",{groups:realGroups,ko});
}

function bracketSVG(pid,pred){
  const ko=pred.ko||{};
  const B=buildBracket(pred.groups||{},ko);
  const isAdmin=(pid==="admin");
  const readonly=(pid==="view");

  // Dimensions
  const TW=70,TH=26,GAP=5,RGAP=40;
  const colX=[0,TW+RGAP,(TW+RGAP)*2,(TW+RGAP)*3,(TW+RGAP)*4,(TW+RGAP)*5,(TW+RGAP)*6];
  // R32(left8), R16(left4), QF(left2), SF(left1), Final/F3, SF(right1), QF(right2), R16(right4), R32(right8)
  const cols=9;
  const svgW=(TW+RGAP)*cols+TW+20;
  
  // How many match slots per column (spacing)
  // R32: 8 matches left, 8 right → pitch 16 slots total height
  const pitchH=(TH+GAP)*16+GAP*7; // total svg height
  const svgH=pitchH+40; // +40 for labels
  
  // Y center of each match in each column
  function matchY(col,idx,total){
    // distribute `total` matches evenly over svgH-40
    const avail=svgH-40;
    const step=avail/total;
    return 30+idx*step+step/2-(TH+GAP)/2;
  }

  let svg=`<svg class="br-svg" width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<rect width="${svgW}" height="${svgH}" fill="none"/>`;

  // Round labels
  const rLabels=["R32","OCTAVOS","CUARTOS","SEMIS","FINAL","SEMIS","CUARTOS","OCTAVOS","R32"];
  const cxs=[0,1,2,3,4,5,6,7,8].map(i=>10+i*(TW+RGAP));
  rLabels.forEach((l,i)=>{
    svg+=`<text class="br-rlbl" x="${cxs[i]+TW/2}" y="18" text-anchor="middle">${l}</text>`;
  });

  // Draw a match box
  function drawMatch(rid,mid,x,y,h,a,winner,hLbl,aLbl){
    const isWin_h=winner===h&&h;
    const isWin_a=winner===a&&a;
    const hCls=h?(isWin_h?"win":""):("tbd");
    const aCls=a?(isWin_a?"win":""):("tbd");
    const hTxt=h?trunc(h,9):"TBD";
    const aTxt=a?trunc(a,9):"TBD";
    const clickH=(!readonly&&h)?`onclick="${isAdmin?`pickAdminKO('${rid}',${mid},'${h}')`:`pickBracket('${pid}','${rid}',${mid},'${h}')`}"`:""
    const clickA=(!readonly&&a)?`onclick="${isAdmin?`pickAdminKO('${rid}',${mid},'${a}')`:`pickBracket('${pid}','${rid}',${mid},'${a}')`}"`:""
    let s="";
    const cx=x+TW/2; // horizontal center
    // Home
    s+=`<g class="br-team ${hCls}" ${clickH}>
      <rect x="${x}" y="${y}" width="${TW}" height="${TH}" rx="3"/>
      ${hLbl&&rid==="r32"
        ? `<text x="${cx}" y="${y+TH/2-1}" font-size="9.5" text-anchor="middle">${hTxt}${isWin_h?" ✓":""}</text>
           <text x="${cx}" y="${y+TH/2+8}" font-size="6.5" text-anchor="middle" fill="rgba(255,255,255,.38)">${hLbl}</text>`
        : `<text x="${cx}" y="${y+TH/2+3.5}" font-size="9.5" text-anchor="middle">${hTxt}${isWin_h?" ✓":""}</text>`
      }
    </g>`;
    // Away
    s+=`<g class="br-team ${aCls}" ${clickA}>
      <rect x="${x}" y="${y+TH+2}" width="${TW}" height="${TH}" rx="3"/>
      ${aLbl&&rid==="r32"
        ? `<text x="${cx}" y="${y+TH+2+TH/2-1}" font-size="9.5" text-anchor="middle">${aTxt}${isWin_a?" ✓":""}</text>
           <text x="${cx}" y="${y+TH+2+TH/2+8}" font-size="6.5" text-anchor="middle" fill="rgba(255,255,255,.38)">${aLbl}</text>`
        : `<text x="${cx}" y="${y+TH+2+TH/2+3.5}" font-size="9.5" text-anchor="middle">${aTxt}${isWin_a?" ✓":""}</text>`
      }
    </g>`;
    // divider
    s+=`<line x1="${x+1}" y1="${y+TH+1}" x2="${x+TW-1}" y2="${y+TH+1}" stroke="rgba(255,255,255,.1)" stroke-width="1"/>`;
    return s;
  }

  // connector line from match output to next round input
  function connector(x1,y1,x2,y2){
    const mx=(x1+x2)/2;
    return `<path class="br-line" d="M${x1},${y1} H${mx} V${y2} H${x2}"/>`;
  }

  const matchH=TH*2+2; // full height of one match card

  // Visual order from official FIFA bracket image (top to bottom):
  // LEFT: M74,M77, M73,M75, M83,M84, M81,M82
  const leftR32Order=[1,4,0,2,10,11,8,9];
  const leftR32Vis=leftR32Order.map(i=>B.r32[i]);

  // RIGHT: M76,M78, M79,M80, M86,M88, M85,M87
  const rightR32Order=[3,5,6,7,13,15,12,14];
  const rightR32Vis=rightR32Order.map(i=>B.r32[i]);

  // R16 visual order matches adjacent R32 pairs:
  // LEFT R16 (top to bottom): M89(id0),M90(id1),M93(id4),M94(id5)
  // RIGHT R16 (top to bottom): M91(id2),M92(id3),M95(id6),M96(id7)
  const leftR16=[B.r16[0],B.r16[1],B.r16[4],B.r16[5]];
  const rightR16=[B.r16[2],B.r16[3],B.r16[6],B.r16[7]];

  // QF visual order:
  // LEFT QF (top to bottom): M97(id0) from M89+M90, M99(id2) from M93+M94 -- wait
  // M97 = W89 vs W90 → feeds from left R16 rows 0,1
  // M98 = W93 vs W94 → feeds from left R16 rows 2,3 (M93,M94 are left R16 rows 2,3)
  // But M98 in QF is officially W91 vs W92... let me recheck
  // QF M97=W89vsW90, M98=W93vsW94 (from regs: M98=W93vsW94? No! M98=W91vsW92)
  // Regs: M97=W89vsW90, M98=W93vsW94? No: M97=W89vsW90(id0vsid1), M98=W93vsW94? 
  // From regs: M98 = W93(id4) vs W94(id5) -- but regs say M98=W91vsW92(id2vsid3)
  // Let me re-read: QF: M97=W89vsW90, M98=W93vsW94? 
  // Official: M97=W89vsW90(r16[0]vsr16[1]), M99=W91vsW92(r16[2]vsr16[3])
  //           M98=W93vsW94(r16[4]vsr16[5]), M100=W95vsW96(r16[6]vsr16[7])
  // So left QF visual (feeds left SF M101=W97vsW98): M97(id0), M98(id2? No id1?)
  // M97 feeds from leftR16[0,1]=M89,M90 → visual rows 0,1 of left R16
  // M98: reg says W93vsW94=r16[4]vsr16[5] → leftR16 rows 2,3 ✓
  // But wait - QF array: qf[0]=M97(r16w[0]vsR16w[1]), qf[1]=M98(r16w[2]vsR16w[3])
  // r16w[2]=M91winner, r16w[3]=M92winner → these are RIGHT side R16!
  // So M98 uses RIGHT R16 winners → M98 is on RIGHT side visually
  // Let me re-examine SF: M101=W97vsW98 → must be on same SF side
  // Image shows trophy in center with SF feeding into it from both sides
  // Left SF feeds from: left half of bracket
  // Left half visible rows in image: M74,M77,M73,M75 → M89,M90 → M97
  //                                  M76,M78,M79,M80 → M91,M92 → M99
  // M101 = W97 vs W99? No! M101=W97vsW98 per regs
  // This is getting complex. Use the EXACT reg order for QF:
  // qf[0]=M97, qf[1]=M98, qf[2]=M99, qf[3]=M100
  // Left visual QF must show matches whose winners meet in same SF
  // M101(SF1) = W97 vs W98 → qf[0] and qf[1] meet → show on same side
  // M102(SF2) = W99 vs W100 → qf[2] and qf[3] meet → show on same side
  const leftQF=[B.qf[0],B.qf[2]];   // M97(W89vsW90), M99(W93vsW94) → both feed left SF side
  const rightQF=[B.qf[1],B.qf[3]];  // M98(W91vsW92), M100(W95vsW96) → both feed right SF side

  const leftData=[
    {rid:"r32",matches:leftR32Vis, winners:B.r32w, n:8,col:0},
    {rid:"r16",matches:leftR16,    winners:B.r16w, n:4,col:1},
    {rid:"qf", matches:leftQF,     winners:B.qfw,  n:2,col:2},
    {rid:"sf", matches:B.sf.slice(0,1), winners:B.sfw, n:1,col:3},
  ];
  const rightData=[
    {rid:"r32",matches:rightR32Vis,winners:B.r32w, n:8,col:8},
    {rid:"r16",matches:rightR16,   winners:B.r16w, n:4,col:7},
    {rid:"qf", matches:rightQF,    winners:B.qfw,  n:2,col:6},
    {rid:"sf", matches:B.sf.slice(1,2), winners:B.sfw, n:1,col:5},
  ];

  function renderSide(data){
    data.forEach(({rid,matches,winners,n,col})=>{
      const x=cxs[col];
      matches.forEach((m,i)=>{
        const y=matchY(col,i,n);
        const w=winners[m.id]||null;
        svg+=drawMatch(rid,m.id,x,y,m.h,m.a,w,m.hLbl||"",m.aLbl||"");
      });
    });
  }



  renderSide(leftData);
  renderSide(rightData);
  // Straight connectors: R32→R16→QF→SF each side feeds its own SF
  [[0,1],[1,2],[2,3]].forEach(([ci,ni])=>{
    // LEFT side
    const lc=leftData[ci],ln=leftData[ni];
    for(let i=0;i<lc.n;i+=2){
      const y0=matchY(lc.col,i,lc.n)+matchH-TH;
      const y1=matchY(lc.col,i+1,lc.n)+matchH-TH;
      const yn=matchY(ln.col,i/2,ln.n)+matchH/2;
      const x0=cxs[lc.col]+TW, x1=cxs[ln.col], mx=(x0+x1)/2;
      svg+=`<polyline class="br-line" points="${x0},${y0} ${mx},${y0} ${mx},${yn} ${x1},${yn}"/>`;
      svg+=`<polyline class="br-line" points="${x0},${y1} ${mx},${y1} ${mx},${yn} ${x1},${yn}"/>`;
    }
    // RIGHT side
    const rc=rightData[ci],rn=rightData[ni];
    for(let i=0;i<rc.n;i+=2){
      const y0=matchY(9-rc.col-1,i,rc.n)+matchH-TH;
      const y1=matchY(9-rc.col-1,i+1,rc.n)+matchH-TH;
      const yn=matchY(9-rn.col-1,i/2,rn.n)+matchH/2;
      const x0=cxs[rc.col], x1=cxs[rn.col]+TW, mx=(x0+x1)/2;

function doRegister(){
  const name=val("rn"),email=val("re"),qname=val("rq");
  const pwd=document.getElementById("rp")?.value||"";
  const pwd2=document.getElementById("rp2")?.value||"";
  let ok=true;
  if(!name){setErr("en","⚠ Ingresa tu nombre");ok=false}else setErr("en","");
  if(!email||!email.includes("@")){setErr("ee","⚠ Correo inválido");ok=false}else setErr("ee","");
  if(!qname){setErr("eq","⚠ Ponle nombre a tu quiniela");ok=false}else setErr("eq","");
  if(pwd.length<4){setErr("ep","⚠ Mínimo 4 caracteres");ok=false}else setErr("ep","");
  if(pwd!==pwd2){setErr("ep2","⚠ Las contraseñas no coinciden");ok=false}else setErr("ep2","");
  // Check if email already registered
  if(ok&&STATE.participants.find(p=>p.email&&p.email.toLowerCase()===email.toLowerCase())){
    setErr("ee","⚠ Este correo ya tiene una quiniela registrada");ok=false;
  }
  if(!ok)return;
  const pid=uid();
  STATE.participants.push({id:pid,name,email:email.toLowerCase(),hidden:false});
  // Use strong SHA-256 hash for new registrations
  hashPwdStrong(pwd).then(function(hash){
    STATE.predictions[pid]={groups:{},ko:{},quinName:qname,pwdHash:hash,submitted:false};
    SESSION.pid=pid;
    go("predict",{pid});
    setTimeout(function(){ fbWriteParticipant(pid); },50);
  });
}

function doLogin(){
  const email=val("li-email").toLowerCase();
  const pwd=document.getElementById("li-pwd")?.value||"";
  setErr("li-eerr","");setErr("li-perr","");
  if(!email){setErr("li-eerr","⚠ Ingresa tu correo");return}
  if(!pwd){setErr("li-perr","⚠ Ingresa tu contraseña");return}
  const p=STATE.participants.find(x=>x.email&&x.email.toLowerCase()===email&&!x.hidden);
  if(!p){setErr("li-eerr","⚠ No encontramos una quiniela con ese correo");return}
  const pred=STATE.predictions[p.id]||{};
  const stored=pred.pwdHash;
  if(!stored){setErr("li-perr","⚠ Contraseña no configurada");return}

  function doNav(){
    SESSION.pid=p.id;
    if(!pred.submitted) go("predict",{pid:p.id});
    else go("myscore",{pid:p.id});
  }

  if(stored.startsWith("sha256:")){
    // New strong SHA-256 hash
    hashPwdStrong(pwd).then(function(hash){
      if(hash!==stored){setErr("li-perr","⚠ Contraseña incorrecta");return;}
      doNav();
    });
  } else {
    // Legacy djb2 — still works for existing participants
    if(hashPwd(pwd)!==stored){setErr("li-perr","⚠ Contraseña incorrecta");return;}
    doNav();
  }
}

function pgPredict(pid){
  // Security: require active session
  if(SESSION.pid!==pid){go("returning");return"";}
  const p=STATE.participants.find(x=>x.id===pid);
  if(!p){go("landing");return""}
  const pred=STATE.predictions[pid]||{groups:{},ko:{},quinName:"",submitted:false};
  if(!pred.groups) pred.groups={};
  if(!pred.ko) pred.ko={};
  const tab=ROUTE.subtab||"groups";
  const grp=ROUTE.grp||"A";
  const filled=MATCHES.filter(m=>{const s=(pred.groups||{})[m.id];return s&&s.h!==""&&s.a!=="";}).length;

  // ── Completeness check — detailed per section ──
  const ko=pred.ko||{};

  // Groups: all 72 matches
  const groupsDone = filled===MATCHES.length;
  const groupsMissing = MATCHES.length - filled;

  // R32: only the 8 non-third-place slots need picks (thirds are automatic)
  const nonThirdIds=[0,2,3,5,10,11,13,15];
  const r32RegPicks=nonThirdIds.filter(id=>(ko.r32||{})[id]).length;
  const r32RegDone = r32RegPicks>=8;

  // R16: 8 matches
  const r16Count=Object.keys(ko.r16||{}).length;
  const r16Done = r16Count>=8;

  // QF: 4 matches
  const qfCount=Object.keys(ko.qf||{}).length;
  const qfDone = qfCount>=4;

  // SF: 2 matches
  const sfCount=Object.keys(ko.sf||{}).length;
  const sfDone = sfCount>=2;

  // Final: 1 match
  const finalCount=Object.keys(ko.final||{}).length;
  const finalDone = finalCount>=1;

  // 3rd place match: 1
  const f3Count=Object.keys(ko.f3||{}).length;
  const f3Done = f3Count>=1;

function hoyTab(pid,pred){
  // DEV SIMULATION: force date to Jun 13 for testing (remove before launch)
  const _simDate=window._simDate||null;
  const now=_simDate?new Date(_simDate):new Date();
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const todayStr=months[now.getMonth()]+" "+now.getDate();
  const todayMatches=MATCHES.filter(m=>m.date===todayStr);

  if(todayMatches.length===0){
    const allDates=[...new Set(MATCHES.map(m=>m.date))];
    return `<div style="text-align:center;padding:1.5rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;margin:.5rem 0">
      <div style="font-size:2rem;margin-bottom:.5rem">📅</div>
      <div style="font-weight:700;font-size:.9rem;color:#ffc800;margin-bottom:.3rem">No hay partidos hoy</div>
      <div style="font-size:.75rem;color:#889">Hoy es ${todayStr}. Los partidos del Mundial son del ${allDates[0]} al ${allDates[allDates.length-1]}.</div>
    </div>`;
  }

  // ── Get all participants in same leagues as this user ──
  const myLeagues=STATE.leagues.filter(l=>l.memberIds.includes(pid));
  // Collect all league-mates (union of all leagues, excluding hidden)
  const leagueMateIds=[...new Set(
    myLeagues.flatMap(l=>l.memberIds)
      .filter(id=>{
        const p2=STATE.participants.find(x=>x.id===id);
        return !p2?.hidden && STATE.predictions[id]?.submitted;
      })
  )];
  const hasLeague=leagueMateIds.length>1;

  // ── Per-match consensus stats ──
  function matchStats(mid){
    if(!hasLeague) return null;
    const preds=leagueMateIds
      .map(id=>STATE.predictions[id]?.groups?.[mid])
      .filter(s=>s&&s.h!==""&&s.a!=="");
    if(preds.length===0) return null;
    const total=preds.length;

    // Count results: h=local wins, a=away wins, d=draw
    let hWins=0,aWins=0,draws=0;
    const scoreCount={};
    preds.forEach(s=>{
      const h=parseInt(s.h),a=parseInt(s.a);
      if(h>a) hWins++;
      else if(h<a) aWins++;
      else draws++;
      const key=s.h+"-"+s.a;
      scoreCount[key]=(scoreCount[key]||0)+1;
    });

    // Most common score
    const topScore=Object.entries(scoreCount).sort((a,b)=>b[1]-a[1])[0];
    const topScoreStr=topScore?topScore[0]:null;
    const topScoreCount=topScore?topScore[1]:0;
    const topScorePct=Math.round(topScoreCount/total*100);

    return {
      total,
      hPct:Math.round(hWins/total*100),
      dPct:Math.round(draws/total*100),
      aPct:Math.round(aWins/total*100),
      topScore:topScoreStr,
      topScorePct,
      topScoreCount,
    };
  }

  // ── Progress bar helper ──
  function pctBar(hPct,dPct,aPct,hTeam,aTeam){
    return `<div style="margin-top:.55rem">
      <div style="display:flex;border-radius:5px;overflow:hidden;height:6px;gap:1px">
        ${hPct>0?`<div style="background:#4de0a0;width:${hPct}%;transition:width .4s"></div>`:""}
        ${dPct>0?`<div style="background:#ffc800;width:${dPct}%;transition:width .4s"></div>`:""}
        ${aPct>0?`<div style="background:#88aaff;width:${aPct}%;transition:width .4s"></div>`:""}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:.25rem;font-size:.62rem;color:#889">
        <span style="color:#4de0a0">${f(hTeam)} ${hPct}%</span>
        <span style="color:#ffc800">Empate ${dPct}%</span>
        <span style="color:#88aaff">${aPct}% ${f(aTeam)}</span>
      </div>
    </div>`;
  }

  // ── Build match rows ──
  let dayPts=0;
  const matchRows=todayMatches.map(m=>{
    const pr=pred.groups?.[m.id];
    const ac=STATE.actuals?.[m.id];
    let pts=0, badge="", status="";

    if(pr&&ac&&pr.h!==""&&pr.a!==""&&ac.h!==""&&ac.a!==""){
      const ph=parseInt(pr.h),pa=parseInt(pr.a),ah=parseInt(ac.h),aa=parseInt(ac.a);
      if(ph===ah&&pa===aa){
        pts=5; badge=`<span style="background:#00c853;color:#000;border-radius:4px;padding:.1rem .4rem;font-size:.7rem;font-weight:700">+5 ⭐</span>`;
        status="exact";
      } else {
        const pw=ph>pa?"h":pa>ph?"a":"d", aw=ah>aa?"h":aa>ah?"a":"d";
        if(pw===aw){
          pts=3; badge=`<span style="background:#0080ff;color:#fff;border-radius:4px;padding:.1rem .4rem;font-size:.7rem;font-weight:700">+3</span>`;
          status="win";
        } else {
          badge=`<span style="background:rgba(255,100,100,.2);color:#ff8080;border-radius:4px;padding:.1rem .4rem;font-size:.7rem;font-weight:700">0</span>`;
          status="miss";
        }
      }
      dayPts+=pts;
    } else if(ac&&ac.h!==""&&ac.a!==""){
      badge=`<span style="color:#667;font-size:.7rem">Sin predicción</span>`;
    } else if(pr&&pr.h!==""&&pr.a!==""){
      badge=`<span style="color:#889;font-size:.7rem">Pendiente</span>`;
      status="pending";
    }

    const borderCol=status==="exact"?"rgba(0,200,83,.35)":status==="win"?"rgba(0,128,255,.35)":status==="miss"?"rgba(255,100,100,.2)":"rgba(255,255,255,.08)";
    const bgCol=status==="exact"?"rgba(0,200,83,.07)":status==="win"?"rgba(0,128,255,.06)":status==="miss"?"rgba(255,100,100,.05)":"rgba(255,255,255,.04)";

    const stats=matchStats(m.id);

    return `<div style="background:${bgCol};border:1px solid ${borderCol};border-radius:9px;padding:.6rem .75rem;margin:.3rem 0">

      <!-- Match header -->
      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.4rem;margin-bottom:.35rem">
        <div style="font-size:.78rem;font-weight:600">${f(m.h)} ${trunc(m.h,10)}</div>
        <div style="text-align:center">
          ${ac&&ac.h!==""
            ? "<div style=\"font-size:.95rem;font-weight:700;color:#eee\">"+ac.h+":"+ac.a+"</div><div style=\"font-size:.6rem;color:#667\">resultado</div>"
            : "<div style=\"font-size:.75rem;color:#556\">vs</div>"
          }
        </div>
        <div style="font-size:.78rem;font-weight:600;text-align:right">${trunc(m.a,10)} ${f(m.a)}</div>
      </div>

      <!-- My prediction + points -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:.4rem;padding-bottom:${stats?".45rem":".0rem"}">
        <div style="font-size:.72rem;color:#889">
          Mi predicción: <strong style="color:${pr&&pr.h!==""?"#eee":"#556"}">${pr&&pr.h!==""?pr.h+":"+pr.a:"—"}</strong>
        </div>
        <div>${badge}</div>
      </div>

      <!-- League consensus (only if in a league with submitted players) -->
      ${stats?`
      <div style="border-top:1px solid rgba(255,255,255,.07);padding-top:.45rem;margin-top:.0rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem">
          <span style="font-size:.65rem;color:#667;letter-spacing:.5px">CONSENSO DE TU LIGA (${stats.total} quinielas)</span>
          ${stats.topScore?`<span style="font-size:.65rem;background:rgba(255,200,0,.1);color:#ffc800;border:1px solid rgba(255,200,0,.2);border-radius:4px;padding:.1rem .4rem">
            Marcador más votado: <strong>${stats.topScore}</strong> (${stats.topScorePct}%)
          </span>`:""}
        </div>
        ${pctBar(stats.hPct,stats.dPct,stats.aPct,m.h,m.a)}
      </div>`:""}
    </div>`;
  });

  const playedToday=todayMatches.filter(m=>{const ac=STATE.actuals?.[m.id];return ac&&ac.h!=="";}).length;

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
    <div>
      <div style="font-size:.75rem;font-weight:700;letter-spacing:1px;color:#ffc800">📅 ${todayStr.toUpperCase()}</div>
      <div style="font-size:.68rem;color:#889">${todayMatches.length} partido${todayMatches.length!==1?"s":""} hoy · ${playedToday} jugado${playedToday!==1?"s":""}</div>
    </div>
    ${playedToday>0?`<div style="background:rgba(255,200,0,.1);border:1px solid rgba(255,200,0,.3);border-radius:10px;padding:.4rem .8rem;text-align:center">
      <div style="font-size:1.4rem;font-weight:700;color:#ffc800;line-height:1">${dayPts}</div>
      <div style="font-size:.6rem;color:#889">pts hoy</div>
    </div>`:""}
  </div>
  ${!hasLeague?`<div style="font-size:.7rem;color:#667;margin-bottom:.5rem;text-align:center;font-style:italic">Únete a una liga para ver el consenso de los demás participantes</div>`:""}
  ${matchRows.join("")}`;
}

    <div>

function mkCode(){
  // 6 uppercase alphanumeric, easy to type and share
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let c="";for(let i=0;i<6;i++)c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}

function lgScore(pid){
  return scoreFull(pid);
}

function lgRankHTML(lg, myPid){
  const medals=["🥇","🥈","🥉"];
  const scored = lg.memberIds
    .map(pid=>{
      const p=STATE.participants.find(x=>x.id===pid);
      const qn=STATE.predictions[pid]?.quinName||p?.name||"—";
      const sub=STATE.predictions[pid]?.submitted||false;
      return {pid, qn, name:p?.name||"—", pts:lgScore(pid), isMe:pid===myPid, sub, hidden:p?.hidden||false};
    })
    .filter(m=>!m.hidden||m.isMe) // hidden participants invisible except to themselves
    .sort((a,b)=>b.pts-a.pts||a.qn.localeCompare(b.qn));

  return `<div style="display:flex;flex-direction:column;gap:.22rem">
    ${scored.map((m,i)=>`<div style="display:flex;align-items:center;gap:.55rem;padding:.52rem .7rem;border-radius:9px;background:${m.isMe?"rgba(255,200,0,.09)":"rgba(255,255,255,.04)"};border:1px solid ${m.isMe?"rgba(255,200,0,.3)":"rgba(255,255,255,.07)"}">

      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:.85rem;color:${m.isMe?"#ffc800":"#eee"};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.qn}${m.isMe?` <span style="font-size:.6rem;color:#ffc80099;font-weight:400">← tú</span>`:""}</div>
        ${!m.sub?`<div style="font-size:.62rem;color:#667">Pendiente de envío</div>`:""}
      </div>
      <span style="font-size:1.1rem;font-weight:700;color:${m.isMe?"#ffc800":"#aab"};flex-shrink:0">${m.pts}<small style="font-size:.55rem;color:#555;margin-left:1px">pts</small></span>

function createLeague(pid){
  // Writes only the new league
  const name=val("lg-name-new");
  if(!name){showFlash("⚠ Escribe un nombre para la liga");return;}
  const lg={id:uid(),name,code:mkCode(),createdBy:pid,memberIds:[pid]};
  STATE.leagues.push(lg);
  localStorage.setItem(LS,JSON.stringify(STATE));
  fbWriteLeague(lg.id);
  fbWriteParticipant(pid);
  go("league",{lid:lg.id,pid});
}

function joinLeague(pid){
  // Writes only participant + league
  const raw=document.getElementById("lg-code-join")?.value||"";
  const code=raw.trim().toUpperCase();
  setErr("lg-join-err","");
  if(!code){setErr("lg-join-err","⚠ Ingresa el código de la liga");return;}
  const lg=STATE.leagues.find(l=>l.code===code);
  if(!lg){setErr("lg-join-err","⚠ Código no encontrado. Verifica con quien te invitó.");return;}
  if(lg.memberIds.includes(pid)){setErr("lg-join-err","⚠ Ya eres miembro de esta liga.");return;}
  lg.memberIds.push(pid);
  localStorage.setItem(LS,JSON.stringify(STATE));
  fbWriteLeague(lid);
  go("league",{lid:lg.id,pid});
}

function leaveLeague(lid,pid){
  if(!confirm("¿Salir de esta liga?"))return;
  const lg=STATE.leagues.find(l=>l.id===lid);
  if(!lg)return;
  lg.memberIds=lg.memberIds.filter(x=>x!==pid);
  if(lg.memberIds.length===0) STATE.leagues=STATE.leagues.filter(l=>l.id!==lid);
  localStorage.setItem(LS,JSON.stringify(STATE));
  fbDeleteLeague(lid);
  go("myscore",{pid,subtab:"leagues"});
}

function deleteLeague(lid,pid){
  if(!confirm("¿Eliminar esta liga para todos?"))return;
  STATE.leagues=STATE.leagues.filter(l=>l.id!==lid);
  localStorage.setItem(LS,JSON.stringify(STATE));
  fbDeleteLeague(lid);
  go("myscore",{pid,subtab:"leagues"});
}

function adminStats(ps){
  // Only use submitted participants
  const sub=ps.filter(p=>STATE.predictions[p.id]?.submitted);
  if(sub.length<2) return `<div class="card" style="text-align:center;padding:1.5rem">
    <div style="font-size:2rem;margin-bottom:.5rem">📈</div>
    <div style="font-weight:700;color:#ffc800;margin-bottom:.3rem">Estadísticas</div>
    <div style="font-size:.78rem;color:#889">Disponible cuando haya al menos 2 quinielas enviadas.</div>
  </div>`;

  const medals=["🥇","🥈","🥉"];
  const playedMatches=MATCHES.filter(m=>{const a=STATE.actuals[m.id];return a&&a.h!==""&&a.a!=="";});

  // ── Per-participant stats ──
  const ranked=sub.map(p=>{
    const pred=STATE.predictions[p.id];
    let exact=0,correct=0,wrong=0,pts=0;
    playedMatches.forEach(m=>{
      const pr=pred.groups?.[m.id], ac=(STATE.actuals||{})[m.id];
      if(!pr||pr.h===""||pr.a==="") return;
      const ph=parseInt(pr.h),pa=parseInt(pr.a),ah=parseInt(ac.h),aa=parseInt(ac.a);
      if(ph===ah&&pa===aa){exact++;pts+=5;}
      else{const pw=ph>pa?"h":pa>ph?"a":"d",aw=ah>aa?"h":aa>ah?"a":"d";if(pw===aw){correct++;pts+=3;}else wrong++;}
    });

function bindEvents(){
  // Prediction score inputs — update live with standings
  document.querySelectorAll(".si-pred").forEach(inp=>{
    inp.addEventListener("input",function(){
      const mid=+this.dataset.mid,side=this.dataset.side;
      const pid=ROUTE.pid;if(!pid)return;
      const pred=STATE.predictions[pid];if(!pred)return;
      if(!pred.groups)pred.groups={};
      pred.groups[mid]={...pred.groups[mid]||{h:"",a:""},[side]:this.value};
      STATE.predictions[pid]=pred;
      fbWriteParticipant(pid);
      // Update standings table live
      const grp=MATCHES.find(m=>m.id===mid)?.g;
      const el=document.getElementById("st-"+grp);
      if(el)el.innerHTML=stTable(calcStandings(grp,pred.groups||{}));
    });
  });
  // Admin actual score inputs — update standings live
  document.querySelectorAll(".si-actual").forEach(inp=>{
    inp.addEventListener("input",function(){
      const mid=+this.dataset.mid,side=this.dataset.side;
      if(!STATE.actuals)STATE.actuals={};
      STATE.actuals[mid]={...STATE.actuals[mid]||{h:"",a:""},[side]:this.value};
      const grp=MATCHES.find(m=>m.id===mid)?.g;
      const el=document.getElementById("ast-"+grp);
      if(el)el.innerHTML=stTable(calcStandings(grp,STATE.actuals));
    });
  });
}

function sendConfirmationEmail(pid){
  const p=STATE.participants.find(x=>x.id===pid);
  const pred=STATE.predictions[pid]||{};
  if(!pred.groups) pred.groups={};
  if(!pred.ko) pred.ko={};
  if(!p||!p.email) return;

  // Rate limit: only send once per participant
  if(pred.emailSent){ console.log("Email already sent, skipping"); return; }

  // Basic email validation
  if(!p.email.includes("@")||!p.email.includes(".")) return;

  const B=buildBracket(pred.groups||{},pred.ko||{});
  const champion=B.champion||"—";
  const runner=B.fin&&B.champion?(B.fin.h===B.champion?B.fin.a:B.fin.h)||"—":"—";
  const third=B.f3w&&B.f3w[0]?B.f3w[0]:"—";

  const submittedAt=pred.submittedAt?new Date(pred.submittedAt):new Date();
  const submitStr=submittedAt.toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"})
    +" "+submittedAt.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});

  // ── Build groups summary (all 72 matches) ──
  const groupsLines=Object.keys(GROUPS).map(gk=>{
    const gm=MATCHES.filter(m=>m.g===gk);
    const rows=gm.map(m=>{
      const s=pred.groups?.[m.id];
      const score=s&&s.h!==""&&s.a!==""?s.h+"-"+s.a:"?-?";
      return trunc(m.h,10)+" "+score+" "+trunc(m.a,10);
    }).join(" | ");
    return "Grupo "+gk+": "+rows;
  }).join("\n");

  // ── Build bracket summary by round ──
  const r32w=B.r32w||{}, r16w=B.r16w||{}, qfw=B.qfw||{}, sfw=B.sfw||{};
  const r32teams=Object.values(r32w).filter(Boolean).join(", ")||"—";
  const r16teams=Object.values(r16w).filter(Boolean).join(", ")||"—";
  const qfteams=Object.values(qfw).filter(Boolean).join(", ")||"—";
  const sfteams=Object.values(sfw).filter(Boolean).join(", ")||"—";

  const params={
    to_email:     p.email,
    email:        p.email,        // matches {{email}} in EmailJS template "To Email" field
    from_name:    p.name,
    from_email:   p.email,
    quinName:     pred.quinName||"Mi Quiniela",
    submitted_at: submitStr,
    champion:     champion,
    runner_up:    runner,
    third_place:  third,
    admin_email:  "gdegwitz@gmail.com",
    groups_summary: groupsLines,
    r32_teams:    r32teams,
    r16_teams:    r16teams,
    qf_teams:     qfteams,
    sf_teams:     sfteams,
  };

  emailjs.send("service_tl7ami5","template_748pynh",params)
    .then(function(){
      console.log("✅ Email enviado a "+p.email);
      // Mark as sent — prevents duplicate sends
      STATE.predictions[pid].emailSent=true;
      localStorage.setItem(LS,JSON.stringify(STATE));
      showFlash("📧 Confirmación enviada a "+p.email);
    })
    .catch(function(e){
      console.warn("Email failed:",e);
    });
}

function pickBracket(pid,round,matchId,team){
  const pred=STATE.predictions[pid];if(!pred)return;
  if(!pred.ko)pred.ko={};
  if(!pred.ko[round])pred.ko[round]={};
  if(pred.ko[round][matchId]===team)delete pred.ko[round][matchId];
  else pred.ko[round][matchId]=team;
  fbWriteParticipant(pid);
  go("predict",{pid,subtab:"bracket"});
}

function pickThird(pid,matchId,team){
  const pred=STATE.predictions[pid];if(!pred)return;
  if(!pred.ko)pred.ko={};
  if(!pred.ko.third)pred.ko.third={};
  if(team) pred.ko.third[matchId]=team;
  else delete pred.ko.third[matchId];
  setTimeout(function(){ fbWriteParticipant(pid); },50);
  go("predict",{pid,subtab:"bracket"});
}

function clearBracket(pid){
  if(!confirm("¿Limpiar todas las selecciones del bracket?"))return;
  STATE.predictions[pid].ko={};
  go("predict",{pid,subtab:"bracket"});
  setTimeout(function(){ fbWriteParticipant(pid); },50);
}

    div.textContent="⚠️ No hay datos en este dispositivo (localStorage vacío)";
    return;
  }
  try{
    const d=JSON.parse(raw);
    const participants=(d.participants||[]).length;
    const predictions=Object.keys(d.predictions||{}).length;
    const leagues=(d.leagues||[]).length;
    div.style.display="block";
    div.innerHTML=`<div style="color:#4de0a0;font-weight:700;margin-bottom:.3rem">✅ Datos encontrados:</div>
      <div>👥 Participantes: <strong>${participants}</strong></div>
      <div>📋 Predicciones: <strong>${predictions}</strong></div>
      <div>🏅 Ligas: <strong>${leagues}</strong></div>
      <div style="margin-top:.4rem;color:#ffc800">Si los números son correctos, toca "Forzar subida" para restaurar Firebase.</div>`;
  }catch(e){
    div.style.display="block";
    div.textContent="Error leyendo datos: "+e.message;
  }
}

function adminPushToFirebase(){
  const raw=localStorage.getItem("q2026");
  if(!raw){showFlash("⚠️ No hay datos locales para subir");return;}
  if(!window._fbDB){showFlash("⚠️ Firebase no conectado");return;}
  if(!confirm("¿Subir los datos locales de este dispositivo a Firebase?"))return;
  try{
    const d=JSON.parse(raw);
    STATE.participants=d.participants||[];
    STATE.predictions=d.predictions||{};
    STATE.actuals=d.actuals||{};
    STATE.leagues=(d.leagues||[]).map(function(lg){
      return Object.assign({},lg,{memberIds:lg.memberIds?(Array.isArray(lg.memberIds)?lg.memberIds:Object.values(lg.memberIds)):[]});
    });
    fbWriteAdmin();
    fbWriteActuals();
    // Also write all predictions
    if(window._fbDB){
      const updates={};
      Object.entries(STATE.predictions||{}).forEach(function(e){if(e[0]&&e[1])updates["predictions/"+e[0]]=e[1];});
      if(Object.keys(updates).length>0) window._fbDB.ref("q2026").update(updates);
    }
    showFlash("✅ Datos subidos a Firebase — "+STATE.participants.length+" participantes restaurados");
    go("admin",{tab:"participants"});
  }catch(e){
    showFlash("❌ Error: "+e.message);
  }
}

function adminResetPassword(pid){
  const p=STATE.participants.find(x=>x.id===pid);
  const pred=STATE.predictions[pid];
  if(!p||!pred){showFlash("⚠ Participante no encontrado");return;}
  const newPwd=prompt(`Resetear contraseña de ${p.name}\n\nEscribe la nueva contraseña temporal:`);
  if(!newPwd||!newPwd.trim()){return;}
  if(newPwd.trim().length<4){showFlash("⚠ La contraseña debe tener al menos 4 caracteres");return;}
  hashPwdStrong(newPwd.trim()).then(function(hash){
    pred.pwdHash=hash;
    fbWriteParticipant(pid);
    showFlash("✓ Contraseña de "+p.name+" reseteada");
    alert("✓ Contraseña reseteada correctamente.\n\nDile a "+p.name+" que su nueva contraseña es:\n\n"+ newPwd.trim()+"\n\nRecuérdale que puede cambiarla la próxima vez que ingrese.");
  });
}

// ── PDF GENERATION (2 pages, landscape A4) ─────────────
function buildPDFDoc(pid){
  if(!window.jspdf?.jsPDF) return null;
  const {jsPDF}=window.jspdf;
  const p=STATE.participants.find(x=>x.id===pid);
  if(!p) return null;
  const pred=STATE.predictions[pid]||{};
  if(!pred.groups) pred.groups={};
  if(!pred.ko) pred.ko={};
  const doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
  const W=297,H=210,M=8;

  // Submission date/time string
  const submittedAt=pred.submittedAt?new Date(pred.submittedAt):null;
  const submitStr=submittedAt
    ? "Enviada: "+submittedAt.toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"})
      +" "+submittedAt.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})
    : "Borrador — "+new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"});

  // ── Color helpers ──
  const bg=(r,g,b)=>doc.setFillColor(r,g,b);
  const col=(r,g,b)=>doc.setTextColor(r,g,b);
  const font=(style,size)=>{doc.setFont("helvetica",style);doc.setFontSize(size)};
  const ln=(x1,y1,x2,y2,r,g,b,w=.3)=>{
    doc.setDrawColor(r,g,b);doc.setLineWidth(w);doc.line(x1,y1,x2,y2);
  };

  // ────────────────────────────────────────────────────
  // PAGE 1 — GROUPS
  // ────────────────────────────────────────────────────
  // White background for maximum readability
  bg(255,255,255);doc.rect(0,0,W,H,"F");

  // Header bar
  bg(10,20,50);doc.rect(0,0,W,11,"F");
  col(255,200,0);font("bold",9);
  doc.text("QUINIELA FIFA WORLD CUP 2026",M,7.5);
  col(255,255,255);font("normal",7);
  doc.text(p.name.toUpperCase(),W-M,7.5,{align:"right"});

  // Sub-header line
  bg(255,200,0);doc.rect(0,11,W,1.5,"F");

  const GKEYS=Object.keys(GROUPS);
  const cols4=4;
  const gColW=(W-M*2-6)/cols4;   // 4 columns with small gap
  const gStartY=15;
  const mH=5;

  GKEYS.forEach((gk,gi)=>{
    const col4=gi%cols4, row3=Math.floor(gi/cols4);
    const gx=M+col4*(gColW+2);
    const gm=MATCHES.filter(m=>m.g===gk);
    const st=calcStandings(gk,pred.groups||{});
    const stRows=4;
    const blockH=6+gm.length*mH+1+(stRows+1)*4.2;
    const gy=gStartY+row3*(blockH+3);

    // Group title
    bg(10,20,50);doc.rect(gx,gy,gColW,6.5,"F");
    bg(255,200,0);doc.rect(gx,gy,2.5,6.5,"F");
    col(255,255,255);font("bold",6.5);
    doc.text("GRUPO "+gk,gx+4,gy+4.4);

    // Matches
    gm.forEach((m,mi)=>{
      const my=gy+6.5+mi*mH;
      // Alternate row bg
      bg(mi%2===0?248:240, mi%2===0?249:242, mi%2===0?252:248);
      doc.rect(gx,my,gColW,mH,"F");
      ln(gx,my,gx+gColW,my,200,200,200,.2);

      // Team names
      col(20,30,60);font("normal",4.5);
      doc.text(trunc(m.h,10),gx+1.2,my+3.4,{maxWidth:gColW*0.37});
      doc.text(trunc(m.a,10),gx+gColW-1.2,my+3.4,{align:"right",maxWidth:gColW*0.37});

      // Score or date
      const sc=pred.groups?.[m.id];
      if(sc&&sc.h!==""&&sc.a!==""){
        bg(10,20,50);doc.roundedRect(gx+gColW/2-6,my+.6,12,mH-1.2,1.5,1.5,"F");
        col(255,200,0);font("bold",5.5);
        doc.text(sc.h+":"+sc.a,gx+gColW/2,my+3.6,{align:"center"});
      } else {
        col(160,170,190);font("normal",3.8);
        doc.text(m.date||"?",gx+gColW/2,my+3.2,{align:"center"});
      }
    });

    // Standings mini table
    const stY=gy+6.5+gm.length*mH+1;
    bg(230,235,245);doc.rect(gx,stY,gColW,4,"F");
    col(60,80,130);font("bold",3.5);
    doc.text("#",gx+1.2,stY+2.8);
    doc.text("EQUIPO",gx+4.5,stY+2.8);
    doc.text("PJ",gx+gColW-10,stY+2.8,{align:"center"});
    doc.text("PTS",gx+gColW-5.5,stY+2.8,{align:"center"});
    doc.text("DG",gx+gColW-1,stY+2.8,{align:"right"});

    st.forEach((r,ri)=>{
      const ry=stY+4+ri*4.2;
      bg(ri<2?232:248, ri<2?248:248, ri<2?238:248);
      doc.rect(gx,ry,gColW,4.2,"F");
      if(ri<2){bg(0,180,80);doc.rect(gx,ry,1.5,4.2,"F")}
      col(ri<2?10:60, ri<2?80:80, ri<2?30:120);
      font(ri<2?"bold":"normal",3.8);
      doc.text(String(ri+1),gx+2,ry+3);
      doc.text(trunc(r.n,11),gx+4.5,ry+3);
      col(ri<2?10:80, ri<2?80:80, ri<2?30:120);
      doc.text(String(r.pj),gx+gColW-10,ry+3,{align:"center"});
      col(ri<2?180:60, ri<2?20:80, ri<2?20:120);
      font("bold",3.8);
      doc.text(String(r.pts),gx+gColW-5.5,ry+3,{align:"center"});
      col(80,80,80);font("normal",3.5);
      doc.text((r.dg>0?"+":"")+r.dg,gx+gColW-1,ry+3,{align:"right"});
      ln(gx,ry+4.2,gx+gColW,ry+4.2,210,215,225,.15);
    });
  });

  // Footer p1
  bg(10,20,50);doc.rect(0,H-5,W,5,"F");
  col(180,190,210);font("normal",4);
  doc.text(`${p.name}  |  Quiniela FIFA World Cup 2026  |  ${submitStr}  |  Pág. 1 de 2`,W/2,H-1.8,{align:"center"});

  // ────────────────────────────────────────────────────
  // PAGE 2 — BRACKET
  // ────────────────────────────────────────────────────
  doc.addPage();
  bg(255,255,255);doc.rect(0,0,W,H,"F");

  // Header
  bg(10,20,50);doc.rect(0,0,W,11,"F");
  col(255,200,0);font("bold",9);
  doc.text("FASE ELIMINATORIA — BRACKET",M,7.5);
  col(255,255,255);font("normal",7);
  doc.text(p.name.toUpperCase(),W-M,7.5,{align:"right"});
  bg(255,200,0);doc.rect(0,11,W,1.5,"F");

  const B=buildBracket(pred.groups||{},pred.ko||{});
  const bTop=15, bBot=H-8, bH=bBot-bTop;
  const ncols=9;
  const bCW=(W-M*2)/ncols;
  const TH2=7.5, TW2=bCW-2.5, mH2=TH2*2+2.5;

  function colX(c){return M+c*bCW+1;}
  function mY(idx,total){return bTop+(bH/total)*(idx+0.5)-mH2/2;}

  // Draw one match cell — high contrast
  function drawBM(rid,mid,bx,by,th,ta,winner){
    const hw=winner===th&&th, aw=winner===ta&&ta;
    const hasH=!!th, hasA=!!ta;

    // Home row
    if(hw){bg(0,140,60);}else if(hasH){bg(240,245,255);}else{bg(245,245,245);}
    doc.rect(bx,by,TW2,TH2,"F");
    col(hw?255:hasH?10:140, hw?255:hasH?25:145, hw?255:hasH?70:165);
    font(hw?"bold":"normal",4.5);
    doc.text(trunc(th||"TBD",10),bx+1.2,by+TH2/2+1.6,{maxWidth:TW2-1.5});
    if(hw){
      col(255,255,255);font("bold",5.5);
      doc.text("✓",bx+TW2-2.5,by+TH2/2+1.6,{align:"right"});
    }

    // Divider
    ln(bx,by+TH2,bx+TW2,by+TH2,190,200,220,.3);

    // Away row
    if(aw){bg(0,140,60);}else if(hasA){bg(250,252,255);}else{bg(245,245,245);}
    doc.rect(bx,by+TH2+.5,TW2,TH2,"F");
    col(aw?255:hasA?10:140, aw?255:hasA?25:145, aw?255:hasA?70:165);
    font(aw?"bold":"normal",4.5);
    doc.text(trunc(ta||"TBD",10),bx+1.2,by+TH2+.5+TH2/2+1.6,{maxWidth:TW2-1.5});
    if(aw){
      col(255,255,255);font("bold",5.5);
      doc.text("✓",bx+TW2-2.5,by+TH2+.5+TH2/2+1.6,{align:"right"});
    }

    // Border — gold if has winner, grey otherwise
    const brd=winner?[255,180,0]:[180,190,210];
    doc.setDrawColor(...brd);
    doc.setLineWidth(winner?.5:.2);
    doc.rect(bx,by,TW2,mH2);
  }

  // Connector line from right edge of match to left edge of next
  function drawConn(x1,y1,x2,y2){
    const mx=(x1+x2)/2;
    doc.setDrawColor(140,160,200);doc.setLineWidth(.3);
    doc.lines([[mx-x1,0],[0,y2-y1],[x2-mx,0]],x1,y1);
  }

  // Round labels
  const lbls={r32:"R32",r16:"OCTAVOS",qf:"CUARTOS",sf:"SEMIS"};
  function roundLabel(txt,x,y){
    col(10,20,50);font("bold",4.5);
    doc.text(txt,x,y,{align:"center"});
  }

  // Left visual order
  const leftR32order=[1,4,0,2,3,5,6,7];
  const rightR32order=[10,11,8,9,13,15,12,14];

  const leftRounds=[
    {rid:"r32",ms:leftR32order.map(i=>B.r32[i]),ws:B.r32w,n:8,c:0},
    {rid:"r16",ms:B.r16.slice(0,4),ws:B.r16w,n:4,c:1},
    {rid:"qf",ms:B.qf.slice(0,2),ws:B.qfw,n:2,c:2},
    {rid:"sf",ms:B.sf.slice(0,1),ws:B.sfw,n:1,c:3},
  ];
  const rightRounds=[
    {rid:"r32",ms:rightR32order.map(i=>B.r32[i]),ws:B.r32w,n:8,c:8},
    {rid:"r16",ms:B.r16.slice(4,8),ws:B.r16w,n:4,c:7},
    {rid:"qf",ms:B.qf.slice(2,4),ws:B.qfw,n:2,c:6},
    {rid:"sf",ms:B.sf.slice(1,2),ws:B.sfw,n:1,c:5},
  ];

  // Draw all rounds
  [...leftRounds,...rightRounds].forEach(({rid,ms,ws,n,c})=>{
    const x=colX(c);
    roundLabel(lbls[rid]||rid,x+TW2/2,bTop-1);
    ms.forEach((m,i)=>{
      const y=mY(i,n);
      drawBM(rid,m.id,x,y,m.h,m.a,ws[m.id]||null);
    });
  });

  // ── Connectors left side ──
  for(let ri=0;ri<leftRounds.length-1;ri++){
    const cur=leftRounds[ri],nxt=leftRounds[ri+1];
    for(let i=0;i<cur.n;i+=2){
      const y0=mY(i,cur.n)+mH2/2;
      const y1=mY(i+1,cur.n)+mH2/2;
      const yn=mY(i/2,nxt.n)+mH2/2;
      const x0=colX(cur.c)+TW2, x1=colX(nxt.c);
      const mx=(x0+x1)/2;
      doc.setDrawColor(150,170,210);doc.setLineWidth(.25);
      doc.lines([[mx-x0,0],[0,yn-y0]],x0,y0);
      doc.lines([[mx-x0,0],[0,yn-y1]],x0,y1);
      doc.line(mx,yn,x1,yn);
    }
  }

  // ── Connectors right side ──
  for(let ri=0;ri<rightRounds.length-1;ri++){
    const cur=rightRounds[ri],nxt=rightRounds[ri+1];
    for(let i=0;i<cur.n;i+=2){
      const y0=mY(i,cur.n)+mH2/2;
      const y1=mY(i+1,cur.n)+mH2/2;
      const yn=mY(i/2,nxt.n)+mH2/2;
      const x0=colX(cur.c), x1=colX(nxt.c)+TW2;
      const mx=(x0+x1)/2;
      doc.setDrawColor(150,170,210);doc.setLineWidth(.25);
      doc.lines([[mx-x0,0],[0,yn-y0]],x0,y0);
      doc.lines([[mx-x0,0],[0,yn-y1]],x0,y1);
      doc.line(mx,yn,x1,yn);
    }
  }

  // ── Center column: Final + 3rd place ──
  const cx=colX(4);
  const finY=bTop+bH*0.12;
  const f3Y=bTop+bH*0.58;

  roundLabel("⚽ FINAL",cx+TW2/2,bTop-1);
  drawBM("final",0,cx,finY,B.fin.h,B.fin.a,B.finw[0]||null);

  col(120,80,20);font("bold",4.5);
  doc.text("🥉 3ER LUGAR",cx+TW2/2,f3Y-1.5,{align:"center"});
  drawBM("f3",0,cx,f3Y,B.f3.h,B.f3.a,B.f3w[0]||null);

  // SF → Final connectors
  const sfLy=mY(0,1)+mH2/2;
  const sfRy=mY(0,1)+mH2/2;
  doc.setDrawColor(150,170,210);doc.setLineWidth(.25);
  doc.line(colX(3)+TW2, sfLy, cx, finY+TH2/2);
  doc.line(colX(5), sfRy, cx+TW2, finY+TH2+.5+TH2/2);

  // Champion box
  const chY=finY+mH2+3;
  if(B.champion){
    bg(10,20,50);doc.roundedRect(cx-1,chY,TW2+2,14,2,2,"F");
    doc.setDrawColor(255,200,0);doc.setLineWidth(.6);doc.roundedRect(cx-1,chY,TW2+2,14,2,2);
    col(255,200,0);font("bold",5.5);
    doc.text("🏆 CAMPEÓN DEL MUNDO",cx+TW2/2,chY+5.5,{align:"center"});
    col(255,255,255);font("bold",7);
    doc.text(trunc(B.champion,12),cx+TW2/2,chY+11.5,{align:"center"});
  } else {
    bg(240,245,255);doc.roundedRect(cx-1,chY,TW2+2,14,2,2,"F");
    doc.setDrawColor(180,200,240);doc.setLineWidth(.3);doc.roundedRect(cx-1,chY,TW2+2,14,2,2);
    col(150,170,200);font("normal",5);
    doc.text("🏆 CAMPEÓN",cx+TW2/2,chY+8,{align:"center"});
  }

  // Footer p2
  bg(10,20,50);doc.rect(0,H-5,W,5,"F");
  col(180,190,210);font("normal",4);
  doc.text(`${p.name}  |  Quiniela FIFA World Cup 2026  |  ${submitStr}  |  Pág. 2 de 2`,W/2,H-1.8,{align:"center"});

  return doc;
}

function genPDF(pid){
  const doc=buildPDFDoc(pid);
  if(!doc){alert("PDF no disponible. Recarga la página.");return;}
  const p=STATE.participants.find(x=>x.id===pid);
  doc.save(`quiniela-2026-${p.name.toLowerCase().replace(/\s+/g,"-")}.pdf`);
}

// ── BOOT ──────────────────────────────────────────────
renderApp();

// ── iOS install prompt ──
window.addEventListener("load",function(){
  const isIos=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.matchMedia("(display-mode:standalone)").matches||window.navigator.standalone;
  const dismissed=localStorage.getItem("pwa-prompt-dismissed");
  if(isIos&&!isStandalone&&!dismissed){
    const banner=document.createElement("div");
    banner.id="ios-install-banner";
    banner.style.cssText="position:fixed;bottom:0;left:0;right:0;background:#1a2236;border-top:1px solid rgba(255,200,0,.3);padding:.8rem 1rem;z-index:1000;display:flex;align-items:center;gap:.7rem;font-family:Arial,sans-serif";
    banner.innerHTML=`
      <span style="font-size:1.6rem">⚽</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:.82rem;font-weight:700;color:#ffc800">Agregar a pantalla de inicio</div>
        <div style="font-size:.7rem;color:#aaa">Toca <strong style="color:#fff">Compartir</strong> 
        <span style="font-size:.85rem">⬆️</span> y luego <strong style="color:#fff">"Agregar a inicio"</strong></div>
      </div>
      <button onclick="document.getElementById('ios-install-banner').remove();localStorage.setItem('pwa-prompt-dismissed','1')"
        style="background:none;border:none;color:#aaa;font-size:1.2rem;cursor:pointer;padding:0;width:auto;flex-shrink:0">✕</button>
    `;
    document.body.appendChild(banner);
  }
});
</script>
