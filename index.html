body{background:#141824;color:#eee;font-family:Arial,sans-serif;min-height:100vh}
#app{max-width:600px;margin:0 auto;padding:1rem}
button{cursor:pointer;font-weight:700;width:100%;padding:.8rem;margin:.4rem 0;border:none;border-radius:8px;font-size:.95rem}
.btn-gold{background:#ffc800;color:#000}
.btn-green{background:#00c853;color:#fff}

input{width:100%;padding:.6rem .8rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:.9rem;margin:.2rem 0 .6rem;outline:none;box-sizing:border-box}

.hero{text-align:center;background:linear-gradient(160deg,#0b1526,#152240);padding:2rem 1rem 1.5rem;border-radius:0 0 16px 16px;margin:0 -1rem 1rem}

// ── STORAGE ──
var LS = "q2026";
var STATE = (function(){
  try { var s = JSON.parse(localStorage.getItem(LS)); return s || {participants:[],predictions:{},actuals:{},leagues:[]}; }
  catch(e){ return {participants:[],predictions:{},actuals:{},leagues:[]}; }
})();
if(!STATE.leagues) STATE.leagues = [];

var SESSION = {pid: null};

function persist(){
  try { localStorage.setItem(LS, JSON.stringify(STATE)); } catch(e){}
  flash("✓ Guardado");
}

// ── UTILS ──
function uid(){ return Math.random().toString(36).slice(2,10); }
function mkCode(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }
function getVal(id){ var e=document.getElementById(id); return e ? e.value.trim() : ""; }
function setErr(id,m){ var e=document.getElementById(id); if(e) e.textContent=m; }
function flash(m){
  var e=document.getElementById("flash");
  if(!e) return;
  e.textContent=m; e.style.display="block";
  setTimeout(function(){ e.style.display="none"; }, 1800);
}
function hashPwd(s){
  var h=5381;
  for(var i=0;i<s.length;i++) h=((h<<5)+h)^s.charCodeAt(i);
  return (h>>>0).toString(36);
}
function logout(){ SESSION.pid=null; go("landing"); }

// ── ROUTING ──
var ROUTE = {page:"landing"};
function go(page, params){
  ROUTE = Object.assign({page:page}, params||{});
  render();
}
function render(){
  var app = document.getElementById("app");
  if(!app) return;
  var p = ROUTE.page;
  if(p==="landing")      app.innerHTML = pgLanding();
  else if(p==="register")     app.innerHTML = pgRegister();
  else if(p==="returning")    app.innerHTML = pgLogin();
  else if(p==="predict")      app.innerHTML = pgPredict(ROUTE.pid);
  else if(p==="myscore")      app.innerHTML = pgMyScore(ROUTE.pid);
  else if(p==="admin_login")  app.innerHTML = pgAdminLogin();
  else if(p==="admin")        app.innerHTML = pgAdmin(ROUTE.tab||"results");
  else if(p==="leaderboard")  app.innerHTML = pgLeaderboard(ROUTE.tab||"global");
  bindInputs();
}

// ── STANDINGS ──
function calcStandings(gk, scores){
  var teams = GROUPS[gk], st = {};
  teams.forEach(function(t){ st[t]={pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0}; });
  MATCHES.filter(function(m){ return m.g===gk; }).forEach(function(m){
    var sc=scores[m.id];
    if(!sc||sc.h===""||sc.a==="") return;
    var h=parseInt(sc.h), a=parseInt(sc.a);
    if(isNaN(h)||isNaN(a)) return;
    st[m.h].pj++; st[m.a].pj++;
    st[m.h].gf+=h; st[m.h].gc+=a; st[m.h].dg+=h-a;
    st[m.a].gf+=a; st[m.a].gc+=h; st[m.a].dg+=a-h;
    if(h>a){st[m.h].pts+=3;st[m.h].pg++;st[m.a].pp++;}
    else if(h<a){st[m.a].pts+=3;st[m.a].pg++;st[m.h].pp++;}
    else{st[m.h].pts++;st[m.h].pe++;st[m.a].pts++;st[m.a].pe++;}
  });
  return teams.map(function(t){ return Object.assign({n:t},st[t]); })
    .sort(function(a,b){ return b.pts-a.pts||b.dg-a.dg||b.gf-a.gf; });
}

function scoreGroups(pred, actual){
  var pts=0;
  MATCHES.forEach(function(m){
    var pr=pred[m.id], ac=actual[m.id];
    if(!pr||!ac) return;
    var ph=parseInt(pr.h),pa=parseInt(pr.a),ah=parseInt(ac.h),aa=parseInt(ac.a);
    if(isNaN(ph)||isNaN(pa)||isNaN(ah)||isNaN(aa)) return;
    if(ph===ah&&pa===aa){ pts+=5; return; }
    var pw=ph>pa?"h":pa>ph?"a":"d", aw=ah>aa?"h":aa>ah?"a":"d";
    if(pw===aw) pts+=3;
  });
  return pts;
}

function stTable(rows){
  var html = '<table class="stt"><tr><th style="text-align:left">Equipo</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>DG</th><th>PTS</th></tr>';
  rows.forEach(function(r,i){
    html += '<tr class="'+(i<2?"q":"")+'">';
    html += '<td style="text-align:left">'+f(r.n)+' '+trunc(r.n,12)+'</td>';
    html += '<td>'+r.pj+'</td><td>'+r.pg+'</td><td>'+r.pe+'</td><td>'+r.pp+'</td>';
    html += '<td style="color:'+(r.dg>0?"#4de0a0":r.dg<0?"#f77":"#aaa")+'">'+(r.dg>0?"+":"")+r.dg+'</td>';
    html += '<td style="color:#ffc800;font-weight:700">'+r.pts+'</td></tr>';
  });
  html += '</table><div class="note">🟢 Top 2 clasifican</div>';
  return html;
}

      ["25 pts","Acierto Semifinal","#88aaff"],
      ["30 pts","Campeón del mundo","#ffc800"],
      ["20 pts","Subcampeón","#aaa"],
      ["15 pts","3er lugar","#cd7f32"]

        +'<span style="font-size:.8rem;color:#ccc">'+r[1]+'</span></div>';

function pgRegister(){
  return heroHTML()
    +'<div class="card"><h2>🆕 NUEVA QUINIELA</h2>'
    +'<label>NOMBRE COMPLETO</label><input id="rn" type="text" placeholder="Carlos Pérez">'

    +'<div class="err" id="ee"></div>'

    +'<div class="err" id="ep"></div>'
    +'<label>CONFIRMAR CONTRASEÑA</label>'+pwdField("rp2","Repite tu contraseña")
    +'<div class="err" id="ep2"></div>'

    +'<button class="btn-gray" onclick="go(\'landing\')">← Volver</button>'
    +'</div>';

function doRegister(){
  var name=getVal("rn"),email=getVal("re"),qname=getVal("rq");
  var rp=document.getElementById("rp"),rp2=document.getElementById("rp2");
  var pwd=rp?rp.value:"", pwd2=rp2?rp2.value:"";
  var ok=true;
  if(!name){setErr("en","⚠ Ingresa tu nombre");ok=false;}else setErr("en","");
  if(!email||email.indexOf("@")<0){setErr("ee","⚠ Correo inválido");ok=false;}else setErr("ee","");
  if(!qname){setErr("eq","⚠ Ponle nombre");ok=false;}else setErr("eq","");
  if(pwd.length<4){setErr("ep","⚠ Mínimo 4 caracteres");ok=false;}else setErr("ep","");
  if(pwd!==pwd2){setErr("ep2","⚠ No coinciden");ok=false;}else setErr("ep2","");
  if(ok && STATE.participants.find(function(p){return p.email&&p.email.toLowerCase()===email.toLowerCase();})){
    setErr("ee","⚠ Correo ya registrado"); ok=false;
  }
  if(!ok) return;
  var pid=uid();
  STATE.participants.push({id:pid,name:name,email:email.toLowerCase(),hidden:false});
  STATE.predictions[pid]={groups:{},ko:{},quinName:qname,pwdHash:hashPwd(pwd),submitted:false};
  SESSION.pid=pid;
  go("predict",{pid:pid});
  persist();
}

    +'<div style="overflow-x:auto;-webkit-overflow-scrolling:touch" id="bwrap">';

  function mBox(rid,mid,th,ta,winner){
    var hw=winner&&winner===th, aw=winner&&winner===ta;

      +'<div onclick="pickBracket(\''+pid+'\',\''+rid+'\','+mid+',\''+encodeTeam(th)+'\')" style="padding:.3rem .5rem;font-size:.72rem;cursor:'+(th?"pointer":"default")+';background:'+(hw?"rgba(0,180,60,.25)":"none")+';color:'+(hw?"#00e676":(th?"#eee":"#555"))+';">'
      +(hw?"✓ ":"")+(th?f(th)+' '+trunc(th,9):"TBD")+'</div>'
      +'<div style="height:1px;background:rgba(255,255,255,.08)"></div>'
      +'<div onclick="pickBracket(\''+pid+'\',\''+rid+'\','+mid+',\''+encodeTeam(ta)+'\')" style="padding:.3rem .5rem;font-size:.72rem;cursor:'+(ta?"pointer":"default")+';background:'+(aw?"rgba(0,180,60,.25)":"none")+';color:'+(aw?"#00e676":(ta?"#eee":"#555"))+';">'
      +(aw?"✓ ":"")+(ta?f(ta)+' '+trunc(ta,9):"TBD")+'</div>'
      +'</div>';
  }

  function section(label,matches,winners){
    var s='<div style="font-size:.65rem;letter-spacing:2px;color:#ffc800;font-weight:700;margin:.7rem 0 .3rem;text-transform:uppercase">'+label+'</div>';

      s+=mBox(m.rid,m.id,m.h,m.a,winners[m.id]||null);
    });

  }

  var r32w=B.r32w, r16w=B.r16w, qfw=B.qfw, sfw=B.sfw;

  html+=section("⚔️ Ronda de 32 — Izquierda",[1,4,0,2,3,5,6,7].map(function(i){return Object.assign({rid:"r32"},B.r32[i]);}),r32w);

  html+=section("🎯 Octavos — Derecha",B.r16.slice(4,8).map(function(m){return Object.assign({rid:"r16"},m);}),r16w);
  html+=section("🏟 Cuartos",B.qf.map(function(m){return Object.assign({rid:"qf"},m);}),qfw);
  html+=section("🔥 Semifinales",B.sf.map(function(m){return Object.assign({rid:"sf"},m);}),sfw);

      +'</div>';

function encodeTeam(t){ return t ? t.replace(/'/g,"&#39;") : ""; }

function buildBracket(groups,ko){
  var std={};
  Object.keys(GROUPS).forEach(function(g){ std[g]=calcStandings(g,groups); });
  function slot(s){
    if(s.t==="1") return std[s.g]&&std[s.g][0]?std[s.g][0].n:null;
    if(s.t==="2") return std[s.g]&&std[s.g][1]?std[s.g][1].n:null;
    return null;
  }
  var R32D=[
    {id:0,h:{t:"2",g:"A"},a:{t:"2",g:"B"}},{id:1,h:{t:"1",g:"E"},a:{t:"3"}},
    {id:2,h:{t:"1",g:"F"},a:{t:"2",g:"C"}},{id:3,h:{t:"1",g:"C"},a:{t:"2",g:"F"}},
    {id:4,h:{t:"1",g:"I"},a:{t:"3"}},{id:5,h:{t:"2",g:"E"},a:{t:"2",g:"I"}},
    {id:6,h:{t:"1",g:"A"},a:{t:"3"}},{id:7,h:{t:"1",g:"L"},a:{t:"3"}},
    {id:8,h:{t:"1",g:"D"},a:{t:"3"}},{id:9,h:{t:"1",g:"G"},a:{t:"3"}},
    {id:10,h:{t:"2",g:"K"},a:{t:"2",g:"L"}},{id:11,h:{t:"1",g:"H"},a:{t:"2",g:"J"}},
    {id:12,h:{t:"1",g:"B"},a:{t:"3"}},{id:13,h:{t:"1",g:"J"},a:{t:"2",g:"H"}},
    {id:14,h:{t:"1",g:"K"},a:{t:"3"}},{id:15,h:{t:"2",g:"D"},a:{t:"2",g:"G"}}
  ];
  var r32=R32D.map(function(m){return {id:m.id,h:slot(m.h),a:slot(m.a)};});
  var r32w={}; for(var i=0;i<16;i++) r32w[i]=ko.r32?ko.r32[i]||null:null;
  var r16=[
    {id:0,h:r32w[1],a:r32w[4]},{id:1,h:r32w[0],a:r32w[2]},
    {id:2,h:r32w[3],a:r32w[5]},{id:3,h:r32w[6],a:r32w[7]},
    {id:4,h:r32w[10],a:r32w[11]},{id:5,h:r32w[8],a:r32w[9]},
    {id:6,h:r32w[13],a:r32w[15]},{id:7,h:r32w[12],a:r32w[14]}
  ];
  var r16w={}; for(var j=0;j<8;j++) r16w[j]=ko.r16?ko.r16[j]||null:null;
  var qf=[
    {id:0,h:r16w[0],a:r16w[1]},{id:1,h:r16w[2],a:r16w[3]},
    {id:2,h:r16w[4],a:r16w[5]},{id:3,h:r16w[6],a:r16w[7]}
  ];
  var qfw={}; for(var k=0;k<4;k++) qfw[k]=ko.qf?ko.qf[k]||null:null;
  var sf=[{id:0,h:qfw[0],a:qfw[1]},{id:1,h:qfw[2],a:qfw[3]}];
  var sfw={}; sfw[0]=ko.sf?ko.sf[0]||null:null; sfw[1]=ko.sf?ko.sf[1]||null:null;
  var fin={id:0,h:sfw[0],a:sfw[1]};
  var finw=ko.final||{}; var champion=finw[0]||null;
  var sf0L=sfw[0]?(sf[0].h===sfw[0]?sf[0].a:sf[0].h):null;
  var sf1L=sfw[1]?(sf[1].h===sfw[1]?sf[1].a:sf[1].h):null;
  var f3={id:0,h:sf0L,a:sf1L};
  var f3w=ko.f3||{};
  return {r32:r32,r16:r16,qf:qf,sf:sf,fin:fin,f3:f3,champion:champion,r32w:r32w,r16w:r16w,qfw:qfw,sfw:sfw,finw:finw,f3w:f3w};
}

        if(pr&&ac&&pr.h!==""&&pr.a!==""&&ac.h!==""&&ac.a!==""){
          var ph=parseInt(pr.h),pa=parseInt(pr.a),ah=parseInt(ac.h),aa=parseInt(ac.a);

          else{var pw2=ph>pa?"h":pa>ph?"a":"d",aw3=ah>aa?"h":aa>ah?"a":"d";if(pw2===aw3)badge='<span style="background:#0080ff;color:#fff;border-radius:3px;padding:0 4px;font-size:.6rem;font-weight:700">+3</span>';}

    } else {
      body=btns+'<p style="color:#889;font-size:.82rem;padding:.7rem">Selecciona un participante.</p>';
    }

  return head+tabs+body;

// ── ACTIONS ──
function bindInputs(){
  document.querySelectorAll(".sip").forEach(function(inp){
    inp.oninput=function(){
      var mid=+this.dataset.mid, side=this.dataset.side;
      var pid=ROUTE.pid; if(!pid) return;
      var pred=STATE.predictions[pid]; if(!pred) return;
      if(!pred.groups) pred.groups={};
      var cur=pred.groups[mid]||{h:"",a:""};
      cur[side]=this.value; pred.groups[mid]=cur;
      var el=document.getElementById("st-"+MATCHES.find(function(m){return m.id===mid;}).g);
      if(el) el.innerHTML=stTable(calcStandings(MATCHES.find(function(m){return m.id===mid;}).g,pred.groups));
    };
  });
  document.querySelectorAll(".sia").forEach(function(inp){
    inp.oninput=function(){
      var mid=+this.dataset.mid, side=this.dataset.side;
      if(!STATE.actuals) STATE.actuals={};
      var cur=STATE.actuals[mid]||{h:"",a:""};
      cur[side]=this.value; STATE.actuals[mid]=cur;
      var grp=MATCHES.find(function(m){return m.id===mid;}).g;
      var el=document.getElementById("ast-"+grp);
      if(el) el.innerHTML=stTable(calcStandings(grp,STATE.actuals));
    };
  });
}

function saveForLater(pid){persist();flash("💾 Guardado");go("landing");}
function submitPred(pid){
  if(!STATE.predictions[pid]) return;
  STATE.predictions[pid].submitted=true;
  persist(); flash("✓ Quiniela enviada!");
  go("myscore",{pid:pid});
}
function pickBracket(pid,round,matchId,team){
  var pred=STATE.predictions[pid]; if(!pred) return;
  if(!pred.ko) pred.ko={};
  if(!pred.ko[round]) pred.ko[round]={};
  var bwrap=document.getElementById("bwrap");
  var scroll=bwrap?bwrap.scrollLeft:0;
  if(pred.ko[round][matchId]===team) delete pred.ko[round][matchId];
  else pred.ko[round][matchId]=team;
  persist();
  go("predict",{pid:pid,subtab:"bracket"});
  requestAnimationFrame(function(){var w=document.getElementById("bwrap");if(w)w.scrollLeft=scroll;});
}
function clearBracket(pid){
  if(!confirm("¿Limpiar bracket?")) return;
  STATE.predictions[pid].ko={};
  persist(); go("predict",{pid:pid,subtab:"bracket"});
}
function saveActuals(grp){persist();flash("✓ Guardado");}
function toggleHide(pid){var p=STATE.participants.find(function(x){return x.id===pid;});if(p)p.hidden=!p.hidden;persist();go("admin",{tab:"participants"});}
function deletePart(pid){if(!confirm("¿Eliminar?"))return;STATE.participants=STATE.participants.filter(function(x){return x.id!==pid;});delete STATE.predictions[pid];persist();go("admin",{tab:"participants"});}
function toggleLgPanel(id){var el=document.getElementById(id);if(el)el.style.display=el.style.display==="none"?"block":"none";}
function adminAddToLeague(pid){var sel=document.getElementById("lgsel-"+pid);if(!sel)return;var lg=STATE.leagues.find(function(l){return l.id===sel.value;});if(!lg)return;if(lg.memberIds.indexOf(pid)<0)lg.memberIds.push(pid);persist();go("admin",{tab:"participants"});}
function adminRemoveFromLeague(pid,lid){var lg=STATE.leagues.find(function(l){return l.id===lid;});if(!lg||!confirm("¿Sacar de la liga?"))return;lg.memberIds=lg.memberIds.filter(function(x){return x!==pid;});if(!lg.memberIds.length)STATE.leagues=STATE.leagues.filter(function(l){return l.id!==lid;});persist();go("admin",{tab:"participants"});}
function adminDeleteLeague(lid){if(!confirm("¿Eliminar liga?"))return;STATE.leagues=STATE.leagues.filter(function(l){return l.id!==lid;});persist();go("admin",{tab:"leagues"});}
function createLeague(pid){var name=getVal("lg-new-name").trim();if(!name){setErr("lg-err","⚠ Ingresa un nombre");return;}var lg={id:uid(),name:name,code:mkCode(),memberIds:[pid]};STATE.leagues.push(lg);persist();go("myscore",{pid:pid,subtab:"leagues"});}
function joinLeague(pid){var code=getVal("lg-join-code").trim().toUpperCase();if(!code){setErr("lg-err","⚠ Ingresa el código");return;}var lg=STATE.leagues.find(function(l){return l.code===code;});if(!lg){setErr("lg-err","⚠ Liga no encontrada");return;}if(lg.memberIds.indexOf(pid)>=0){setErr("lg-err","⚠ Ya estás en esta liga");return;}lg.memberIds.push(pid);persist();go("myscore",{pid:pid,subtab:"leagues"});}
function leaveLeague(lid,pid){var lg=STATE.leagues.find(function(l){return l.id===lid;});if(!lg||!confirm("¿Salir de esta liga?"))return;lg.memberIds=lg.memberIds.filter(function(x){return x!==pid;});if(!lg.memberIds.length)STATE.leagues=STATE.leagues.filter(function(l){return l.id!==lid;});persist();go("myscore",{pid:pid,subtab:"leagues"});}
function resetAll(){if(!confirm("¿Borrar TODO?"))return;if(!confirm("Confirmación final. ¿Proceder?"))return;STATE={participants:[],predictions:{},actuals:{},leagues:[]};try{localStorage.removeItem(LS);}catch(e){}go("landing");}

// Route for league page
var _origRender=render;
render=function(){
  var app=document.getElementById("app");
  if(!app) return;
  var p=ROUTE.page;
  if(p==="league") app.innerHTML=pgLeague(ROUTE.lid,ROUTE.pid);
  else _origRender();
  bindInputs();
};

// ── BOOT ──
render();
</script>
</body>
</html>
