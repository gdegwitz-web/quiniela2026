<script>
// Capture automatic install prompt if browser supports it
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  window._pwaPrompt=e;
  document.querySelectorAll('.pwa-install-btn').forEach(function(b){b.style.display='block';});
});
window.addEventListener('appinstalled', function(){
  window._pwaPrompt=null;
  document.querySelectorAll('.pwa-install-btn').forEach(function(b){b.style.display='none';});
  localStorage.setItem('pwa-installed','1');
});

// Show Android install banner if not already installed
(function(){
  if(localStorage.getItem('pwa-installed')) return;
  const isAndroid=/Android/i.test(navigator.userAgent);
  const isChrome=/Chrome/i.test(navigator.userAgent)&&!/EdgA|OPR|SamsungBrowser/i.test(navigator.userAgent);
  if(!isAndroid&&!isChrome) return;
  // Show banner after short delay
  setTimeout(function(){
    if(window._pwaPrompt) return; // automatic prompt available, no need for banner
    if(document.getElementById('android-install-banner')) return;
    const banner=document.createElement('div');
    banner.id='android-install-banner';
    banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#1a2540;border-top:1px solid rgba(255,200,0,.3);padding:.7rem 1rem;display:flex;align-items:center;gap:.7rem;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,.4)';

})();

// Password hashing — uses Web Crypto API (SHA-256 + salt) when available,
// falls back to djb2 for older browsers. Async but handles gracefully.
function hashPwd(s){
  // Synchronous fallback (djb2) for compatibility
  let h=5381;
  for(let i=0;i<s.length;i++) h=((h<<5)+h)^s.charCodeAt(i);
  return (h>>>0).toString(36);
}

// Stronger async hash used for NEW registrations (SHA-256 via Web Crypto)
async function hashPwdStrong(s){
  try{
    const salt="quiniela2026_fifa";
    const data=new TextEncoder().encode(salt+s);
    const hashBuf=await crypto.subtle.digest("SHA-256",data);
    const hashArr=Array.from(new Uint8Array(hashBuf));
    return "sha256:"+hashArr.map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(e){
    return hashPwd(s); // fallback
  }
}

function verifyPwd(input, stored){
  // Supports both old djb2 hashes and new SHA-256 hashes
  if(stored&&stored.startsWith("sha256:")){
    // For SHA-256 we need async — handled in doLogin
    return null; // signal: use async verification
  }
  return hashPwd(input)===stored;
}

function calcStandings(gk,scores){
  const t=GROUPS[gk],s={};
  t.forEach(x=>{s[x]={pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0}});
  MATCHES.filter(m=>m.g===gk).forEach(m=>{
    const sc=scores[m.id];
    if(!sc||sc.h===""||sc.a==="")return;
    const h=parseInt(sc.h),a=parseInt(sc.a);
    if(isNaN(h)||isNaN(a))return;
    s[m.h].pj++;s[m.a].pj++;
    s[m.h].gf+=h;s[m.h].gc+=a;s[m.h].dg+=h-a;
    s[m.a].gf+=a;s[m.a].gc+=h;s[m.a].dg+=a-h;
    if(h>a){s[m.h].pts+=3;s[m.h].pg++;s[m.a].pp++}
    else if(h<a){s[m.a].pts+=3;s[m.a].pg++;s[m.h].pp++}
    else{s[m.h].pts++;s[m.h].pe++;s[m.a].pts++;s[m.a].pe++}
  });
  return t.map(x=>({n:x,...s[x]})).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
}

function scoreGroups(pred,actual){
  let p=0;
  MATCHES.forEach(m=>{
    const pr=pred[m.id],ac=actual[m.id];
    if(!pr||!ac)return;
    const ph=parseInt(pr.h),pa=parseInt(pr.a),ah=parseInt(ac.h),aa=parseInt(ac.a);
    if(isNaN(ph)||isNaN(pa)||isNaN(ah)||isNaN(aa))return;
    if(ph===ah&&pa===aa){p+=5;return}
    const pw=ph>pa?"h":pa>ph?"a":"d",aw=ah>aa?"h":aa>ah?"a":"d";
    if(pw===aw)p+=3;
  });
  return p;
}

    if(canScoreQF){
      const actualTeams=new Set(Object.values(aKO.qf||{}).filter(Boolean));
      const pickedTeams=new Set(Object.values(ko.qf||{}).filter(Boolean));
      actualTeams.forEach(team=>{if(pickedTeams.has(team))p+=20;});
    }
    // SF/Final/Podio → score each match as it comes in
    if(canScoreFin){
      const aSF=aKO.sf||{};
      const aFinal=aKO.final||{};
      const pSF=ko.sf||{};
      const pFinal=ko.final||{};

      // +30 per correctly predicted finalist — scored as each SF result arrives
      if(aSF[0]&&pSF[0]&&[aSF[0],aSF[1]].filter(Boolean).includes(pSF[0]))p+=30;
      if(aSF[1]&&pSF[1]&&[aSF[0],aSF[1]].filter(Boolean).includes(pSF[1]))p+=30;

      // Champion (+40) — scored when final result is entered
      if(aFinal[0]&&pFinal[0]===aFinal[0])p+=40;

      // Runner-up (+30) — only derivable once both SFs AND final result are in
      const sfE2=Object.keys(aSF).length;
      if(sfE2>=2&&aFinal[0]){
        const actualFinalists=[aSF[0],aSF[1]].filter(Boolean);
        const actualRU=actualFinalists[0]===aFinal[0]?actualFinalists[1]:actualFinalists[0];
        const userRU=pFinal[0]
          ?(pSF[0]&&pSF[0]!==pFinal[0]?pSF[0]:pSF[1]&&pSF[1]!==pFinal[0]?pSF[1]:null):null;
        if(actualRU&&userRU&&userRU===actualRU)p+=30;
      }

      // 3rd place (+20) and 4th place (+10)
      const aF3=aKO.f3||{},pF3=ko.f3||{};
      if(aF3[0]&&pF3[0]===aF3[0])p+=20;
      if(aF3[1]){
        try{
          const B=buildBracket(pred.groups||{},ko);
          if(B&&B.f3){const pred4th=B.f3.h===pF3[0]?B.f3.a:B.f3.h;if(pred4th&&pred4th===aF3[1])p+=10;}
        }catch(e){}
      }
    }

    return p;
  }catch(e){return 0;}
}

      if(Bp&&Ba){
        const actR32=new Set();Ba.r32.forEach(m=>{if(m.h)actR32.add(m.h);if(m.a)actR32.add(m.a);});
        if(actR32.size>0) Bp.r32.forEach(m=>{

          if(m.a){const ok=actR32.has(m.a);rows.push({round:"Clasificados 16vos",idx:m.id+100,aTeam:ok?m.a:"—",pTeam:m.a,pts:ok?8:0,ok});}
        });
      }
    }catch(e){}
    // SF removed from per-round scoring — covered by "Clasificado a Final" below
    // R32/R16/QF: team-based (any user who predicted this team to advance gets points)
    const rounds={r32:{pts:10,label:"R32"},r16:{pts:15,label:"Octavos"},qf:{pts:20,label:"Cuartos"}};
    Object.entries(rounds).forEach(([rnd,cfg])=>{

    const aFinal=aKO.final||{}, pFinal=ko.final||{};

    // Runner-up +30: derive from SF winners (the finalist who didn't win)
    const actualRU2=(aFinal[0]&&actualFinalists.length>=2)
      ?(actualFinalists[0]===aFinal[0]?actualFinalists[1]:actualFinalists[0]):null;
    const userRU2=pFinal[0]
      ?(pSF2[0]&&pSF2[0]!==pFinal[0]?pSF2[0]:pSF2[1]&&pSF2[1]!==pFinal[0]?pSF2[1]:null):null;
    if(actualRU2) rows.push({round:"Subcampeón",idx:1,aTeam:actualRU2,pTeam:userRU2||"—",pts:(userRU2&&userRU2===actualRU2)?30:0,ok:userRU2===actualRU2});
    const aF3=aKO.f3||{}, pF3=ko.f3||{};
    // 3rd +20
    if(aF3[0]) rows.push({round:"3er lugar",idx:0,aTeam:aF3[0],pTeam:pF3[0]||"—",pts:pF3[0]===aF3[0]?20:0,ok:pF3[0]===aF3[0]});
    // 4th +10
    if(aF3[1]){
      try{
        const B=buildBracket(pred.groups||{},ko);
        if(B&&B.f3){
          const pred4th=B.f3.h===pF3[0]?B.f3.a:B.f3.h;
          rows.push({round:"4to lugar",idx:1,aTeam:aF3[1],pTeam:pred4th||"—",pts:pred4th===aF3[1]?10:0,ok:pred4th===aF3[1]});
        }
      }catch(e){}
    }
    return rows;
  }catch(e){return [];}
}

// +8 pts per team correctly predicted to advance from groups to R32
function scoreGroupAdvancement(pred){
  try{
    const actuals=STATE.actuals||{};
    const enabled=(actuals._koEnabled)||{};
    // Requires: all group matches played AND admin enabled groupAdv
    const groupMatches=MATCHES.filter(m=>m.g!=="KO");
    const playedMatches=groupMatches.filter(m=>{
      const a=actuals[m.id]; return a&&a.h!==""&&a.a!=="";
    }).length;
    if(playedMatches<groupMatches.length) return 0;
    if(!enabled.groupAdv) return 0;

    // Build brackets to get R32 teams
    const Bpred=buildBracket(pred.groups||{},pred.ko||{});
    const Bactual=buildBracket(actuals,actuals._ko||{});
    if(!Bpred||!Bactual) return 0;

    // Collect actual R32 qualifiers
    const actualR32=new Set();
    Bactual.r32.forEach(m=>{
      if(m.h) actualR32.add(m.h);
      if(m.a) actualR32.add(m.a);
    });
    if(actualR32.size===0) return 0;

    // Count correctly predicted qualifiers (+8 each)
    let pts=0;
    Bpred.r32.forEach(m=>{
      if(m.h&&actualR32.has(m.h)) pts+=8;
      if(m.a&&actualR32.has(m.a)) pts+=8;
    });
    return pts;
  }catch(e){return 0;}
}

// Total score: groups + group advancement + KO
function scoreFull(pid){
  try{
    const pred=STATE.predictions[pid]||{};
    if(!pred.groups) pred.groups={};
    if(!pred.ko) pred.ko={};
    const actuals=STATE.actuals||{};
    return scoreGroups(pred.groups,actuals)
         + scoreGroupAdvancement(pred)
         + scoreKO(pred);
  }catch(e){return 0;}
}

// Build KO bracket from group results + picks
function buildBracket(groups,ko){
  const std={};
  Object.keys(GROUPS).forEach(g=>{std[g]=calcStandings(g,groups)});
  // The 8 R32 match IDs that have a 3rd-place slot
  const THIRD_SLOTS=[1,4,6,7,8,9,12,14];

  // Auto-assign thirds using FIFA Annex C lookup table
  const allThirds=Object.keys(GROUPS).map(g=>{
    const s=std[g];return s&&s[2]?{g,team:s[2].n,pts:s[2].pts,dg:s[2].dg,gf:s[2].gf}:null;
  }).filter(Boolean).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
  const top8=allThirds.slice(0,8);
  const top8key=top8.map(t=>t.g).sort().join("");
  const thirdsMap=(top8.length>=8&&THIRDS_TABLE[top8key])||{};
  const thirdTeam={};top8.forEach(t=>{thirdTeam[t.g]=t.team;});

  const slot=(s,matchId)=>{
    if(s.t==="1")return std[s.g]?.[0]?.n||null;
    if(s.t==="2")return std[s.g]?.[1]?.n||null;
    if(s.t==="3"){
      if(thirdsMap[matchId]) return thirdTeam[thirdsMap[matchId]]||null;
      return ko.third?.[matchId]||null; // fallback to manual picks
    }
    return null;
  };
  const R32D=[
    {id:0,h:{t:"2",g:"A"},a:{t:"2",g:"B"}},{id:1,h:{t:"1",g:"E"},a:{t:"3"}},
    {id:2,h:{t:"1",g:"F"},a:{t:"2",g:"C"}},{id:3,h:{t:"1",g:"C"},a:{t:"2",g:"F"}},
    {id:4,h:{t:"1",g:"I"},a:{t:"3"}},{id:5,h:{t:"2",g:"E"},a:{t:"2",g:"I"}},
    {id:6,h:{t:"1",g:"A"},a:{t:"3"}},{id:7,h:{t:"1",g:"L"},a:{t:"3"}},
    {id:8,h:{t:"1",g:"D"},a:{t:"3"}},{id:9,h:{t:"1",g:"G"},a:{t:"3"}},
    {id:10,h:{t:"2",g:"K"},a:{t:"2",g:"L"}},{id:11,h:{t:"1",g:"H"},a:{t:"2",g:"J"}},
    {id:12,h:{t:"1",g:"B"},a:{t:"3"}},{id:13,h:{t:"1",g:"J"},a:{t:"2",g:"H"}},
    {id:14,h:{t:"1",g:"K"},a:{t:"3"}},{id:15,h:{t:"2",g:"D"},a:{t:"2",g:"G"}}
  ];

  // Build label for each slot: "1°E", "2°C", "3°?" etc.
  const slotLabel=(s,matchId)=>{
    if(s.t==="1") return "1°"+s.g;
    if(s.t==="2") return "2°"+s.g;
    if(s.t==="3"){
      if(thirdsMap[matchId]){
        // Find rank of this third among all top8
        const rank=top8.findIndex(t=>t.g===thirdsMap[matchId])+1;
        return "3°"+thirdsMap[matchId]+(rank>0?" #"+rank:"");
      }
      return "3°?";
    }
    return "";
  };

  const r32=R32D.map(m=>({
    id:m.id,
    h:slot(m.h,m.id),
    a:slot(m.a,m.id),
    hLbl:slotLabel(m.h,m.id),
    aLbl:slotLabel(m.a,m.id),
    isThird:m.h.t==="3"||m.a.t==="3",
    thirdSide:m.h.t==="3"?"h":m.a.t==="3"?"a":null
  }));
  // ── R16: only propagate team if they actually won their R32 match ──
  // r32w[i] = ko.r32[i] but validate: the picked winner must be one of the two R32 teams
  const r32wValidated=Array.from({length:16},(_,i)=>{
    const picked=ko.r32?.[i]||null;
    if(!picked) return null;
    const m=r32[i];
    // winner must be one of the two actual teams in that R32 match
    if(m&&(picked===m.h||picked===m.a)) return picked;
    return null; // stale pick — team no longer in this slot
  });

  // ── OFFICIAL FIFA R16 PAIRINGS (from FIFA match schedule) ──
  // M89 = W74 vs W77  →  r32w[1] vs r32w[4]
  // M90 = W73 vs W75  →  r32w[0] vs r32w[2]
  // M91 = W76 vs W78  →  r32w[3] vs r32w[5]
  // M92 = W79 vs W80  →  r32w[6] vs r32w[7]
  // M93 = W83 vs W84  →  r32w[10] vs r32w[11]
  // M94 = W81 vs W82  →  r32w[8]  vs r32w[9]
  // M95 = W86 vs W88  →  r32w[13] vs r32w[15]
  // M96 = W85 vs W87  →  r32w[12] vs r32w[14]
  const r32w=r32wValidated;
  const r16=[
    {id:0, h:r32w[1], a:r32w[4]},   // M89: W74 vs W77
    {id:1, h:r32w[0], a:r32w[2]},   // M90: W73 vs W75
    {id:2, h:r32w[3], a:r32w[5]},   // M91: W76 vs W78
    {id:3, h:r32w[6], a:r32w[7]},   // M92: W79 vs W80
    {id:4, h:r32w[10],a:r32w[11]},  // M93: W83 vs W84
    {id:5, h:r32w[8], a:r32w[9]},   // M94: W81 vs W82
    {id:6, h:r32w[13],a:r32w[15]},  // M95: W86 vs W88
    {id:7, h:r32w[12],a:r32w[14]},  // M96: W85 vs W87
  ];
  const r16w=Array.from({length:8},(_,i)=>{
    const picked=ko.r16?.[i]||null;
    if(!picked) return null;
    const m=r16[i];
    if(m&&(picked===m.h||picked===m.a)) return picked;
    return null;
  });

  // ── OFFICIAL FIFA QF PAIRINGS ──
  // M97 = W89 vs W90  →  r16w[0] vs r16w[1]
  // M98 = W91 vs W92  →  r16w[2] vs r16w[3]
  // M99 = W93 vs W94  →  r16w[4] vs r16w[5]
  // M100= W95 vs W96  →  r16w[6] vs r16w[7]
  const qf=[
    {id:0, h:r16w[0], a:r16w[1]},  // M97: W89 vs W90
    {id:1, h:r16w[2], a:r16w[3]},  // M98: W91 vs W92
    {id:2, h:r16w[4], a:r16w[5]},  // M99: W93 vs W94
    {id:3, h:r16w[6], a:r16w[7]},  // M100: W95 vs W96
  ];
  const qfw=Array.from({length:4},(_,i)=>{
    const picked=ko.qf?.[i]||null;
    if(!picked) return null;
    const m=qf[i];
    if(m&&(picked===m.h||picked===m.a)) return picked;
    return null;
  });

  // ── OFFICIAL FIFA SF PAIRINGS ──
  // qf[0]=M97(LEFT), qf[1]=M99(RIGHT), qf[2]=M98(LEFT), qf[3]=M100(RIGHT)
  // LEFT SF M101 = W97 vs W98 = qfw[0] vs qfw[2]
  // RIGHT SF M102 = W99 vs W100 = qfw[1] vs qfw[3]
  const sf=[
    {id:0, h:qfw[0], a:qfw[2]},  // M101: W97 vs W98 → Dallas (LEFT SF)
    {id:1, h:qfw[1], a:qfw[3]},  // M102: W99 vs W100 → Atlanta (RIGHT SF)
  ];
  const sfw=Array.from({length:2},(_,i)=>{
    const picked=ko.sf?.[i]||null;
    if(!picked) return null;
    const m=sf[i];
    if(m&&(picked===m.h||picked===m.a)) return picked;
    return null;
  });
  const fin={id:0,h:sfw[0],a:sfw[1]};
  const champion=ko.final?.[0]||null;
  const sf0L=sfw[0]?(sf[0].h===sfw[0]?sf[0].a:sf[0].h):null;
  const sf1L=sfw[1]?(sf[1].h===sfw[1]?sf[1].a:sf[1].h):null;
  const f3={id:0,h:sf0L,a:sf1L};
  return {r32,r16,qf,sf,fin,f3,champion,
    r32w,r16w,qfw,sfw,finw:ko.final||{},f3w:ko.f3||{},
    thirdPicks:ko.third||{},
    thirdMatchIds:[1,4,6,7,8,9,12,14],
    top8thirds:top8,
    allThirds,
    thirdsMap};
}

}

function renderApp(){
  const r=ROUTE,app=document.getElementById("app");
  if(!app)return;
  try{
    if(r.page==="landing")     app.innerHTML=pgLanding();
    else if(r.page==="register")    app.innerHTML=pgRegister();
    else if(r.page==="returning")   app.innerHTML=pgReturning();
    else if(r.page==="predict")     app.innerHTML=pgPredict(r.pid);
    else if(r.page==="myscore")     app.innerHTML=pgMyScore(r.pid);
    else if(r.page==="league")      app.innerHTML=pgLeague(r.lid,r.pid);
    else if(r.page==="admin_login") app.innerHTML=pgAdminLogin();
    else if(r.page==="admin"){
      if(!SESSION.isAdmin){go("admin_login");return;}
      app.innerHTML=pgAdmin(r.tab||"results");
    }
    else if(r.page==="leaderboard") app.innerHTML=pgLeaderboard(r.tab||"global");
  }catch(err){
    console.error("renderApp error:",err);
    app.innerHTML=`<div style="background:rgba(255,50,50,.1);border:1px solid rgba(255,50,50,.3);border-radius:10px;padding:1rem;margin:1rem 0">
      <div style="font-weight:700;color:#ff7070;margin-bottom:.4rem">⚠️ Error al cargar esta sección</div>
      <div style="font-size:.75rem;color:#ccc;font-family:monospace;word-break:break-all">${err.message}</div>
      <button onclick="go('landing')" style="margin-top:.7rem;padding:.4rem .8rem;background:#333;border:1px solid #555;color:#eee;border-radius:6px;cursor:pointer;font-size:.75rem">← Volver al inicio</button>
    </div>`;
  }
  // Restore bracket scroll synchronously — before browser paints
  if(_bracketScroll>0){
    const bw=document.getElementById("bracket-wrap");
    if(bw) bw.scrollLeft=_bracketScroll;
  }
  bindEvents();
}

// ── BRACKET SVG ───────────────────────────────────────
function adminBracketSVG(){
  // Build bracket from real actuals (not a participant's predictions)
  const realGroups={};
  MATCHES.forEach(m=>{
    const ac=STATE.actuals[m.id];
    if(ac&&ac.h!==""&&ac.a!=="") realGroups[m.id]=ac;
  });
  const aKO=STATE.actuals._ko||{};
  // Map _ko structure to bracket ko format
  const ko={
    r32:  aKO.r32||{},
    r16:  aKO.r16||{},
    qf:   aKO.qf||{},
    sf:   aKO.sf||{},
    final:aKO.final||{},
    f3:   aKO.f3||{},
  };
  return bracketSVG("admin",{groups:realGroups,ko});
}

function bracketSVG(pid,pred,actualKO){
  const ko=pred.ko||{};
  const B=buildBracket(pred.groups||{},ko);
  const isAdmin=(pid==="admin");
  const readonly=(pid==="view");
  const aKO=actualKO||{}; // actual KO results for point display

  // Build set of actual R32 qualifiers for +8 badges (only when admin enabled groupAdv)
  let actualR32teams=new Set();
  const groupAdvEnabled=!!(STATE.actuals&&STATE.actuals._koEnabled&&STATE.actuals._koEnabled.groupAdv);
  if(groupAdvEnabled){
    try{
      const Bactual=buildBracket(STATE.actuals||{},aKO);
      if(Bactual&&Bactual.r32){
        Bactual.r32.forEach(function(m){if(m.h)actualR32teams.add(m.h);if(m.a)actualR32teams.add(m.a);});
      }
    }catch(e){}
  }

  // Dimensions
  const TW=70,TH=26,GAP=5,RGAP=40;
  const colX=[0,TW+RGAP,(TW+RGAP)*2,(TW+RGAP)*3,(TW+RGAP)*4,(TW+RGAP)*5,(TW+RGAP)*6];
  // R32(left8), R16(left4), QF(left2), SF(left1), Final/F3, SF(right1), QF(right2), R16(right4), R32(right8)
  const cols=9;
  const svgW=(TW+RGAP)*cols+TW+20;
  
  // How many match slots per column (spacing)
  // R32: 8 matches left, 8 right → pitch 16 slots total height
  const pitchH=(TH+GAP)*16+GAP*7; // total svg height
  const svgH=pitchH+40; // +40 for labels
  
  // Y center of each match in each column
  function matchY(col,idx,total){
    // distribute `total` matches evenly over svgH-40
    const avail=svgH-40;
    const step=avail/total;
    return 30+idx*step+step/2-(TH+GAP)/2;
  }

  let svg=`<svg class="br-svg" width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<rect width="${svgW}" height="${svgH}" fill="none"/>`;

  // Round labels
  const rLabels=["16VOS","OCTAVOS","CUARTOS","SEMIS","FINAL","SEMIS","CUARTOS","OCTAVOS","16VOS"];
  const cxs=[0,1,2,3,4,5,6,7,8].map(i=>10+i*(TW+RGAP));
  rLabels.forEach((l,i)=>{
    svg+=`<text class="br-rlbl" x="${cxs[i]+TW/2}" y="18" text-anchor="middle">${l}</text>`;
  });

  // Draw a match box
  function drawMatch(rid,mid,x,y,h,a,winner,hLbl,aLbl,actualWinner,pts,earnedSet,earnedPts){
    const isWin_h=winner===h&&h;
    const isWin_a=winner===a&&a;
    const hitH=actualWinner&&h&&actualWinner===h; // actual result confirms h
    const hitA=actualWinner&&a&&actualWinner===a;
    const missH=actualWinner&&h&&actualWinner!==h&&isWin_h; // picked h but wrong
    const missA=actualWinner&&a&&actualWinner!==a&&isWin_a;
    const hCls=h?(hitH?"win actual-win":(isWin_h&&!actualWinner?"win":"")):"tbd";
    const aCls=a?(hitA?"win actual-win":(isWin_a&&!actualWinner?"win":"")):"tbd";
    const hTxt=h?trunc(h,9):"TBD";
    const aTxt=a?trunc(a,9):"TBD";
    const clickH=(!readonly&&h)?`onclick="${isAdmin?`pickAdminKO('${rid}',${mid},'${h}')`:`pickBracket('${pid}','${rid}',${mid},'${h}')`}"`:""
    const clickA=(!readonly&&a)?`onclick="${isAdmin?`pickAdminKO('${rid}',${mid},'${a}')`:`pickBracket('${pid}','${rid}',${mid},'${a}')`}"`:""
    // +pts badge: shown in the DESTINATION round box (teams that earned pts for being HERE)
    const earnedLabel=(earnedSet&&readonly&&earnedPts)?(
      (h&&earnedSet.has(h)?`<text x="${x+TW-3}" y="${y+TH/2+4}" font-size="6.5" text-anchor="end" fill="#4de0a0" font-weight="bold">+${earnedPts}</text>`:"")
      +(a&&earnedSet.has(a)?`<text x="${x+TW-3}" y="${y+TH+2+TH/2+4}" font-size="6.5" text-anchor="end" fill="#4de0a0" font-weight="bold">+${earnedPts}</text>`:"")
    ):"";
    const wrongLabel="";    // +8 badges for correctly predicted R32 qualifiers (teams in R32 = destination from groups)
    const adv8=(readonly&&rid==="r32"&&actualR32teams.size>0);
    const adv8Label=adv8?(
      (h&&actualR32teams.has(h)?`<text x="${x+2}" y="${y+TH/2+4}" font-size="6" text-anchor="start" fill="#ffd580" font-weight="bold">+8</text>`:"")
      +(a&&actualR32teams.has(a)?`<text x="${x+2}" y="${y+TH+2+TH/2+4}" font-size="6" text-anchor="start" fill="#ffd580" font-weight="bold">+8</text>`:"")
    ):"";
    let s="";
    const cx=x+TW/2; // horizontal center
    // Home
    s+=`<g class="br-team ${hCls}" ${clickH}>
      <rect x="${x}" y="${y}" width="${TW}" height="${TH}" rx="3"/>
      ${hLbl&&rid==="r32"
        ? `<text x="${cx}" y="${y+TH/2-1}" font-size="9.5" text-anchor="middle">${hTxt}</text>
           <text x="${cx}" y="${y+TH/2+8}" font-size="6.5" text-anchor="middle" fill="rgba(255,255,255,.38)">${hLbl}</text>`
        : `<text x="${cx}" y="${y+TH/2+3.5}" font-size="9.5" text-anchor="middle">${hTxt}</text>`
      }
    </g>`;
    // Away
    s+=`<g class="br-team ${aCls}" ${clickA}>
      <rect x="${x}" y="${y+TH+2}" width="${TW}" height="${TH}" rx="3"/>
      ${aLbl&&rid==="r32"
        ? `<text x="${cx}" y="${y+TH+2+TH/2-1}" font-size="9.5" text-anchor="middle">${aTxt}</text>
           <text x="${cx}" y="${y+TH+2+TH/2+8}" font-size="6.5" text-anchor="middle" fill="rgba(255,255,255,.38)">${aLbl}</text>`
        : `<text x="${cx}" y="${y+TH+2+TH/2+3.5}" font-size="9.5" text-anchor="middle">${aTxt}</text>`
      }
    </g>`;
    // divider
    s+=`<line x1="${x+1}" y1="${y+TH+1}" x2="${x+TW-1}" y2="${y+TH+1}" stroke="rgba(255,255,255,.1)" stroke-width="1"/>`;
    // points badges
    s+=wrongLabel+earnedLabel+adv8Label;
    return s;
  }

  // connector line from match output to next round input
  function connector(x1,y1,x2,y2){
    const mx=(x1+x2)/2;
    return `<path class="br-line" d="M${x1},${y1} H${mx} V${y2} H${x2}"/>`;
  }

  const matchH=TH*2+2; // full height of one match card

  // Visual order from official FIFA bracket image (top to bottom):
  // LEFT: M74,M77, M73,M75, M83,M84, M81,M82
  const leftR32Order=[1,4,0,2,10,11,8,9];
  const leftR32Vis=leftR32Order.map(i=>B.r32[i]);

  // RIGHT: M76,M78, M79,M80, M86,M88, M85,M87
  const rightR32Order=[3,5,6,7,13,15,12,14];
  const rightR32Vis=rightR32Order.map(i=>B.r32[i]);

  // R16 visual order matches adjacent R32 pairs:
  // LEFT R16 (top to bottom): M89(id0),M90(id1),M93(id4),M94(id5)
  // RIGHT R16 (top to bottom): M91(id2),M92(id3),M95(id6),M96(id7)
  const leftR16=[B.r16[0],B.r16[1],B.r16[4],B.r16[5]];
  const rightR16=[B.r16[2],B.r16[3],B.r16[6],B.r16[7]];

  // QF visual order:
  // LEFT QF (top to bottom): M97(id0) from M89+M90, M99(id2) from M93+M94 -- wait
  // M97 = W89 vs W90 → feeds from left R16 rows 0,1
  // M98 = W93 vs W94 → feeds from left R16 rows 2,3 (M93,M94 are left R16 rows 2,3)
  // But M98 in QF is officially W91 vs W92... let me recheck
  // QF M97=W89vsW90, M98=W93vsW94 (from regs: M98=W93vsW94? No! M98=W91vsW92)
  // Regs: M97=W89vsW90, M98=W93vsW94? No: M97=W89vsW90(id0vsid1), M98=W93vsW94? 
  // From regs: M98 = W93(id4) vs W94(id5) -- but regs say M98=W91vsW92(id2vsid3)
  // Let me re-read: QF: M97=W89vsW90, M98=W93vsW94? 
  // Official: M97=W89vsW90(r16[0]vsr16[1]), M99=W91vsW92(r16[2]vsr16[3])
  //           M98=W93vsW94(r16[4]vsr16[5]), M100=W95vsW96(r16[6]vsr16[7])
  // So left QF visual (feeds left SF M101=W97vsW98): M97(id0), M98(id2? No id1?)
  // M97 feeds from leftR16[0,1]=M89,M90 → visual rows 0,1 of left R16
  // M98: reg says W93vsW94=r16[4]vsr16[5] → leftR16 rows 2,3 ✓
  // But wait - QF array: qf[0]=M97(r16w[0]vsR16w[1]), qf[1]=M98(r16w[2]vsR16w[3])
  // r16w[2]=M91winner, r16w[3]=M92winner → these are RIGHT side R16!
  // So M98 uses RIGHT R16 winners → M98 is on RIGHT side visually
  // Let me re-examine SF: M101=W97vsW98 → must be on same SF side
  // Image shows trophy in center with SF feeding into it from both sides
  // Left SF feeds from: left half of bracket
  // Left half visible rows in image: M74,M77,M73,M75 → M89,M90 → M97
  //                                  M76,M78,M79,M80 → M91,M92 → M99
  // M101 = W97 vs W99? No! M101=W97vsW98 per regs
  // This is getting complex. Use the EXACT reg order for QF:
  // qf[0]=M97, qf[1]=M98, qf[2]=M99, qf[3]=M100
  // Left visual QF must show matches whose winners meet in same SF
  // M101(SF1) = W97 vs W98 → qf[0] and qf[1] meet → show on same side
  // M102(SF2) = W99 vs W100 → qf[2] and qf[3] meet → show on same side
  const leftQF=[B.qf[0],B.qf[2]];   // M97(W89vsW90), M99(W93vsW94) → both feed left SF side
  const rightQF=[B.qf[1],B.qf[3]];  // M98(W91vsW92), M100(W95vsW96) → both feed right SF side

  const leftData=[
    {rid:"r32",matches:leftR32Vis, winners:B.r32w, n:8,col:0},
    {rid:"r16",matches:leftR16,    winners:B.r16w, n:4,col:1},
    {rid:"qf", matches:leftQF,     winners:B.qfw,  n:2,col:2},
    {rid:"sf", matches:B.sf.slice(0,1), winners:B.sfw, n:1,col:3},
  ];
  const rightData=[
    {rid:"r32",matches:rightR32Vis,winners:B.r32w, n:8,col:8},
    {rid:"r16",matches:rightR16,   winners:B.r16w, n:4,col:7},
    {rid:"qf", matches:rightQF,    winners:B.qfw,  n:2,col:6},
    {rid:"sf", matches:B.sf.slice(1,2), winners:B.sfw, n:1,col:5},
  ];

  // Points per round for view mode badges
  const roundPts={r32:10,r16:15,qf:20,sf:30,final:40,f3:20};

  // Teams user correctly predicted per round (team-based) — shown in DESTINATION box
  function mkEarned(actualRound,userPickRound){
    const actSet=new Set(Object.values(actualRound||{}).filter(Boolean));
    const pkSet=new Set(Object.values(userPickRound||{}).filter(Boolean));
    const out=new Set();actSet.forEach(t=>{if(pkSet.has(t))out.add(t);});return out;
  }
  const koP=(!isAdmin&&pred)?(pred.ko||{}):{};
  const earnedR32=mkEarned(aKO.r32,koP.r32); // shown in R16 box (+10)
  const earnedR16=mkEarned(aKO.r16,koP.r16); // shown in QF box  (+15)
  const earnedQF =mkEarned(aKO.qf, koP.qf);  // shown in SF box  (+20)
  const earnedSF =mkEarned(aKO.sf, koP.sf);  // shown in Final   (+30)

  // earnedSet/earnedPts for each round's DESTINATION display
  const destEarned={r16:[earnedR32,10],qf:[earnedR16,15],sf:[earnedQF,20]};

  function renderSide(data){
    data.forEach(({rid,matches,winners,n,col})=>{
      const x=cxs[col];
      const actualRound=aKO[rid]||{};
      const [dSet,dPts]=destEarned[rid]||[null,0];
      matches.forEach((m,i)=>{
        const y=matchY(col,i,n);
        const w=winners[m.id]||null;
        const actualW=actualRound[m.id]||null;
        svg+=drawMatch(rid,m.id,x,y,m.h,m.a,w,m.hLbl||"",m.aLbl||"",actualW,roundPts[rid],dSet,dPts);
      });
    });
  }



  renderSide(leftData);
  renderSide(rightData);
  // Straight connectors: R32→R16→QF→SF each side feeds its own SF
  [[0,1],[1,2],[2,3]].forEach(([ci,ni])=>{
    // LEFT side
    const lc=leftData[ci],ln=leftData[ni];
    for(let i=0;i<lc.n;i+=2){
      const y0=matchY(lc.col,i,lc.n)+matchH-TH;
      const y1=matchY(lc.col,i+1,lc.n)+matchH-TH;
      const yn=matchY(ln.col,i/2,ln.n)+matchH/2;
      const x0=cxs[lc.col]+TW, x1=cxs[ln.col], mx=(x0+x1)/2;
      svg+=`<polyline class="br-line" points="${x0},${y0} ${mx},${y0} ${mx},${yn} ${x1},${yn}"/>`;
      svg+=`<polyline class="br-line" points="${x0},${y1} ${mx},${y1} ${mx},${yn} ${x1},${yn}"/>`;
    }
    // RIGHT side
    const rc=rightData[ci],rn=rightData[ni];
    for(let i=0;i<rc.n;i+=2){
      const y0=matchY(9-rc.col-1,i,rc.n)+matchH-TH;
      const y1=matchY(9-rc.col-1,i+1,rc.n)+matchH-TH;
      const yn=matchY(9-rn.col-1,i/2,rn.n)+matchH/2;
      const x0=cxs[rc.col], x1=cxs[rn.col]+TW, mx=(x0+x1)/2;
      svg+=`<polyline class="br-line" points="${x0},${y0} ${mx},${y0} ${mx},${yn} ${x1},${yn}"/>`;
      svg+=`<polyline class="br-line" points="${x0},${y1} ${mx},${y1} ${mx},${yn} ${x1},${yn}"/>`;
    }
  });

  // ── CENTER: Final + F3 ──
  const centerX=cxs[4];
  const finY=svgH/2-matchH-10;
  const f3Y=svgH/2+10;
  const finW=B.fin.h,finA=B.fin.a,finWin=B.finw[0]||null;
  const f3W=B.f3.h,f3A=B.f3.a,f3Win=B.f3w[0]||null;

  // Final label
  svg+=`<text class="br-rlbl" x="${centerX+TW/2}" y="${finY-6}" text-anchor="middle" fill="#ffc800">⚽ FINAL</text>`;
  svg+=drawMatch("final",0,centerX,finY,finW,finA,finWin,"","",aKO.final?aKO.final[0]:null,40,earnedSF,30);

  // 3rd place label
  svg+=`<text class="br-rlbl" x="${centerX+TW/2}" y="${f3Y-6}" text-anchor="middle" fill="#cd7f32">🥉 3ER LUGAR</text>`;
  svg+=drawMatch("f3",0,centerX,f3Y,f3W,f3A,f3Win,"","",aKO.f3?aKO.f3[0]:null,20,null,0);

  // Champion banner
  if(B.champion){
    svg+=`<rect class="br-champ" x="${centerX-4}" y="${f3Y+matchH+8}" width="${TW+8}" height="22" rx="4"/>`;
    svg+=`<text class="br-champ-txt" x="${centerX+TW/2}" y="${f3Y+matchH+15}">🏆 CAMPEÓN</text>`;
    svg+=`<text class="br-champ-txt" x="${centerX+TW/2}" y="${f3Y+matchH+24}" font-size="8">${trunc(B.champion,10)}</text>`;
  }

  // SF→Final connectors
  const sfLy=matchY(3,0,1)+matchH/2;
  const sfRy=matchY(5,0,1)+matchH/2;
  svg+=`<polyline class="br-line" points="${cxs[3]+TW},${sfLy} ${centerX},${sfLy} ${centerX},${finY+TH/2}"/>`;
  svg+=`<polyline class="br-line" points="${cxs[5]},${sfRy} ${centerX+TW},${sfRy} ${centerX+TW},${finY+TH+2+TH/2}"/>`;
  svg+=`</svg>`;

  // ── Top 8 thirds panel ──
  const medals=["🥇","🥈","🥉","4°","5°","6°","7°","8°"];
  const thirdsPanel=B.top8thirds&&B.top8thirds.length>0?`
  <div style="background:rgba(255,200,0,.06);border:1px solid rgba(255,200,0,.18);border-radius:10px;padding:.6rem .8rem;margin-bottom:.6rem">
    <div style="font-size:.65rem;letter-spacing:1.5px;color:#ffc800;font-weight:700;margin-bottom:.45rem">🟡 8 MEJORES TERCEROS (según tus predicciones)</div>
    <div style="display:flex;flex-wrap:wrap;gap:.25rem">
      ${B.top8thirds.map((t,i)=>`
      <div style="display:flex;align-items:center;gap:.3rem;background:rgba(255,255,255,.06);border-radius:6px;padding:.2rem .45rem">
        <span style="font-size:.65rem;color:#889">${medals[i]}</span>
        <span style="font-size:.72rem">${f(t.team)}</span>
        <span style="font-size:.72rem;font-weight:600;color:#eee">${trunc(t.team,8)}</span>
        <span style="font-size:.6rem;color:#667">Gr.${t.g}</span>
        <span style="font-size:.6rem;color:#ffc80088">${t.pts}pts</span>
      </div>`).join("")}
    </div>
    ${B.top8thirds&&B.top8thirds.length>=8&&B.allThirds?`<div style="font-size:.6rem;color:#556;margin-top:.3rem">No clasifican: ${B.allThirds.slice(8).map(t=>f(t.team)+" "+trunc(t.team,7)+" (Gr."+t.g+")").join(" · ")}</div>`:""}
  </div>`:"";

  return `<div style="position:relative">
    <button onclick="document.getElementById('bracket-wrap').scrollBy({left:-140,behavior:'smooth'})"
      style="position:absolute;left:0;top:50%;transform:translateY(-50%);z-index:10;background:rgba(20,24,36,.9);border:1px solid rgba(255,255,255,.2);color:#ffc800;border-radius:50%;width:28px;height:28px;font-size:1.1rem;cursor:pointer;line-height:1;padding:0">‹</button>
    <button onclick="document.getElementById('bracket-wrap').scrollBy({left:140,behavior:'smooth'})"

function doRegister(){
  const name=val("rn"),email=val("re"),qname=val("rq");
  const pwd=document.getElementById("rp")?.value||"";
  const pwd2=document.getElementById("rp2")?.value||"";
  let ok=true;
  if(!name){setErr("en","⚠ Ingresa tu nombre");ok=false}else setErr("en","");
  if(!email||!email.includes("@")){setErr("ee","⚠ Correo inválido");ok=false}else setErr("ee","");
  if(!qname){setErr("eq","⚠ Ponle nombre a tu quiniela");ok=false}else setErr("eq","");
  if(pwd.length<4){setErr("ep","⚠ Mínimo 4 caracteres");ok=false}else setErr("ep","");
  if(pwd!==pwd2){setErr("ep2","⚠ Las contraseñas no coinciden");ok=false}else setErr("ep2","");
  // Check if email already registered
  if(ok&&STATE.participants.find(p=>p.email&&p.email.toLowerCase()===email.toLowerCase())){
    setErr("ee","⚠ Este correo ya tiene una quiniela registrada");ok=false;
  }
  if(!ok)return;
  const pid=uid();
  STATE.participants.push({id:pid,name,email:email.toLowerCase(),hidden:false});
  // Use strong SHA-256 hash for new registrations
  hashPwdStrong(pwd).then(function(hash){
    STATE.predictions[pid]={groups:{},ko:{},quinName:qname,pwdHash:hash,submitted:false};
    SESSION.pid=pid;
    go("predict",{pid});
    setTimeout(function(){ fbWriteParticipant(pid); },50);
  });
}

function doLogin(){
  const email=val("li-email").toLowerCase();
  const pwd=document.getElementById("li-pwd")?.value||"";
  setErr("li-eerr","");setErr("li-perr","");
  if(!email){setErr("li-eerr","⚠ Ingresa tu correo");return}
  if(!pwd){setErr("li-perr","⚠ Ingresa tu contraseña");return}
  const p=STATE.participants.find(x=>x.email&&x.email.toLowerCase()===email&&!x.hidden);
  if(!p){setErr("li-eerr","⚠ No encontramos una quiniela con ese correo");return}
  const pred=STATE.predictions[p.id]||{};
  const stored=pred.pwdHash;
  if(!stored){setErr("li-perr","⚠ Contraseña no configurada");return}

  function doNav(){
    SESSION.pid=p.id;
    if(!pred.submitted) go("predict",{pid:p.id});
    else go("myscore",{pid:p.id});
  }

  if(stored.startsWith("sha256:")){
    // New strong SHA-256 hash
    hashPwdStrong(pwd).then(function(hash){
      if(hash!==stored){setErr("li-perr","⚠ Contraseña incorrecta");return;}
      doNav();
    });
  } else {
    // Legacy djb2 — still works for existing participants
    if(hashPwd(pwd)!==stored){setErr("li-perr","⚠ Contraseña incorrecta");return;}
    doNav();
  }
}

function pgPredict(pid){
  // Security: require active session
  if(SESSION.pid!==pid){go("returning");return"";}
  const p=STATE.participants.find(x=>x.id===pid);
  if(!p){go("landing");return""}
  if(p.paid===false) return pgPaymentWall(p);

  const pred=STATE.predictions[pid]||{groups:{},ko:{},quinName:"",submitted:false};

// ── DEADLINE: predicciones bloqueadas después de las 3PM ET ──
  if(new Date() >= REGISTRATION_DEADLINE && !ROUTE.adminOverride && !SESSION.isAdmin){
    if((STATE.predictions[pid]||{}).submitted){
      go('myscore',{pid}); return '';
    }
    return `<div style="min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center">

      </div>

    </div>`;
  }

  if(!pred.groups) pred.groups={};
  if(!pred.ko) pred.ko={};
  const tab=ROUTE.subtab||"groups";
  const grp=ROUTE.grp||"A";
  const filled=MATCHES.filter(m=>{const s=(pred.groups||{})[m.id];return s&&s.h!==""&&s.a!=="";}).length;

  // ── Completeness check — detailed per section ──
  const ko=pred.ko||{};

  // Groups: all 72 matches
  const groupsDone = filled===MATCHES.length;
  const groupsMissing = MATCHES.length - filled;

  // R32: only the 8 non-third-place slots need picks (thirds are automatic)
  const nonThirdIds=[0,2,3,5,10,11,13,15];
  const r32RegPicks=nonThirdIds.filter(id=>(ko.r32||{})[id]).length;
  const r32RegDone = r32RegPicks>=8;

  // R16: 8 matches
  const r16Count=Object.keys(ko.r16||{}).length;
  const r16Done = r16Count>=8;

  // QF: 4 matches
  const qfCount=Object.keys(ko.qf||{}).length;
  const qfDone = qfCount>=4;

  // SF: 2 matches
  const sfCount=Object.keys(ko.sf||{}).length;
  const sfDone = sfCount>=2;

  // Final: 1 match
  const finalCount=Object.keys(ko.final||{}).length;
  const finalDone = finalCount>=1;

  // 3rd place match: 1
  const f3Count=Object.keys(ko.f3||{}).length;
  const f3Done = f3Count>=1;

  const bracketDone = r32RegDone && r16Done && qfDone && sfDone && finalDone && f3Done;
  const allDone = groupsDone && bracketDone;

  // Detailed missing list
  const missing=[];
  if(!groupsDone) missing.push(`⚽ Grupos: faltan ${groupsMissing} partido${groupsMissing!==1?"s":""}`);
  if(!r32RegDone) missing.push(`⚔️ 16vos: ${8-r32RegPicks} partido${8-r32RegPicks!==1?"s":""} sin ganador`);
  if(!r16Done) missing.push(`🎯 Octavos: ${8-r16Count} partido${8-r16Count!==1?"s":""} sin ganador`);
  if(!qfDone) missing.push(`🏟 Cuartos: ${4-qfCount} partido${4-qfCount!==1?"s":""} sin ganador`);
  if(!sfDone) missing.push(`🔥 Semis: ${2-sfCount} partido${2-sfCount!==1?"s":""} sin ganador`);
  if(!finalDone) missing.push(`⚽ Final: sin campeón seleccionado`);
  if(!f3Done) missing.push(`🥉 3er lugar: sin seleccionar`);

  let body="";
  if(tab==="groups"){
    const rows=calcStandings(grp,pred.groups||{});
    const gm=MATCHES.filter(m=>m.g===grp);
    body=`<div class="grp-tabs">${Object.keys(GROUPS).map(g=>`<button class="gtab${g===grp?" on":""}" onclick="go('predict',{pid:'${pid}',subtab:'groups',grp:'${g}'})">${g}</button>`).join("")}</div>
    <div style="font-size:.7rem;letter-spacing:2px;color:#667;margin:.4rem 0 .25rem">GRUPO ${grp}</div>
    ${gm.map(m=>{const s=(pred.groups||{})[m.id]||{h:"",a:""};
      return `<div class="match">

`;

function hoyTab(pid,pred){
  // DEV SIMULATION: force date to Jun 13 for testing (remove before launch)
  const _simDate=window._simDate||null;
  const now=_simDate?new Date(_simDate):new Date();
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const todayStr=months[now.getMonth()]+" "+now.getDate();
  const todayMatches=MATCHES.filter(m=>m.date===todayStr)
    .sort((a,b)=>{
      const ta=MATCH_UTC[a.id]?new Date(MATCH_UTC[a.id]).getTime():0;
      const tb=MATCH_UTC[b.id]?new Date(MATCH_UTC[b.id]).getTime():0;
      return ta-tb;
    });

  if(todayMatches.length===0){
    const allDates=[...new Set(MATCHES.map(m=>m.date))];
    const todayHasKO=Object.values(KO_MATCH_UTC).some(slots=>Object.values(slots).some(utc=>new Date(utc).toDateString()===now.toDateString()));
    if(!todayHasKO) return `<div style="text-align:center;padding:1.5rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;margin:.5rem 0">
      <div style="font-size:2rem;margin-bottom:.5rem">📅</div>
      <div style="font-weight:700;font-size:.9rem;color:#ffc800;margin-bottom:.3rem">No hay partidos hoy</div>
      <div style="font-size:.75rem;color:#889">Hoy es ${todayStr}. Los partidos del Mundial son del ${allDates[0]} al ${allDates[allDates.length-1]}.</div>
    </div>`;
  }

  // ── Get all participants in same leagues as this user ──
  const myLeagues=STATE.leagues.filter(l=>l.memberIds.includes(pid));
  // Collect all league-mates (union of all leagues, excluding hidden)
  const leagueMateIds=[...new Set(
    myLeagues.flatMap(l=>l.memberIds)
      .filter(id=>{
        const p2=STATE.participants.find(x=>x.id===id);
        return !p2?.hidden && STATE.predictions[id]?.submitted;
      })
  )];
  const hasLeague=leagueMateIds.length>1;

  // ── Per-match consensus stats ──
  function matchStats(mid){
    if(!hasLeague) return null;
    const preds=leagueMateIds
      .map(id=>STATE.predictions[id]?.groups?.[mid])
      .filter(s=>s&&s.h!==""&&s.a!=="");
    if(preds.length===0) return null;
    const total=preds.length;

    // Count results: h=local wins, a=away wins, d=draw
    let hWins=0,aWins=0,draws=0;
    const scoreCount={};
    preds.forEach(s=>{
      const h=parseInt(s.h),a=parseInt(s.a);
      if(h>a) hWins++;
      else if(h<a) aWins++;
      else draws++;
      const key=s.h+"-"+s.a;
      scoreCount[key]=(scoreCount[key]||0)+1;
    });

    // Most common score
    const topScore=Object.entries(scoreCount).sort((a,b)=>b[1]-a[1])[0];
    const topScoreStr=topScore?topScore[0]:null;
    const topScoreCount=topScore?topScore[1]:0;
    const topScorePct=Math.round(topScoreCount/total*100);

    return {
      total,
      hPct:Math.round(hWins/total*100),
      dPct:Math.round(draws/total*100),
      aPct:Math.round(aWins/total*100),
      topScore:topScoreStr,
      topScorePct,
      topScoreCount,
    };
  }

  // ── Progress bar helper ──
  function pctBar(hPct,dPct,aPct,hTeam,aTeam){
    return `<div style="margin-top:.55rem">
      <div style="display:flex;border-radius:5px;overflow:hidden;height:6px;gap:1px">
        ${hPct>0?`<div style="background:#4de0a0;width:${hPct}%;transition:width .4s"></div>`:""}
        ${dPct>0?`<div style="background:#ffc800;width:${dPct}%;transition:width .4s"></div>`:""}
        ${aPct>0?`<div style="background:#88aaff;width:${aPct}%;transition:width .4s"></div>`:""}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:.25rem;font-size:.62rem;color:#889">
        <span style="color:#4de0a0">${f(hTeam)} ${hPct}%</span>
        <span style="color:#ffc800">Empate ${dPct}%</span>
        <span style="color:#88aaff">${aPct}% ${f(aTeam)}</span>
      </div>
    </div>`;
  }

  // ── Build match rows ──
  let dayPts=0;
  const matchRows=todayMatches.map(m=>{
    const pr=pred.groups?.[m.id];
    const ac=STATE.actuals?.[m.id];
    let pts=0, badge="", status="";

    if(pr&&ac&&pr.h!==""&&pr.a!==""&&ac.h!==""&&ac.a!==""){
      const ph=parseInt(pr.h),pa=parseInt(pr.a),ah=parseInt(ac.h),aa=parseInt(ac.a);
      if(ph===ah&&pa===aa){
        pts=5; badge=`<span style="background:#00c853;color:#000;border-radius:4px;padding:.1rem .4rem;font-size:.7rem;font-weight:700">+5 ⭐</span>`;
        status="exact";
      } else {
        const pw=ph>pa?"h":pa>ph?"a":"d", aw=ah>aa?"h":aa>ah?"a":"d";
        if(pw===aw){
          pts=3; badge=`<span style="background:#0080ff;color:#fff;border-radius:4px;padding:.1rem .4rem;font-size:.7rem;font-weight:700">+3</span>`;
          status="win";
        } else {
          badge=`<span style="background:rgba(255,100,100,.2);color:#ff8080;border-radius:4px;padding:.1rem .4rem;font-size:.7rem;font-weight:700">0</span>`;
          status="miss";
        }
      }
      dayPts+=pts;
    } else if(ac&&ac.h!==""&&ac.a!==""){
      badge=`<span style="color:#667;font-size:.7rem">Sin predicción</span>`;
    } else if(pr&&pr.h!==""&&pr.a!==""){
      badge=`<span style="color:#889;font-size:.7rem">Pendiente</span>`;
      status="pending";
    }

    const borderCol=status==="exact"?"rgba(0,200,83,.35)":status==="win"?"rgba(0,128,255,.35)":status==="miss"?"rgba(255,100,100,.2)":"rgba(255,255,255,.08)";
    const bgCol=status==="exact"?"rgba(0,200,83,.07)":status==="win"?"rgba(0,128,255,.06)":status==="miss"?"rgba(255,100,100,.05)":"rgba(255,255,255,.04)";

    const stats=matchStats(m.id);

    return `<div style="background:${bgCol};border:1px solid ${borderCol};border-radius:12px;padding:.85rem .9rem;margin:.5rem 0">

      <!-- Group + status header -->
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem">
        <span style="font-size:.65rem;font-weight:700;background:rgba(255,200,0,.1);color:#ffc800;border-radius:4px;padding:.1rem .5rem">GRUPO ${m.g}</span>
        ${matchTime(m.id)?`<span style="font-size:.68rem;font-weight:600;color:#eee">⏱ ${matchTime(m.id)}</span>`:''}
        <span style="font-size:.65rem;color:#556;margin-left:auto">${m.date||""}</span>
        ${ac&&ac.h!==""?`<span style="font-size:.65rem;font-weight:700;color:#4de0a0">✓ FT</span>`:
          `<span style="font-size:.65rem;color:#667">⏳ Pendiente</span>`}
      </div>

      <!-- Teams & score -->
      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.5rem;margin-bottom:.7rem">
        <div style="min-width:0">
          <div style="font-size:1rem">${f(m.h)}</div>
          <div style="font-size:.85rem;font-weight:700;color:#eee;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.h}</div>
        </div>
        <div style="text-align:center;min-width:52px">
          ${ac&&ac.h!==""
            ? `<div style="font-size:1.35rem;font-weight:800;color:#eee;line-height:1">${ac.h} : ${ac.a}</div><div style="font-size:.6rem;color:#667;margin-top:2px">resultado</div>`
            : `<div style="font-size:.85rem;color:#445;font-weight:600">vs</div>`
          }
        </div>
        <div style="text-align:right;min-width:0">
          <div style="font-size:1rem">${f(m.a)}</div>
          <div style="font-size:.85rem;font-weight:700;color:#eee;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.a}</div>
        </div>
      </div>

      <!-- My prediction + points badge -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:.5rem;padding:.55rem .7rem;background:rgba(255,200,0,.06);border:1px solid rgba(255,200,0,.15);border-radius:8px;margin-bottom:${stats?".6rem":".0rem"}">
        <div>
          <div style="font-size:.62rem;color:#ffc80088;font-weight:700;letter-spacing:.5px;margin-bottom:2px">MI PREDICCIÓN</div>
          <div style="font-size:1.2rem;font-weight:800;color:${pr&&pr.h!==""?"#ffc800":"#445"};line-height:1">${pr&&pr.h!==""?pr.h+" - "+pr.a:"—"}</div>
        </div>
        <div>${badge}</div>
      </div>

      <!-- League consensus -->
      ${stats?`
      <div style="border-top:1px solid rgba(255,255,255,.08);padding-top:.6rem">
        <div style="font-size:.68rem;color:#667;letter-spacing:.5px;margin-bottom:.5rem;font-weight:600">CONSENSO DE LA LIGA · ${stats.total} quiniela${stats.total!==1?"s":""}</div>
        <div style="display:flex;gap:.35rem;margin-bottom:.4rem">
          <div style="flex:${stats.hPct||1};background:rgba(77,224,160,.12);border:1px solid rgba(77,224,160,.25);border-radius:8px;padding:.45rem .4rem;text-align:center;min-width:0">
            <div style="font-size:1.2rem;font-weight:800;color:#4de0a0;line-height:1">${Math.round(stats.total*(stats.hPct/100))}</div>
            <div style="font-size:.65rem;color:#4de0a0;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f(m.h)} ${stats.hPct}%</div>
          </div>
          <div style="flex:${stats.dPct||1};background:rgba(255,200,0,.08);border:1px solid rgba(255,200,0,.18);border-radius:8px;padding:.45rem .4rem;text-align:center;min-width:0">
            <div style="font-size:1.2rem;font-weight:800;color:#ffc800;line-height:1">${Math.round(stats.total*(stats.dPct/100))}</div>
            <div style="font-size:.65rem;color:#ffc800;margin-top:3px">Empate ${stats.dPct}%</div>
          </div>
          <div style="flex:${stats.aPct||1};background:rgba(136,170,255,.08);border:1px solid rgba(136,170,255,.2);border-radius:8px;padding:.45rem .4rem;text-align:center;min-width:0">
            <div style="font-size:1.2rem;font-weight:800;color:#88aaff;line-height:1">${Math.round(stats.total*(stats.aPct/100))}</div>
            <div style="font-size:.65rem;color:#88aaff;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${stats.aPct}% ${f(m.a)}</div>
          </div>
        </div>
        <div style="display:flex;border-radius:4px;overflow:hidden;height:5px;gap:1px;margin-bottom:.4rem">
          ${stats.hPct>0?`<div style="background:#4de0a0;width:${stats.hPct}%"></div>`:""}
          ${stats.dPct>0?`<div style="background:#ffc800;width:${stats.dPct}%"></div>`:""}
          ${stats.aPct>0?`<div style="background:#88aaff;width:${stats.aPct}%"></div>`:""}
        </div>
        ${stats.topScore?`<div style="font-size:.72rem;color:#889">
          Marcador más votado: <span style="background:rgba(255,200,0,.1);color:#ffc800;border-radius:4px;padding:2px 8px;font-weight:700;font-size:.78rem">${stats.topScore}</span>
          <span style="color:#556">(${stats.topScoreCount} de ${stats.total} · ${stats.topScorePct}%)</span>
        </div>`:""}
      </div>`:""}
    </div>`;
  });

  const playedToday=todayMatches.filter(m=>{const ac=STATE.actuals?.[m.id];return ac&&ac.h!=="";}).length;

  // ── KO matches today ──
  const rndLabel={r32:"⚡ 16VOS DE FINAL",r16:"⚡ OCTAVOS DE FINAL",qf:"⚡ CUARTOS DE FINAL",sf:"⚡ SEMIFINAL",f3:"⚡ TERCER LUGAR",final:"🏆 FINAL"};
  const rndPts={r32:10,r16:15,qf:20,sf:30,f3:20,final:40};
  const aKO=(STATE.actuals&&STATE.actuals._ko)||{};
  let koRows="",todayKOcount=0;
  let B2=null;try{B2=buildBracket(STATE.actuals||{},aKO);}catch(e){}
  ["r32","r16","qf","sf","f3","final"].forEach(rnd=>{
    const slots=KO_MATCH_UTC[rnd]||{};
    Object.entries(slots).sort((a,b)=>new Date(a[1])-new Date(b[1])).forEach(([idx,utc])=>{
      if(new Date(utc).toDateString()!==now.toDateString()) return;
      todayKOcount++;
      const time=new Date(utc).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
      const actual=aKO[rnd]&&aKO[rnd][+idx];
      let teamH=null,teamA=null;
      try{
        if(rnd==="r32"&&B2?.r32){const m=B2.r32.find(m=>m.id===+idx);if(m){teamH=m.h;teamA=m.a;}}
        else if(rnd==="r16"&&B2?.r16){const m=B2.r16[+idx];if(m){teamH=m.h;teamA=m.a;}}
        else if(rnd==="qf"&&B2?.qf){const m=B2.qf[+idx];if(m){teamH=m.h;teamA=m.a;}}
        else if(rnd==="sf"&&B2?.sf){const m=B2.sf[+idx];if(m){teamH=m.h;teamA=m.a;}}
        else if(rnd==="final"&&B2?.final){teamH=B2.final.h;teamA=B2.final.a;}
        else if(rnd==="f3"&&B2?.f3){teamH=B2.f3.h;teamA=B2.f3.a;}
      }catch(e){}
      const userPick=(pred.ko||{})[rnd]&&(pred.ko||{})[rnd][+idx];
      const isCorrect=actual&&userPick&&actual===userPick;
      const isWrong=actual&&userPick&&actual!==userPick;
      koRows+=`<div style="background:rgba(136,170,255,.04);border:1px solid rgba(136,170,255,.15);border-radius:10px;padding:.65rem .8rem;margin-bottom:.45rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem">
          <span style="font-size:.6rem;font-weight:700;letter-spacing:1px;color:#88aaff">${rndLabel[rnd]||rnd.toUpperCase()} · +${rndPts[rnd]||0}</span>
          <span style="font-size:.72rem;color:#889">⏱ ${time}</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.88rem;font-weight:700;margin-bottom:.35rem">
          <span>${teamH?f(teamH)+" "+teamH:"TBD"}</span>
          <span style="font-size:.65rem;color:#556;font-weight:400">vs</span>
          <span>${teamA?teamA+" "+f(teamA):"TBD"}</span>
        </div>
        ${actual?`<div style="text-align:center;font-size:.7rem;color:#ffc800;margin-bottom:.25rem">✅ Avanza: ${f(actual)} ${actual}</div>`:""}
        ${userPick?`<div style="text-align:center;font-size:.68rem;color:${isCorrect?"#4de0a0":isWrong?"#ff8080":"#889"}">Tu pick: ${f(userPick)} ${userPick}${isCorrect?" ✓ +"+rndPts[rnd]+" pts":isWrong?" ✗":""}</div>`:'<div style="text-align:center;font-size:.65rem;color:#445">Sin predicción para esta ronda</div>'}
      </div>`;
    });
  });

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
    <div>
      <div style="font-size:.75rem;font-weight:700;letter-spacing:1px;color:#ffc800">📅 ${todayStr.toUpperCase()}</div>
      <div style="font-size:.68rem;color:#889">${todayMatches.length+todayKOcount} partido${todayMatches.length+todayKOcount!==1?"s":""} hoy · ${playedToday} jugado${playedToday!==1?"s":""}</div>
    </div>
    <button onclick="showHelp()" style="background:rgba(255,200,0,.1);border:1px solid rgba(255,200,0,.25);border-radius:8px;color:#ffc800;font-size:.72rem;font-weight:700;padding:.3rem .7rem;cursor:pointer;flex-shrink:0">❓ Puntuación</button>
  </div>
  ${!hasLeague?`<div style="font-size:.7rem;color:#667;margin-bottom:.5rem;text-align:center;font-style:italic">Únete a una liga para ver el consenso de los demás participantes</div>`:""}
  ${matchRows.join("")}${koRows}`;
}

// ── Central tiebreaker: pts → group pts → exactos → submittedAt (earlier = better) ──
function tiebreakScore(pid){
  const pred=STATE.predictions[pid]||{};
  const actuals2=STATE.actuals||{};
  let exact=0,gpts=0;
  MATCHES.forEach(function(m){
    const pr=(pred.groups||{})[m.id],ac=actuals2[m.id];
    if(!pr||pr.h===""||!ac||ac.h==="") return;
    if(+pr.h===+ac.h&&+pr.a===+ac.a){exact++;gpts+=5;}
    else{const r1=+pr.h>+pr.a?"H":+pr.h<+pr.a?"A":"D",r2=+ac.h>+ac.a?"H":+ac.h<+ac.a?"A":"D";if(r1===r2)gpts+=3;}
  });
  const submittedAt=pred.submittedAt?new Date(pred.submittedAt).getTime():Number.MAX_SAFE_INTEGER;
  return {pts:lgScore(pid),gpts:gpts,exact:exact,submittedAt:submittedAt};
}
function cmpRank(a,b){
  // 1° total pts desc, 2° group pts desc, 3° exactos desc, 4° submittedAt asc
  return (b.pts-a.pts)||((b.gpts||0)-(a.gpts||0))||((b.exact||0)-(a.exact||0))||((a.submittedAt||0)-(b.submittedAt||0));
}

  const medals=["🥇","🥈","🥉"];

  const snapDate=STATE.actuals&&STATE.actuals._rankSnapDate;
  const today=new Date().toISOString().slice(0,10);
  const yesterday=new Date(Date.now()-864e5).toISOString().slice(0,10);
  const snapValid=snapDate===today||snapDate===yesterday;
  const crybabies=Array.isArray(lg.crybabies)?lg.crybabies:lg.crybaby?[lg.crybaby]:[];
  const inversas=Array.isArray(lg.inversas)?lg.inversas:[];

  if(!lg){setErr("lg-join-err","⚠ Código no encontrado. Verifica con quien te invitó.");return;}
  if(lg.memberIds.includes(pid)){setErr("lg-join-err","⚠ Ya eres miembro de esta liga.");return;}
  lg.memberIds.push(pid);
  localStorage.setItem(LS,JSON.stringify(STATE));
  fbWriteLeague(lid);
  go("league",{lid:lg.id,pid});
}

function leaveLeague(lid,pid){
  if(!confirm("¿Salir de esta liga?"))return;
  const lg=STATE.leagues.find(l=>l.id===lid);
  if(!lg)return;
  lg.memberIds=lg.memberIds.filter(x=>x!==pid);
  if(lg.memberIds.length===0) STATE.leagues=STATE.leagues.filter(l=>l.id!==lid);
  localStorage.setItem(LS,JSON.stringify(STATE));
  fbDeleteLeague(lid);
  go("myscore",{pid,subtab:"leagues"});
}

function deleteLeague(lid,pid){
  if(!confirm("¿Eliminar esta liga para todos?"))return;
  STATE.leagues=STATE.leagues.filter(l=>l.id!==lid);
  localStorage.setItem(LS,JSON.stringify(STATE));
  fbDeleteLeague(lid);
  go("myscore",{pid,subtab:"leagues"});
}

function adminChartToggle(pid){
  const selPids=(ROUTE.chartPids||[]).slice();
  const idx=selPids.indexOf(pid);
  const sub=(STATE.participants||[]).filter(function(p){return STATE.predictions[p.id]&&STATE.predictions[p.id].submitted&&!p.hidden;});
  const allPids=sub.map(function(p){return p.id;});
  let next;
  if(selPids.length===0){
    // all shown — deselect this one (show all except pid)
    next=allPids.filter(function(x){return x!==pid;});
  } else if(idx>=0){
    // currently selected — remove it
    next=selPids.filter(function(x){return x!==pid;});
    if(next.length===0) next=[]; // empty = show all
  } else {
    // not selected — add it
    next=selPids.concat([pid]);
    if(next.length===allPids.length) next=[]; // all selected = reset
  }
  go('admin',{tab:'stats',statsLgId:ROUTE.statsLgId||'',chartPids:next});
}

function adminChartToggle(pid){
  const ps2=(STATE.participants||[]).filter(function(p){return !p.hidden;});
  const sub=ps2.filter(function(p){return STATE.predictions[p.id]&&STATE.predictions[p.id].submitted;});
  const allPids=sub.map(function(p){return p.id;});
  const current=ROUTE.chartPids&&ROUTE.chartPids.length>0?ROUTE.chartPids:allPids;
  var next;
  if(pid===''){next=[];}
  else if(current.includes(pid)){
    const removed=current.filter(function(x){return x!==pid;});
    next=removed.length>0?removed:[];
  } else {next=[...current,pid];}
  const store=next.length===allPids.length?[]:next;
  go('admin',{tab:'stats',statsLgId:ROUTE.statsLgId||'',chartPids:store});
}

function adminProgressChart(ps){
  const actuals=STATE.actuals||{};
  const played=MATCHES.filter(function(m){const a=actuals[m.id];return a&&a.h!==''&&a.a!=='';})
    .sort(function(a,b){
      const ta=MATCH_UTC[a.id]?new Date(MATCH_UTC[a.id]).getTime():0;
      const tb=MATCH_UTC[b.id]?new Date(MATCH_UTC[b.id]).getTime():0;
      return ta-tb;
    });
  if(played.length<2) return "<div style='padding:.8rem;text-align:center;font-size:.72rem;color:#445'>El gr\u00e1fico estar\u00e1 disponible cuando haya al menos 2 partidos jugados.</div>";
  const dayMap={};
  played.forEach(function(m){
    const day=(MATCH_UTC[m.id]||'?').slice(0,10);
    if(!dayMap[day])dayMap[day]=[];
    dayMap[day].push(m);
  });
  const days=Object.keys(dayMap).sort();
  const cumAct={};
  const checkpoints=days.map(function(day){
    dayMap[day].forEach(function(m){cumAct[m.id]=actuals[m.id];});
    return {day:day,snap:Object.assign({},cumAct)};
  });
  const sub=ps.filter(function(p){return STATE.predictions[p.id]&&STATE.predictions[p.id].submitted;});
  if(!sub.length) return '';
  const COLORS=['#ffc800','#4de0a0','#88aaff','#ff8080','#c084fc','#fb923c','#34d399','#f472b6','#60a5fa','#a3e635'];
  const allPids=sub.map(function(p){return p.id;});
  const rawPids=ROUTE.chartPids;
  const selPids=(rawPids&&rawPids.length>0)?rawPids:allPids;
  const series=sub.map(function(p,i){
    const positions=checkpoints.map(function(cp){
      const scores=sub.map(function(q){
        const qp=STATE.predictions[q.id]||{};
        let ex=0,cor=0;
        Object.keys(cp.snap).forEach(function(mid){
          const pr=(qp.groups||{})[mid],ac=cp.snap[mid];
          if(!pr||pr.h===""||!ac||ac.h==="")return;
          if(+pr.h===+ac.h&&+pr.a===+ac.a)ex++;
          else{const r1=+pr.h>+pr.a?"H":+pr.h<+pr.a?"A":"D",r2=+ac.h>+ac.a?"H":+ac.h<+ac.a?"A":"D";if(r1===r2)cor++;}
        });
        return {pid:q.id,pts:scoreGroups(qp.groups||{},cp.snap),exact:ex,correct:cor,name:q.name};
      }).sort(cmpRank);
      return scores.findIndex(function(x){return x.pid===p.id;})+1||sub.length;
    });
    return {pid:p.id,name:p.name,positions:positions,color:COLORS[i%COLORS.length],active:selPids.includes(p.id)};
  });
  const activeSeries=series.filter(function(s){return s.active;});
  const nP=sub.length,n=checkpoints.length;
  const W=340,H=200,pL=28,pR=18,pT=10,pB=32;
  const cw=W-pL-pR,ch=H-pT-pB;
  const xS=function(i){return pL+(n===1?cw/2:(i/(n-1))*cw);};
  const yS=function(pos){return pT+(pos-1)/(nP-1||1)*ch;};
  var svg="<svg viewBox='0 0 "+W+" "+H+"' style='width:100%;max-width:"+W+"px;display:block'>";
  for(var pos=1;pos<=nP;pos++){
    const y=yS(pos);
    svg+="<line x1='"+pL+"' y1='"+y+"' x2='"+(W-pR)+"' y2='"+y+"' stroke='rgba(255,255,255,"+(pos===1?".2":".06")+")' stroke-width='1' stroke-dasharray='"+(pos===1?"":"3,2")+"'/>";
    svg+="<text x='"+(pL-4)+"' y='"+(y+4)+"' font-size='8' text-anchor='end' fill='"+(pos===1?"#ffc800":"#445")+"'>"+pos+"\u00b0</text>";
  }
  days.forEach(function(day,i){
    if(n>12&&i%2!==0)return;
    svg+="<text x='"+xS(i)+"' y='"+(H-pB+12)+"' font-size='7' text-anchor='middle' fill='#445'>"+day.slice(5).replace("-","/")+  "</text>";
  });
  svg+="<line x1='"+pL+"' y1='"+pT+"' x2='"+pL+"' y2='"+(H-pB)+"' stroke='rgba(255,255,255,.15)' stroke-width='1'/>";
  svg+="<line x1='"+pL+"' y1='"+(H-pB)+"' x2='"+(W-pR)+"' y2='"+(H-pB)+"' stroke='rgba(255,255,255,.15)' stroke-width='1'/>";
  activeSeries.forEach(function(s){
    var d="M"+xS(0)+" "+yS(s.positions[0]);
    s.positions.forEach(function(v,i){if(i>0)d+=" L"+xS(i)+" "+yS(v);});
    svg+="<path d='"+d+"' fill='none' stroke='"+s.color+"' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/>";
    s.positions.forEach(function(v,i){svg+="<circle cx='"+xS(i)+"' cy='"+yS(v)+"' r='3' fill='"+s.color+"'/>";});
    svg+="<text x='"+(W-pR+2)+"' y='"+(yS(s.positions[n-1])+3)+"' font-size='7.5' fill='"+s.color+"' font-weight='bold'>"+s.positions[n-1]+"\u00b0</text>";
  });
  svg+="</svg>";
  const selector="<div style='display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px'>"
    +series.map(function(s){
      const on=s.active;
      return "<button onclick=\"adminChartToggle('"+s.pid+"')\" style='padding:3px 9px;border-radius:6px;border:2px solid "+s.color+";background:"+(on?"rgba(255,255,255,.1)":"transparent")+";color:"+(on?s.color:"rgba(255,255,255,.2)")+";font-size:.68rem;font-weight:"+(on?700:400)+";cursor:pointer;text-decoration:"+(on?"none":"line-through")+"'>"+s.name+"</button>";
    }).join("")
    +"<button onclick=\"adminChartToggle('')\" style='padding:3px 7px;border-radius:6px;border:1px solid rgba(255,255,255,.15);color:#667;font-size:.65rem;cursor:pointer;margin-left:2px'>\u21ba</button>"
    +"</div>";
  return "<div style='background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:.75rem .85rem;margin-bottom:.9rem'>"
    +"<div style='font-size:.68rem;letter-spacing:2px;color:#ffc800;font-weight:700;margin-bottom:4px'>\ud83d\udcc8 EVOLUCI\u00d3N DE POSICIONES</div>"
    +"<div style='font-size:.62rem;color:#556;margin-bottom:8px'>1\u00b0 = l\u00edder \u00b7 click para mostrar/ocultar \u00b7 \u21ba = todos</div>"
    +selector
    +(activeSeries.length?svg:"<div style='text-align:center;font-size:.72rem;color:#445;padding:1rem'>Selecciona al menos un participante</div>")
    +"</div>";
}


function adminStats(ps, selLgId){
  const leagues=STATE.leagues||[];

  // League selector tabs
  const lgTabsHTML=leagues.length>1?`<div style="display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none">
    <button onclick="go('admin',{tab:'stats'})"
      style="flex-shrink:0;padding:5px 10px;border-radius:7px;border:1px solid ${!selLgId?'rgba(255,200,0,.4)':'rgba(255,255,255,.1)'};background:${!selLgId?'rgba(255,200,0,.12)':'rgba(255,255,255,.04)'};color:${!selLgId?'#ffc800':'#889'};font-size:.7rem;font-weight:${!selLgId?700:400};cursor:pointer">
      Todos
    </button>
    ${leagues.map(l=>{const on=l.id===selLgId;return`<button onclick="go('admin',{tab:'stats',statsLgId:'${l.id}'})"
      style="flex-shrink:0;padding:5px 10px;border-radius:7px;border:1px solid ${on?'rgba(255,200,0,.4)':'rgba(255,255,255,.1)'};background:${on?'rgba(255,200,0,.12)':'rgba(255,255,255,.04)'};color:${on?'#ffc800':'#889'};font-size:.7rem;font-weight:${on?700:400};cursor:pointer;white-space:nowrap">
      ${l.name}
    </button>`;}).join("")}
  </div>`:""

  // Filter participants by selected league
  const selLg=leagues.find(l=>l.id===selLgId);
  const filteredPs=selLg?ps.filter(p=>selLg.memberIds.includes(p.id)):ps;

  // Only use submitted participants
  const sub=filteredPs.filter(p=>STATE.predictions[p.id]?.submitted);
  if(sub.length<2) return `<div class="card">${lgTabsHTML}<div style="text-align:center;padding:1.5rem">
    <div style="font-size:2rem;margin-bottom:.5rem">📈</div>
    <div style="font-weight:700;color:#ffc800;margin-bottom:.3rem">Estadísticas${selLg?' — '+selLg.name:''}</div>
    <div style="font-size:.78rem;color:#889">Disponible cuando haya al menos 2 quinielas enviadas${selLg?' en esta liga':''}.</div>
  </div></div>`;

  const medals=["🥇","🥈","🥉"];
  const playedMatches=MATCHES.filter(m=>{const a=STATE.actuals[m.id];return a&&a.h!==""&&a.a!=="";});

  // ── Per-participant stats ──
  const ranked=sub.map(p=>{
    const pred=STATE.predictions[p.id];
    let exact=0,correct=0,wrong=0,pts=0;
    playedMatches.forEach(m=>{
      const pr=pred.groups?.[m.id], ac=(STATE.actuals||{})[m.id];
      if(!pr||pr.h===""||pr.a==="") return;
      const ph=parseInt(pr.h),pa=parseInt(pr.a),ah=parseInt(ac.h),aa=parseInt(ac.a);
      if(ph===ah&&pa===aa){exact++;pts+=5;}
      else{const pw=ph>pa?"h":pa>ph?"a":"d",aw=ah>aa?"h":aa>ah?"a":"d";if(pw===aw){correct++;pts+=3;}else wrong++;}
    });
    const tb=tiebreakScore(p.id); // full tiebreaker including gpts, submittedAt
    return {...p,exact,correct,wrong,pts:tb.pts,gpts:tb.gpts,submittedAt:tb.submittedAt,played:exact+correct+wrong};
  }).sort(cmpRank);

  const totalPlayed=playedMatches.length;

  // ── Most predicted score per match (consensus) ──
  const hotMatches=playedMatches.slice(-6).map(m=>{
    const ac=STATE.actuals[m.id];
    const sc={};
    sub.forEach(p=>{const pr=STATE.predictions[p.id]?.groups?.[m.id];if(pr&&pr.h!=="")sc[pr.h+"-"+pr.a]=(sc[pr.h+"-"+pr.a]||0)+1;});
    const top=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0];
    return {m,ac,topPred:top?top[0]:null,topN:top?top[1]:0,total:sub.length};
  }).filter(x=>x.topPred);

  // ── Most common champion pick ──
  const champCount={};
  sub.forEach(p=>{const B=buildBracket(STATE.predictions[p.id]?.groups||{},STATE.predictions[p.id]?.ko||{});if(B.champion)champCount[B.champion]=(champCount[B.champion]||0)+1;});

function adminSetInversa(lgId, pid){
  const lg=STATE.leagues.find(l=>l.id===lgId);
  if(!lg) return;
  if(!Array.isArray(lg.inversas)) lg.inversas=[];
  if(pid==='CLEAR'){
    lg.inversas=[];
    showFlash("😅 Coronas de la inversa retiradas");
  } else {
    const idx=lg.inversas.indexOf(pid);
    if(idx>=0){
      lg.inversas.splice(idx,1);
      const p=STATE.participants.find(x=>x.id===pid);
      showFlash("😅 "+p?.name+" ya no es el Rey de la Inversa");
    } else {
      lg.inversas.push(pid);
      const p=STATE.participants.find(x=>x.id===pid);
      showFlash("🙃 ¡"+p?.name+" coronado/a Rey de la Inversa!");
    }
  }
  fbWriteLeague(lgId);
  go("admin",{tab:"stats",statsLgId:ROUTE.statsLgId||""});
}

function adminSetCrybaby(lgId, pid){
  const lg=STATE.leagues.find(l=>l.id===lgId);
  if(!lg) return;
  // Migrate legacy single crybaby to array
  if(!Array.isArray(lg.crybabies)) lg.crybabies=lg.crybaby?[lg.crybaby]:[];
  delete lg.crybaby; // remove legacy field

  if(pid==='CLEAR'){
    lg.crybabies=[];
    showFlash("😅 Todas las coronas lloronas retiradas");
  } else {
    const idx=lg.crybabies.indexOf(pid);
    if(idx>=0){
      lg.crybabies.splice(idx,1);
      const p=STATE.participants.find(x=>x.id===pid);
      showFlash("😅 Corona retirada a "+p?.name);
    } else {
      lg.crybabies.push(pid);
      const p=STATE.participants.find(x=>x.id===pid);
      showFlash("😭 "+p?.name+" coronado/a como llorón!");
    }
  }
  fbWriteLeague(lgId);
  go("admin",{tab:"stats",statsLgId:ROUTE.statsLgId||""});
}

function bindEvents(){
  // Prediction score inputs — update live with standings
  document.querySelectorAll(".si-pred").forEach(inp=>{
    inp.addEventListener("input",function(){
      const mid=+this.dataset.mid,side=this.dataset.side;
      const pid=ROUTE.pid;if(!pid)return;
      const pred=STATE.predictions[pid];if(!pred)return;
      if(!pred.groups)pred.groups={};
      pred.groups[mid]={...pred.groups[mid]||{h:"",a:""},[side]:this.value};
      STATE.predictions[pid]=pred;
      fbWriteParticipant(pid);
      // Update standings table live
      const grp=MATCHES.find(m=>m.id===mid)?.g;
      const el=document.getElementById("st-"+grp);
      if(el)el.innerHTML=stTable(calcStandings(grp,pred.groups||{}));
    });
  });
  // Admin actual score inputs — update standings live
  document.querySelectorAll(".si-actual").forEach(inp=>{
    inp.addEventListener("input",function(){
      const mid=+this.dataset.mid,side=this.dataset.side;
      if(!STATE.actuals)STATE.actuals={};
      STATE.actuals[mid]={...STATE.actuals[mid]||{h:"",a:""},[side]:this.value};
      const grp=MATCHES.find(m=>m.id===mid)?.g;
      const el=document.getElementById("ast-"+grp);
      if(el)el.innerHTML=stTable(calcStandings(grp,STATE.actuals));
    });
  });
}

    showFlash("⛔ El registro ya cerró a las 3:00 PM ET");

  }

  go("myscore",{pid});
  setTimeout(function(){
    fbWriteParticipant(pid);

  },50);

function sendConfirmationEmail(pid){
  const p=STATE.participants.find(x=>x.id===pid);
  const pred=STATE.predictions[pid]||{};
  if(!pred.groups) pred.groups={};
  if(!pred.ko) pred.ko={};
  if(!p||!p.email) return;

  // Rate limit: only send once per participant
  if(pred.emailSent){ console.log("Email already sent, skipping"); return; }

  // Basic email validation
  if(!p.email.includes("@")||!p.email.includes(".")) return;

  const B=buildBracket(pred.groups||{},pred.ko||{});
  const champion=B.champion||"—";
  const runner=B.fin&&B.champion?(B.fin.h===B.champion?B.fin.a:B.fin.h)||"—":"—";
  const third=B.f3w&&B.f3w[0]?B.f3w[0]:"—";

  const submittedAt=pred.submittedAt?new Date(pred.submittedAt):new Date();
  const submitStr=submittedAt.toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"})
    +" "+submittedAt.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});

  // ── Build groups summary (all 72 matches) ──
  const groupsLines=Object.keys(GROUPS).map(gk=>{
    const gm=MATCHES.filter(m=>m.g===gk);
    const rows=gm.map(m=>{
      const s=pred.groups?.[m.id];
      const score=s&&s.h!==""&&s.a!==""?s.h+"-"+s.a:"?-?";
      return trunc(m.h,10)+" "+score+" "+trunc(m.a,10);
    }).join(" | ");
    return "Grupo "+gk+": "+rows;
  }).join("\n");

  // ── Build bracket summary by round ──
  const r32w=B.r32w||{}, r16w=B.r16w||{}, qfw=B.qfw||{}, sfw=B.sfw||{};
  const r32teams=Object.values(r32w).filter(Boolean).join(", ")||"—";
  const r16teams=Object.values(r16w).filter(Boolean).join(", ")||"—";
  const qfteams=Object.values(qfw).filter(Boolean).join(", ")||"—";
  const sfteams=Object.values(sfw).filter(Boolean).join(", ")||"—";

  const params={
    to_email:     p.email,
    email:        p.email,        // matches {{email}} in EmailJS template "To Email" field
    from_name:    p.name,
    from_email:   p.email,
    quinName:     pred.quinName||"Mi Quiniela",
    submitted_at: submitStr,
    champion:     champion,
    runner_up:    runner,
    third_place:  third,
    admin_email:  "gdegwitz@gmail.com",
    groups_summary: groupsLines,
    r32_teams:    r32teams,
    r16_teams:    r16teams,
    qf_teams:     qfteams,
    sf_teams:     sfteams,
  };

  emailjs.send("service_tl7ami5","template_748pynh",params)
    .then(function(){
      console.log("✅ Email enviado a "+p.email);
      // Mark as sent — prevents duplicate sends
      STATE.predictions[pid].emailSent=true;
      localStorage.setItem(LS,JSON.stringify(STATE));
      showFlash("📧 Confirmación enviada a "+p.email);
    })
    .catch(function(e){
      console.warn("Email failed:",e);
    });
}

function pickBracket(pid,round,matchId,team){
  const pred=STATE.predictions[pid];if(!pred)return;
  if(!pred.ko)pred.ko={};
  if(!pred.ko[round])pred.ko[round]={};
  if(pred.ko[round][matchId]===team)delete pred.ko[round][matchId];
  else pred.ko[round][matchId]=team;
  fbWriteParticipant(pid);
  go("predict",{pid,subtab:"bracket"});
}

function adminPushToFirebase(){
  const raw=localStorage.getItem("q2026");
  if(!raw){showFlash("⚠️ No hay datos locales para subir");return;}
  if(!window._fbDB){showFlash("⚠️ Firebase no conectado");return;}
  if(!confirm("¿Subir los datos locales de este dispositivo a Firebase?"))return;
  try{
    const d=JSON.parse(raw);
    STATE.participants=d.participants||[];
    STATE.predictions=d.predictions||{};
    STATE.actuals=d.actuals||{};
    STATE.leagues=(d.leagues||[]).map(function(lg){
      return Object.assign({},lg,{memberIds:lg.memberIds?(Array.isArray(lg.memberIds)?lg.memberIds:Object.values(lg.memberIds)):[]});
    });
    fbWriteAdmin();
    fbWriteActuals();
    // Also write all predictions
    if(window._fbDB){
      const updates={};
      Object.entries(STATE.predictions||{}).forEach(function(e){if(e[0]&&e[1])updates["predictions/"+e[0]]=e[1];});
      if(Object.keys(updates).length>0) window._fbDB.ref("q2026").update(updates);
    }
    showFlash("✅ Datos subidos a Firebase — "+STATE.participants.length+" participantes restaurados");
    go("admin",{tab:"participants"});
  }catch(e){
    showFlash("❌ Error: "+e.message);
  }
}
