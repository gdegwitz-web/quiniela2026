  // Clear local state and session
  STATE={participants:[],predictions:{},actuals:{},leagues:[]};
  localStorage.removeItem(LS);
  localStorage.removeItem(SESSION_KEY);
  localStorage.removeItem("q2026_lastReset");

  // Clear Firebase — each node individually (required by security rules)
  if(window._fbDB){
    window._fbDB.ref("q2026/actuals").remove().catch(function(){});
    // Note: participants, predictions, leagues must be deleted individually
    // or from Firebase Console since rules don't allow bulk delete
  }

  showFlash("✓ Caché local borrado. Borra participantes desde Firebase Console si es necesario.");
  go("landing");
}

// ── MONTE CARLO PROBABILITY SIMULATION ──────────────────
// Poisson double model calibrated from Betfair/DraftKings/Polymarket (Jun 2026)
// Each entry: matchId → [lambdaHome, lambdaAway]
const MATCH_LAMBDAS={
  1:[2.1,.55],2:[1.4,1.25],3:[1.55,1.1],4:[.65,1.8],5:[2.0,.6],6:[1.5,.8],
  7:[1.65,1.0],8:[.85,1.75],9:[1.8,.75],10:[1.6,1.1],11:[1.55,1.45],12:[1.1,1.55],
  13:[2.3,.75],14:[.7,1.75],15:[2.5,.5],16:[1.45,1.3],17:[2.2,.6],18:[1.6,.95],
  19:[1.7,.95],20:[1.0,1.5],21:[1.85,.7],22:[1.3,1.4],23:[1.9,.8],24:[1.4,1.1],
  25:[3.5,.35],26:[1.35,1.25],27:[2.8,.5],28:[1.2,1.5],29:[3.0,.45],30:[2.0,.7],
  31:[2.0,.85],32:[1.5,1.1],33:[2.2,.7],34:[1.45,1.3],35:[2.1,.8],36:[1.4,1.35],
  37:[2.3,.7],38:[1.45,1.2],39:[2.5,.55],40:[1.7,.85],41:[2.4,.65],42:[1.5,1.2],
  43:[3.2,.4],44:[1.15,1.55],45:[3.0,.45],46:[1.4,1.45],47:[2.8,.55],48:[1.75,.8],
  49:[2.9,.45],50:[1.3,1.2],51:[3.1,.4],52:[1.5,1.1],53:[3.0,.5],54:[1.6,1.05],
  55:[3.0,.4],56:[1.65,1.15],57:[2.7,.55],58:[1.8,.7],59:[2.8,.5],60:[1.7,.9],
  61:[2.5,.55],62:[1.45,1.35],63:[2.6,.6],64:[1.4,1.4],65:[2.4,.7],66:[1.55,1.2],
  67:[2.1,.75],68:[1.5,1.3],69:[2.2,.7],70:[1.4,1.35],71:[2.15,.8],72:[1.6,1.1]
};

// Precompute Poisson PMFs (cached factorials)
const _FACT=[1]; function _fact(n){while(_FACT.length<=n)_FACT.push(_FACT[_FACT.length-1]*_FACT.length);return _FACT[n]||Infinity;}
function _poisson(k,l){return Math.exp(-l)*Math.pow(l,k)/_fact(k);}

// Build score probability table for a match
function _buildDist(lH,lA){
  const sc={};let pH=0,pD=0,pA=0;
  for(let h=0;h<=8;h++)for(let a=0;a<=8;a++){
    const p=_poisson(h,lH)*_poisson(a,lA);
    sc[h+'-'+a]=p;
    if(h>a)pH+=p;else if(h===a)pD+=p;else pA+=p;
  }
  return {sc,pH,pD,pA};
}
const _DISTS={};
Object.entries(MATCH_LAMBDAS).forEach(([id,[lH,lA]])=>{_DISTS[id]=_buildDist(lH,lA);});

// Sample a single match outcome: returns [h, a]
function _sampleMatch(id){
  const d=_DISTS[id]; if(!d) return [1,1];
  const r=Math.random(); let cum=0;
  for(let h=0;h<=8;h++)for(let a=0;a<=8;a++){
    cum+=d.sc[h+'-'+a]||0; if(r<=cum) return [h,a];
  }
  return [1,0];
}

// Calculate points a prediction gets for a given actual result
function _matchPts(pred,ah,aa){
  if(!pred||pred.h===""||pred.a==="") return 0;
  const ph=+pred.h,pa=+pred.a;
  if(ph===ah&&pa===aa) return 5;
  const pr=ph>pa?'H':ph<pa?'A':'D', ar=ah>aa?'H':ah<aa?'A':'D';
  return pr===ar?3:0;
}

// Run Monte Carlo simulation for a league (async, updates DOM)
// Team strength ratings for KO simulation (calibrated from Betfair/DraftKings Jun 2026)
// Team strength ratings calibrated from FanDuel/DraftKings championship odds (jun 24 2026)
// Francia +360 > España +500 > Inglaterra +600 > Argentina +650 > Portugal +1000 > Brasil+Alemania +1300 ...
const TEAM_STR={
  'Francia':100,'España':88,'Inglaterra':84,'Argentina':82,
  'Portugal':75,'Alemania':74,'Brasil':72,
  'Países Bajos':68,'EE.UU.':57,'Noruega':55,'Colombia':55,
  'Marruecos':54,'Japón':52,'México':51,'Bélgica':50,
  'Uruguay':50,'Suiza':43,'Canadá':43,
  'Australia':42,'Turquía':42,'Escocia':42,'Chequia':42,
  'Suecia':41,'Croacia':41,'C. de Marfil':40,
  'Corea del Sur':39,'Ecuador':38,'Argelia':38,'Senegal':38,
  'Bosnia-Herz.':38,'Paraguay':38,'Austria':37,
  'Egipto':37,'Túnez':36,'Irán':36,'Ghana':36,
  'Arabia Saudita':33,'Sudáfrica':33,'Nueva Zelanda':33,'Irak':32,
  'Jordania':30,'Qatar':30,'R.D. Congo':35,'Cabo Verde':35,
  'Uzbekistán':31,'Haití':28,'Curazao':28
};

// Simulate a KO match (no draws — extra time/penalties included)
function _simKOMatch(tH,tA){
  if(!tH||!tA) return tH||tA||null;
  const sH=TEAM_STR[tH]||65, sA=TEAM_STR[tA]||65;
  return Math.random()<sH/(sH+sA)?tH:tA;
}

// Fixed bracket progression indices (FIFA 2026 official bracket)
// R16_PAIRS[i] = [r32_idxA, r32_idxB]
const _R16P=[[1,4],[0,2],[3,5],[6,7],[10,11],[8,9],[13,15],[12,14]];
const _QFP=[[0,1],[2,3],[4,5],[6,7]];
const _SFP=[[0,2],[1,3]];

// Simulate full tournament once, returns {simActuals, simKO, r32Teams}
function _simFullTournament(){
  // Build simActuals: use confirmed results + sample pending
  const simA={};
  MATCHES.forEach(m=>{
    const a=(STATE.actuals||{})[m.id];
    if(a&&a.h!==""&&a.a!=="") simA[m.id]=a;
    else{ const[h,aa]=_sampleMatch(m.id); simA[m.id]={h,a:aa}; }
  });

  // Get R32 pairings using buildBracket with simulated group results
  let r32Matches;
  try{ r32Matches=buildBracket(simA,{}).r32; }catch(e){ return null; }
  if(!r32Matches||r32Matches.length<16) return null;

  // R32 qualifiers set
  const r32Teams=new Set(r32Matches.flatMap(m=>[m.h,m.a].filter(Boolean)));

  // Confirmed KO actuals from admin
  const aKO=(STATE.actuals&&STATE.actuals._ko)||{};

  // Use confirmed result if admin entered it, otherwise simulate by team strength
  const ko=(rnd,i,tH,tA)=>(aKO[rnd]||{})[i] || _simKOMatch(tH,tA);

  // KO rounds — confirmed results are fixed, pending ones are simulated
  const r32w=r32Matches.map((m,i)=>ko('r32',i,m.h,m.a));
  const r16w=_R16P.map(([a,b],i)=>ko('r16',i,r32w[a],r32w[b]));
  const qfw=_QFP.map(([a,b],i)=>ko('qf',i,r16w[a],r16w[b]));
  const sfw=_SFP.map(([a,b],i)=>ko('sf',i,qfw[a],qfw[b]));
  const sfL=_SFP.map(([a,b],i)=>qfw[a]===sfw[i]?qfw[b]:qfw[a]);

  const champion = (aKO.final||{})[0] || _simKOMatch(sfw[0],sfw[1]);
  const runnerUp  = (aKO.final||{})[1] || (sfw[0]===champion?sfw[1]:sfw[0]);
  const third     = (aKO.f3||{})[0]   || _simKOMatch(sfL[0],sfL[1]);
  const fourth    = (aKO.f3||{})[1]   || (sfL[0]===third?sfL[1]:sfL[0]);

  return{
    simA,
    simKO:{
      r32:Object.fromEntries(r32w.map((w,i)=>[i,w])),
      r16:Object.fromEntries(r16w.map((w,i)=>[i,w])),
      qf: Object.fromEntries(qfw.map((w,i)=>[i,w])),
      sf: {0:sfw[0],1:sfw[1]},
      final:{0:champion,1:runnerUp},
      f3: {0:third,1:fourth}
    },
    r32Teams
  };
}

// Score a participant against one simulated tournament
function _scoreOneSim(pid,sim,currentPts,playedIds,predR32Teams,pred4th){
  const pred=STATE.predictions[pid]||{};
  const ko=pred.ko||{};
  let pts=currentPts;

  // Pending group match pts
  MATCHES.forEach(m=>{
    if(playedIds.has(+m.id)) return;
    const a=sim.simA[m.id];
    if(a) pts+=_matchPts((pred.groups||{})[m.id],a.h,a.a);
  });

  // Group advancement: +8 per correctly predicted R32 qualifier
  predR32Teams.forEach(t=>{ if(t&&sim.r32Teams.has(t)) pts+=8; });

  // KO rounds
  [[sim.simKO.r32,ko.r32,10],[sim.simKO.r16,ko.r16,15],[sim.simKO.qf,ko.qf,20]]
    .forEach(([actual,pick,p])=>{
      if(!actual||!pick) return;
      Object.keys(actual).forEach(i=>{ if(actual[i]&&pick[String(i)]===actual[i]) pts+=p; });
    });

  // Clasificado a Final: +30 per correct finalist (via SF picks)
  const fins=[sim.simKO.final[0],sim.simKO.final[1]].filter(Boolean);
  const sfP=ko.sf||{};
  if(sfP[0]&&fins.includes(sfP[0])) pts+=30;
  if(sfP[1]&&fins.includes(sfP[1])) pts+=30;

  // Champion/Runner-up/3rd/4th
  if(sim.simKO.final[0]&&(ko.final||{})[0]===sim.simKO.final[0]) pts+=40;
  if(sim.simKO.final[1]&&(ko.final||{})[1]===sim.simKO.final[1]) pts+=30;
  if(sim.simKO.f3[0]&&(ko.f3||{})[0]===sim.simKO.f3[0]) pts+=20;
  if(pred4th&&sim.simKO.f3[1]===pred4th) pts+=10;

  return pts;
}

function runProbSimulation(pid,lgId){
  const N=5000, CHUNK=150;
  const lg=STATE.leagues.find(l=>l.id===lgId);
  const container=document.getElementById('prob-results-'+lgId);
  if(!container||!lg) return;

  const members=lg.memberIds
    .map(mid=>STATE.participants.find(x=>x.id===mid))
    .filter(p=>p&&!p.hidden);
  if(members.length<2){
    container.innerHTML=`<div style="text-align:center;padding:1.5rem;color:#667;font-size:.78rem">Se necesitan al menos 2 participantes.</div>`;
    return;
  }

  // Pre-compute per-participant data (done once, not inside simulation loop)
  const playedIds=new Set(MATCHES.filter(m=>{const a=(STATE.actuals||{})[m.id];return a&&a.h!==""&&a.a!=="";}).map(m=>+m.id));

  const memberData=members.map(p=>{
    const pred=STATE.predictions[p.id]||{};
    const ko=pred.ko||{};

    // Current confirmed score
    const currentPts=scoreFull(p.id);

    // Pre-compute predicted R32 teams from their group predictions
    let predR32Teams=new Set();
    try{
      const B=buildBracket(pred.groups||{},ko);
      if(B&&B.r32) B.r32.forEach(m=>{if(m.h)predR32Teams.add(m.h);if(m.a)predR32Teams.add(m.a);});
    }catch(e){}

    // Pre-compute predicted 4th place
    let pred4th=null;
    try{
      const B=buildBracket(pred.groups||{},ko);
      if(B&&B.f3&&(ko.f3||{})[0]){pred4th=B.f3.h===(ko.f3||{})[0]?B.f3.a:B.f3.h;}
    }catch(e){}

    return{...p,currentPts,predR32Teams,pred4th};
  });

  const rankCounts=members.map(()=>new Array(members.length).fill(0));
  let simsDone=0;

  function chunk(){
    const end=Math.min(simsDone+CHUNK,N);
    for(let s=simsDone;s<end;s++){
      const sim=_simFullTournament();
      if(!sim) continue;
      const scores=memberData.map(md=>
        _scoreOneSim(md.id,sim,md.currentPts,playedIds,md.predR32Teams,md.pred4th)
        +Math.random()*1e-5
      );
      const order=scores.map((sc,i)=>({sc,i})).sort((a,b)=>b.sc-a.sc);
      order.forEach(({i},rank)=>rankCounts[i][rank]++);
    }
    simsDone=end;
    const prog=document.getElementById('prob-prog-'+lgId);
    if(prog) prog.style.width=(simsDone/N*100)+'%';
    if(simsDone<N) setTimeout(chunk,0);
    else renderProbResults(members,rankCounts,N,pid,lgId);
  }
  setTimeout(chunk,0);
}

function adminToggleUserProb(pid){
  const p=STATE.participants.find(x=>x.id===pid);
  if(!p) return;

  // Determine if user currently has prob access (considering league)
  const userLeagues=STATE.leagues.filter(l=>(l.memberIds||[]).includes(pid));
  const leagueHasProb=userLeagues.some(l=>l.showProb);
  const currentlyHasAccess=p.showProb===true||(p.showProb!==false&&leagueHasProb);

  if(p.showProb===false){
    // Was explicitly blocked → restore to league default
    p.showProb=undefined;
    if(window._fbDB) window._fbDB.ref('q2026/participants/'+pid+'/showProb').set(null);
    showFlash('↩ PROB restaurado para '+p.name+' (sigue configuración de la liga)');
  } else if(currentlyHasAccess){
    // Has access → block
    p.showProb=false;
    if(window._fbDB) window._fbDB.ref('q2026/participants/'+pid+'/showProb').set(false);
    showFlash('🚫 PROB bloqueado para '+p.name);
  } else {
    // No access via league → explicitly enable
    p.showProb=true;
    if(window._fbDB) window._fbDB.ref('q2026/participants/'+pid+'/showProb').set(true);
    showFlash('🎲 PROB habilitado individualmente para '+p.name);
  }

  localStorage.setItem(LS,JSON.stringify(STATE));
  go('admin',{tab:'participants'});
}

function adminToggleAllAccess(enable){
  const label=enable?'habilitar acceso a TODOS':'BLOQUEAR acceso a todos';
  if(!confirm(`¿Confirmas que quieres ${label} los participantes?`)) return;

  _bulkWriteTimers.forEach(t=>clearTimeout(t));
  _bulkWriteTimers=[];

  const toUpdate=[];
  STATE.participants.forEach(p=>{
    if(p.paid!==enable){ p.paid=enable; toUpdate.push(p.id); }
  });

  if(toUpdate.length===0){
    showFlash(enable?'✅ Todos ya tienen acceso':'🔒 Todos ya están bloqueados');
    return;
  }

  // Save STATE locally first
  localStorage.setItem(LS,JSON.stringify(STATE));
  go('admin',{tab:'participants'});
  showFlash(enable
    ? `✅ Acceso habilitado para ${toUpdate.length} participante${toUpdate.length!==1?'s':''}`
    : `🔒 Acceso bloqueado para ${toUpdate.length} participante${toUpdate.length!==1?'s':''}`);

  // Single atomic Firebase update — writes all paid fields at once, triggers onValue only ONCE
  if(window._fbDB){
    const updates={};
    toUpdate.forEach(pid=>{ updates['participants/'+pid+'/paid']=enable; });
    window._fbDB.ref('q2026').update(updates);
  }
}

function userStatsTab(pid, myLeagues, selLgId){
  const statsLeagues=myLeagues.filter(l=>l.showStats);
  if(!statsLeagues.length) return "";

  const selLg=statsLeagues.find(l=>l.id===selLgId)||statsLeagues[0];
  const allPs=STATE.participants.filter(p=>!p.hidden);

  // League selector tabs
  let lgTabs="";
  if(statsLeagues.length>1){
    lgTabs="<div style='display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none'>"
      +statsLeagues.map(function(l){
        const on=l.id===selLg.id;
        return "<button onclick=\"go('myscore',{pid:'"+pid+"',subtab:'stats',statsLgId:'"+l.id+"'})\" style='flex-shrink:0;padding:5px 10px;border-radius:7px;border:1px solid "+(on?"rgba(255,200,0,.4)":"rgba(255,255,255,.1)")+";background:"+(on?"rgba(255,200,0,.12)":"rgba(255,255,255,.04)")+";color:"+(on?"#ffc800":"#889")+";font-size:.7rem;font-weight:"+(on?700:400)+";cursor:pointer;white-space:nowrap'>"+l.name+"</button>";
      }).join("")
    +"</div>";
  }

  // Filter submitted participants in selected league
  const members=selLg.memberIds.map(function(mid){return STATE.participants.find(function(x){return x.id===mid;});}).filter(Boolean);
  const sub=members.filter(function(p){return STATE.predictions[p.id]&&STATE.predictions[p.id].submitted;});

  // Match stats
  const actuals=STATE.actuals||{};
  const played=MATCHES.filter(function(m){const a=actuals[m.id];return a&&a.h!==""&&a.a!=="";});
  let totalExact=0,totalCorrect=0,totalMiss=0;
  sub.forEach(function(p){
    played.forEach(function(m){
      const pred2=(STATE.predictions[p.id].groups||{})[m.id];
      const ac=actuals[m.id];
      if(!pred2||pred2.h===""||!ac) return;
      if(+pred2.h===+ac.h&&+pred2.a===+ac.a) totalExact++;
      else{const r1=+pred2.h>+pred2.a?"H":+pred2.h<+pred2.a?"A":"D",r2=+ac.h>+ac.a?"H":+ac.h<+ac.a?"A":"D";if(r1===r2)totalCorrect++;else totalMiss++;}
    });
  });
  const totalPred=played.length*(sub.length||1);
  const pct=function(n,d){return d>0?Math.round(n/d*100):0;};

  // Champion/runner picks
  const champPicks={},runnerPicks={};
  sub.forEach(function(p){
    const ko=(STATE.predictions[p.id].ko||{});
    const c=(ko.final||{})[0];if(c)champPicks[c]=(champPicks[c]||0)+1;
    const sf0=(ko.sf||{})[0],sf1=(ko.sf||{})[1];
    const runner=(ko.final||{})[1]||(c&&sf0&&sf1?(c===sf0?sf1:c===sf1?sf0:null):null);
    if(runner)runnerPicks[runner]=(runnerPicks[runner]||0)+1;
  });
  const champRank=Object.entries(champPicks).sort(function(a,b){return b[1]-a[1];});
  const runnerRank=Object.entries(runnerPicks).sort(function(a,b){return b[1]-a[1];});
  const aKO=(actuals._ko)||{};
  const actualChamp=(aKO.final||{})[0]||null;
  const actualRunner=(aKO.final||{})[1]||null;

  let html=lgTabs;

  // Header
  html+="<div style='font-size:.6rem;letter-spacing:2px;color:#667;font-weight:700;margin-bottom:8px'>📊 ESTADÍSTICAS — "+selLg.name+"</div>";

  // Match stats block
  if(played.length){
    html+="<div style='background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:11px 13px;margin-bottom:8px'>"
      +"<div style='font-size:.65rem;color:#ffc800;font-weight:700;letter-spacing:.5px;margin-bottom:8px'>⚽ PARTIDOS JUGADOS ("+played.length+" de "+MATCHES.length+")</div>"
      +"<div style='display:flex;text-align:center'>"
        +"<div style='flex:1;border-right:1px solid rgba(255,255,255,.06);padding:.3rem 0'><div style='font-size:1.5rem;font-weight:800;color:#00c853'>"+totalExact+"</div><div style='font-size:.62rem;color:#4de0a0'>🎯 Exactos</div><div style='font-size:.58rem;color:#445'>"+pct(totalExact,totalPred)+"%</div></div>"
        +"<div style='flex:1;border-right:1px solid rgba(255,255,255,.06);padding:.3rem 0'><div style='font-size:1.5rem;font-weight:800;color:#0080ff'>"+totalCorrect+"</div><div style='font-size:.62rem;color:#88aaff'>✅ Resultados</div><div style='font-size:.58rem;color:#445'>"+pct(totalCorrect,totalPred)+"%</div></div>"
        +"<div style='flex:1;padding:.3rem 0'><div style='font-size:1.5rem;font-weight:800;color:#445'>"+totalMiss+"</div><div style='font-size:.62rem;color:#556'>❌ Fallos</div><div style='font-size:.58rem;color:#445'>"+pct(totalMiss,totalPred)+"%</div></div>"
      +"</div>"
      +"<div style='margin-top:8px;display:flex;border-radius:5px;overflow:hidden;height:5px;gap:1px'>"
        +"<div style='background:#00c853;width:"+pct(totalExact,totalPred)+"%'></div>"
        +"<div style='background:#0080ff;width:"+pct(totalCorrect,totalPred)+"%'></div>"
        +"<div style='background:rgba(255,255,255,.1);flex:1'></div>"
      +"</div>"
      +"<div style='font-size:.58rem;color:#445;margin-top:4px;text-align:center'>"+sub.length+" participantes × "+played.length+" partidos</div>"
    +"</div>";
  }

  // Per-participant stats (groups only)
  const ranked=sub.map(function(p){
    const pred=STATE.predictions[p.id]||{};
    var exact=0,correct=0,wrong=0,gpts=0;
    played.forEach(function(m){
      const pr=(pred.groups||{})[m.id],ac=actuals[m.id];
      if(!pr||pr.h===""||!ac) return;
      const ph=+pr.h,pa=+pr.a,ah=+ac.h,aa=+ac.a;
      if(ph===ah&&pa===aa){exact++;gpts+=5;}
      else{const pw=ph>pa?"h":pa>ph?"a":"d",aw=ah>aa?"h":aa>ah?"a":"d";if(pw===aw){correct++;gpts+=3;}else wrong++;}
    });
    const totalPts=lgScore(p.id);
    const tb=tiebreakScore(p.id);
    return {id:p.id,name:p.name,qn:(pred.quinName||p.name),exact:exact,correct:correct,wrong:wrong,gpts:tb.gpts,pts:tb.pts,submittedAt:tb.submittedAt};
  }).sort(cmpRank);

  // Tiebreaker: same method as lgScore ranking — pts desc, exact desc, correct desc, name asc
  function tiebreak(a,b){
    return cmpRank(a,b);
  }

  // Get all tied winners for each category
  function getTied(arr,sortFn,matchFn){
    const sorted=arr.slice().sort(sortFn);
    if(!sorted.length) return [];
    return sorted.filter(function(x){return matchFn(x,sorted[0]);});
  }

  const topPtsArr=getTied(ranked,tiebreak,function(x,b){return x.pts===b.pts;});
  const topExactArr=getTied(ranked,function(a,b){return b.exact-a.exact||tiebreak(a,b);},function(x,b){return x.exact===b.exact;});
  const played2=ranked.filter(function(p){return p.exact+p.correct+p.wrong>0;});
  const bottomPtsArr=getTied(played2,function(a,b){return a.pts-b.pts||a.exact-b.exact||a.correct-b.correct||a.name.localeCompare(b.name);},function(x,b){return x.pts===b.pts;}).filter(function(x){return topPtsArr.every(function(t){return t.id!==x.id;});});
  const mostWrongArr=getTied(ranked,function(a,b){return b.wrong-a.wrong||tiebreak(a,b);},function(x,b){return x.wrong===b.wrong&&x.wrong>0;});

  function nameList(arr){
    if(arr.length===1) return arr[0].name;
    return arr[0].name+"<span style='font-size:.72rem;font-weight:400;color:#667'> y "+(arr.length-1)+" m\u00e1s</span>";
  }

  function statCard(emoji,label,names,value,color){
    const isTie=names.includes(" & ");
    return "<div style='background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.7rem .8rem;display:flex;align-items:center;gap:.65rem'>"
      +"<span style='font-size:1.5rem;flex-shrink:0'>"+emoji+"</span>"
      +"<div style='flex:1;min-width:0'>"
        +"<div style='font-size:.65rem;color:#889;letter-spacing:.5px'>"+label+(isTie?" <span style='color:#667;font-weight:400'>(empate)</span>":"")+"</div>"
        +"<div style='font-size:.88rem;font-weight:700;color:"+(color||"#eee")+";overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+names+"</div>"
      +"</div>"
      +"<div style='font-size:1.1rem;font-weight:700;color:"+(color||"#ffc800")+";flex-shrink:0'>"+value+"</div>"
    +"</div>";
  }

  html+="<div style='font-size:.68rem;letter-spacing:2px;color:#ffc800;font-weight:700;margin:.5rem 0 .4rem'>✨ DESTACADOS</div>"
    +"<div style='display:flex;flex-direction:column;gap:.35rem;margin-bottom:.9rem'>"
    +(topPtsArr.length?statCard("🏆","Líder de la liga",nameList(topPtsArr),topPtsArr[0].pts+" pts","#ffc800"):"")
    +(topExactArr.length?statCard("⭐","Más marcadores exactos",nameList(topExactArr),topExactArr[0].exact+" exactos","#4de0a0"):"")
    +(bottomPtsArr.length?statCard("😬","Menos puntos (ánimo!)",nameList(bottomPtsArr),bottomPtsArr[0].pts+" pts","#ff8080"):"")
    +(mostWrongArr.length?statCard("🙈","Más resultados fallidos",nameList(mostWrongArr),mostWrongArr[0].wrong+" fallos","#ffaa44"):"")
  +"</div>";

  // ── KO round-by-round top/bottom ──
  (function(){
    const enabled3=(actuals._koEnabled)||{};
    const aKO3=aKO;
    const allGroupMs3=MATCHES.filter(function(m){return m.g!=="KO";});
    const groupsDone3=allGroupMs3.length>0&&allGroupMs3.every(function(m){var a=actuals[m.id];return a&&a.h!==""&&a.a!=="";});

    // Build per-participant per-round counts
    var roundDefs=[];

    // Clasif. 16vos (group stage → R32)
    if(enabled3.groupAdv&&groupsDone3){
      var aB3=null;try{aB3=buildBracket(actuals,{});}catch(e){}
      if(aB3){
        var actSet3=new Set(aB3.r32.flatMap(function(m){return [m.h,m.a];}).filter(Boolean));
        roundDefs.push({
          label:"Clasif. 16vos",total:32,
          score:function(p){
            var hit=0;try{var uB=buildBracket((STATE.predictions[p.id]||{}).groups||{},{});uB.r32.forEach(function(m){if(m.h&&actSet3.has(m.h))hit++;if(m.a&&actSet3.has(m.a))hit++;});}catch(e){}return hit;
          }
        });
      }
    }

    // R32 → Octavos
    if(enabled3.r32&&Object.keys(aKO3.r32||{}).length>0){
      var aR32=aKO3.r32||{},dec32=Object.keys(aR32).length;
      if(dec32>0) roundDefs.push({
        label:"Octavos",total:dec32,
        score:function(p){var actT=new Set(Object.values(aR32).filter(Boolean)),pkT=new Set(Object.values(((STATE.predictions[p.id]||{}).ko||{}).r32||{}).filter(Boolean)),h=0;actT.forEach(function(t){if(pkT.has(t))h++;});return h;}
      });
    }

    // R16 → Cuartos
    if(enabled3.r16&&Object.keys(aKO3.r16||{}).length>0){
      var aR16=aKO3.r16||{},dec16=Object.keys(aR16).length;
      if(dec16>0) roundDefs.push({
        label:"Cuartos",total:dec16,
        score:function(p){var actT=new Set(Object.values(aR16).filter(Boolean)),pkT=new Set(Object.values(((STATE.predictions[p.id]||{}).ko||{}).r16||{}).filter(Boolean)),h=0;actT.forEach(function(t){if(pkT.has(t))h++;});return h;}
      });
    }

    // QF → Semis
    if(enabled3.qf&&Object.keys(aKO3.qf||{}).length>0){
      var aQF=aKO3.qf||{},decQF=Object.keys(aQF).length;
      if(decQF>0) roundDefs.push({
        label:"Semis",total:decQF,
        score:function(p){var actT=new Set(Object.values(aQF).filter(Boolean)),pkT=new Set(Object.values(((STATE.predictions[p.id]||{}).ko||{}).qf||{}).filter(Boolean)),h=0;actT.forEach(function(t){if(pkT.has(t))h++;});return h;}
      });
    }

    // SF → Final
    if(enabled3.sf&&Object.keys(aKO3.sf||{}).length>0){
      var aSF=aKO3.sf||{},decSF=Object.keys(aSF).length;
      if(decSF>0) roundDefs.push({
        label:"Final",total:decSF,
        score:function(p){var actT=new Set(Object.values(aSF).filter(Boolean)),pkT=new Set(Object.values(((STATE.predictions[p.id]||{}).ko||{}).sf||{}).filter(Boolean)),h=0;actT.forEach(function(t){if(pkT.has(t))h++;});return h;}
      });
      // Champion
      var aC=aKO3.final?.[0];
      if(aC) roundDefs.push({
        label:"Campeón",total:1,
        score:function(p){var pC=(((STATE.predictions[p.id]||{}).ko||{}).final||{})[0];return pC===aC?1:0;}
      });
    }

    if(!roundDefs.length) return;

    // For each round, compute scores per participant
    var rows=roundDefs.map(function(rd){
      var scores=sub.map(function(p){return {id:p.id,name:p.name,hit:rd.score(p),total:rd.total};})
        .sort(function(a,b){return b.hit-a.hit||a.name.localeCompare(b.name);});
      var topHit=scores[0].hit,botHit=scores[scores.length-1].hit;
      var topArr=scores.filter(function(x){return x.hit===topHit;});
      var botArr=scores.filter(function(x){return x.hit===botHit;}).filter(function(x){return x.hit!==topHit||topArr.every(function(t){return t.id!==x.id;});});
      if(!botArr.length) botArr=[];
      return {label:rd.label,total:rd.total,topArr:topArr,topHit:topHit,botArr:botArr,botHit:botHit,scores:scores};
    });

    html+="<div style='font-size:.68rem;letter-spacing:2px;color:#88aaff;font-weight:700;margin:.5rem 0 .4rem'>⚡ CLASIFICADOS POR RONDA</div>"
      +"<div style='display:flex;flex-direction:column;gap:.35rem;margin-bottom:.9rem'>";

    rows.forEach(function(rd){
      function nL(arr){return arr.length===1?arr[0].name:arr[0].name+"<span style='font-size:.72rem;font-weight:400;color:#667'> y "+(arr.length-1)+" m\u00e1s</span>";}
      // top card
      if(rd.topArr.length) html+=statCard("🎯",rd.label+" · Más aciertos",nL(rd.topArr),rd.topHit+"/"+rd.total,"#4de0a0");
      // bottom card (only if different from top)
      if(rd.botArr.length&&rd.botHit!==rd.topHit) html+=statCard("⬇️",rd.label+" · Menos aciertos",nL(rd.botArr),rd.botHit+"/"+rd.total,"#ff8080");
    });

    html+="</div>";
  })();

  // Hot matches consensus (last 6 played)
  const hotMatches=played.slice(-6).map(function(m){
    const ac=actuals[m.id];const sc={};
    sub.forEach(function(p){const pr=(STATE.predictions[p.id].groups||{})[m.id];if(pr&&pr.h!=="")sc[pr.h+"-"+pr.a]=(sc[pr.h+"-"+pr.a]||0)+1;});
    const top=Object.entries(sc).sort(function(a,b){return b[1]-a[1];})[0];
    return {m:m,ac:ac,topPred:top?top[0]:null,topN:top?top[1]:0};
  }).filter(function(x){return x.topPred;});

  // Crybaby block
  const crybabies2=Array.isArray(selLg.crybabies)?selLg.crybabies:selLg.crybaby?[selLg.crybaby]:[];
  const cryPs=crybabies2.map(function(cid){return STATE.participants.find(function(x){return x.id===cid;});}).filter(Boolean);

  // Full ranking table
  if(ranked.length){
    const medals2=["🥇","🥈","🥉"];
    html+="<div style='font-size:.68rem;letter-spacing:2px;color:#ffc800;font-weight:700;margin:.5rem 0 .4rem'>📊 TABLA COMPLETA ("+played.length+" partidos jugados)</div>"
      +"<div style='background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin-bottom:.9rem'>"
        +"<div style='display:grid;grid-template-columns:28px 1fr 38px 38px 38px 48px;gap:0;padding:.4rem .6rem;background:rgba(255,200,0,.08);font-size:.6rem;color:#ffc800;font-weight:700;letter-spacing:.5px'>"
          +"<span>#</span><span>PARTICIPANTE</span><span style='text-align:center'>⭐</span><span style='text-align:center'>✓</span><span style='text-align:center'>✗</span><span style='text-align:right'>PTS</span>"
        +"</div>"
        +ranked.map(function(p,i){
          const isMe=p.id===pid;
          return "<div style='display:grid;grid-template-columns:28px 1fr 38px 38px 38px 48px;gap:0;padding:.45rem .6rem;border-top:1px solid rgba(255,255,255,.05);background:"+(isMe?"rgba(255,200,0,.06)":i===0?"rgba(255,200,0,.03)":"none")+"'>"
            +"<span style='font-size:"+(i<3?"1rem":".75rem")+"'>"+(medals2[i]||"#"+(i+1))+"</span>"
            +"<div style='min-width:0'>"
              +"<div style='font-size:.8rem;font-weight:"+(isMe||i===0?700:500)+";color:"+(isMe?"#ffc800":i===0?"#ffc800":"#eee")+";overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+p.name+(isMe?" ←":"")+"</div>"
              +(p.qn&&p.qn!==p.name?"<div style='font-size:.6rem;color:#556;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>\""+p.qn+"\"</div>":"<div style='font-size:.6rem;color:#667'>&nbsp;</div>")
            +"</div>"
            +"<span style='text-align:center;font-size:.8rem;color:#4de0a0;font-weight:700'>"+p.exact+"</span>"
            +"<span style='text-align:center;font-size:.8rem;color:#88aaff'>"+p.correct+"</span>"
            +"<span style='text-align:center;font-size:.8rem;color:#f77'>"+p.wrong+"</span>"
            +"<span style='text-align:right;font-size:.95rem;font-weight:700;color:"+(isMe||i===0?"#ffc800":"#aab")+"'>"+p.pts+"</span>"
          +"</div>";
        }).join("")
      +"</div>";
  }

  // Consensus vs result (last 6 matches)
  if(hotMatches.length){
    html+="<div style='font-size:.68rem;letter-spacing:2px;color:#ffc800;font-weight:700;margin:.5rem 0 .4rem'>🎯 CONSENSO VS RESULTADO (últimos partidos)</div>"
      +"<div style='display:flex;flex-direction:column;gap:.3rem;margin-bottom:.9rem'>"
      +hotMatches.map(function(x){
        const hit=x.topPred===x.ac.h+"-"+x.ac.a;
        const pctN=Math.round(x.topN/sub.length*100);
        return "<div style='display:flex;align-items:center;gap:.5rem;padding:.4rem .65rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;font-size:.75rem'>"
          +"<div style='flex:1;min-width:0'>"
            +"<div style='font-weight:600;color:#eee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+f(x.m.h)+" "+trunc(x.m.h,8)+" vs "+trunc(x.m.a,8)+" "+f(x.m.a)+"</div>"
            +"<div style='font-size:.65rem;color:#889;margin-top:.1rem'>Más votado: <strong style=\"color:#eee\">"+x.topPred+"</strong> ("+pctN+"%) · Real: <strong style=\"color:"+(hit?"#4de0a0":"#ff8080")+"\">"+x.ac.h+"-"+x.ac.a+"</strong></div>"
          +"</div>"
          +"<span style='font-size:1rem'>"+(hit?"✅":"❌")+"</span>"
        +"</div>";
      }).join("")
      +"</div>";
  }

  // Crybaby card
  if(cryPs.length){
    const edition=cryPs.length>1?"TEAM LLORÓN":"EL QUE MÁS LLORA";
    const names=cryPs.map(function(p){return "<div style='text-align:center'><div style='font-size:2rem'>😭</div><div style='font-size:.85rem;font-weight:700;color:#a5b4fc'>"+p.name+"</div></div>";}).join("");
    html+="<div style='border-radius:12px;border:2px dashed rgba(99,102,241,.4);padding:.8rem;text-align:center;animation:pulse-bg 2s ease-in-out infinite'>"
      +"<div style='font-size:.6rem;letter-spacing:2px;color:#818cf8;font-weight:700;margin-bottom:.4rem'>🏆 PREMIO ESPECIAL</div>"
      +"<div style='display:flex;justify-content:center;gap:.8rem;flex-wrap:wrap;margin:.2rem 0 .4rem'>"+names+"</div>"
      +"<div style='font-size:.68rem;color:#6366f1;font-weight:600'>"+edition+"</div>"
    +"</div>";
  }

  if(!played.length) html+="<div style='text-align:center;font-size:.75rem;color:#445;padding:1rem'>Las estadísticas aparecerán cuando empiece el torneo.</div>";

  return html;
}

// ── PDF GENERATION (2 pages, landscape A4) ─────────────
function buildPDFDoc(pid){
  if(!window.jspdf?.jsPDF) return null;
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
  buildParticipantPages(doc, pid, true);
  return doc;
}

// Adds participant's 2 pages into an existing jsPDF doc
function buildParticipantPages(doc, pid, isFirstPage){
  const p=STATE.participants.find(x=>x.id===pid);
  if(!p) return;
  const pred=STATE.predictions[pid]||{};
  if(!pred.groups) pred.groups={};
  if(!pred.ko) pred.ko={};
  const W=297,H=210,M=8;

  const submittedAt=pred.submittedAt?new Date(pred.submittedAt):null;
  const submitStr=submittedAt
    ? "Enviada: "+submittedAt.toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"})
      +" "+submittedAt.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})
    : "Borrador — "+new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"});

  const bg=(r,g,b)=>doc.setFillColor(r,g,b);
  const col=(r,g,b)=>doc.setTextColor(r,g,b);
  const font=(style,size)=>{doc.setFont("helvetica",style);doc.setFontSize(size)};
  const ln=(x1,y1,x2,y2,r,g,b,w=.3)=>{
    doc.setDrawColor(r,g,b);doc.setLineWidth(w);doc.line(x1,y1,x2,y2);
  };

  // ── PAGE 1 — GROUPS ──
  if(!isFirstPage) doc.addPage();
  bg(255,255,255);doc.rect(0,0,W,H,"F");
  bg(10,20,50);doc.rect(0,0,W,11,"F");
  col(255,200,0);font("bold",9);
  doc.text("QUINIELA FIFA WORLD CUP 2026",M,7.5);
  col(255,255,255);font("normal",7);
  doc.text(p.name.toUpperCase(),W-M,7.5,{align:"right"});
  bg(255,200,0);doc.rect(0,11,W,1.5,"F");

  const GKEYS=Object.keys(GROUPS);
  const cols4=4, gColW=(W-M*2-6)/cols4, gStartY=15, mH=5;

  GKEYS.forEach((gk,gi)=>{
    const col4=gi%cols4, row3=Math.floor(gi/cols4);
    const gx=M+col4*(gColW+2);
    const gm=MATCHES.filter(m=>m.g===gk);
    const st=calcStandings(gk,pred.groups||{});
    const stRows=4;
    const blockH=6+gm.length*mH+1+(stRows+1)*4.2;
    const gy=gStartY+row3*(blockH+3);

    bg(10,20,50);doc.rect(gx,gy,gColW,6.5,"F");
    bg(255,200,0);doc.rect(gx,gy,2.5,6.5,"F");
    col(255,255,255);font("bold",6.5);
    doc.text("GRUPO "+gk,gx+4,gy+4.4);

    gm.forEach((m,mi)=>{
      const my=gy+6.5+mi*mH;
      bg(mi%2===0?248:240, mi%2===0?249:242, mi%2===0?252:248);
      doc.rect(gx,my,gColW,mH,"F");
      ln(gx,my,gx+gColW,my,200,200,200,.2);
      col(20,30,60);font("normal",4.5);
      doc.text(trunc(m.h,10),gx+1.2,my+3.4,{maxWidth:gColW*0.37});
      doc.text(trunc(m.a,10),gx+gColW-1.2,my+3.4,{align:"right",maxWidth:gColW*0.37});
      const sc=pred.groups?.[m.id];
      if(sc&&sc.h!==""&&sc.a!==""){
        bg(10,20,50);doc.roundedRect(gx+gColW/2-6,my+.6,12,mH-1.2,1.5,1.5,"F");
        col(255,200,0);font("bold",5.5);
        doc.text(sc.h+":"+sc.a,gx+gColW/2,my+3.6,{align:"center"});
      } else {
        col(160,170,190);font("normal",3.8);
        doc.text(m.date||"?",gx+gColW/2,my+3.2,{align:"center"});
      }
    });

    const stY=gy+6.5+gm.length*mH+1;
    bg(230,235,245);doc.rect(gx,stY,gColW,4,"F");
    col(60,80,130);font("bold",3.5);
    doc.text("#",gx+1.2,stY+2.8);
    doc.text("EQUIPO",gx+4.5,stY+2.8);
    doc.text("PJ",gx+gColW-10,stY+2.8,{align:"center"});
    doc.text("PTS",gx+gColW-5.5,stY+2.8,{align:"center"});
    doc.text("DG",gx+gColW-1,stY+2.8,{align:"right"});
    st.forEach((r,ri)=>{
      const ry=stY+4+ri*4.2;
      bg(ri<2?232:248, ri<2?248:248, ri<2?238:248);
      doc.rect(gx,ry,gColW,4.2,"F");
      if(ri<2){bg(0,180,80);doc.rect(gx,ry,1.5,4.2,"F")}
      col(ri<2?10:60, ri<2?80:80, ri<2?30:120);
      font(ri<2?"bold":"normal",3.8);
      doc.text(String(ri+1),gx+2,ry+3);
      doc.text(trunc(r.n,11),gx+4.5,ry+3);
      col(ri<2?10:80, ri<2?80:80, ri<2?30:120);
      doc.text(String(r.pj),gx+gColW-10,ry+3,{align:"center"});
      col(ri<2?180:60, ri<2?20:80, ri<2?20:120);
      font("bold",3.8);
      doc.text(String(r.pts),gx+gColW-5.5,ry+3,{align:"center"});
      col(80,80,80);font("normal",3.5);
      doc.text((r.dg>0?"+":"")+r.dg,gx+gColW-1,ry+3,{align:"right"});
      ln(gx,ry+4.2,gx+gColW,ry+4.2,210,215,225,.15);
    });
  });

  bg(10,20,50);doc.rect(0,H-5,W,5,"F");
  col(180,190,210);font("normal",4);
  doc.text(p.name+"  |  Quiniela FIFA World Cup 2026  |  "+submitStr,W/2,H-1.8,{align:"center"});

  // ── PAGE 2 — BRACKET ──
  doc.addPage();
  bg(255,255,255);doc.rect(0,0,W,H,"F");
  bg(10,20,50);doc.rect(0,0,W,11,"F");
  col(255,200,0);font("bold",9);
  doc.text("FASE ELIMINATORIA — BRACKET",M,7.5);
  col(255,255,255);font("normal",7);
  doc.text(p.name.toUpperCase(),W-M,7.5,{align:"right"});
  bg(255,200,0);doc.rect(0,11,W,1.5,"F");

  const B=buildBracket(pred.groups||{},pred.ko||{});
  const bTop=15, bBot=H-8, bH2=bBot-bTop;
  const ncols=9, bCW=(W-M*2)/ncols;
  const TH2=7.5, TW2=bCW-2.5, mH2=TH2*2+2.5;

  function colX(c){return M+c*bCW+1;}
  function mY(idx,total){return bTop+(bH2/total)*(idx+0.5)-mH2/2;}

  function drawBM(rid,mid,bx,by,th,ta,winner){
    const hw=winner===th&&th, aw=winner===ta&&ta;
    const hasH=!!th, hasA=!!ta;
    if(hw){bg(0,140,60);}else if(hasH){bg(240,245,255);}else{bg(245,245,245);}
    doc.rect(bx,by,TW2,TH2,"F");
    col(hw?255:hasH?10:140, hw?255:hasH?25:145, hw?255:hasH?70:165);
    font(hw?"bold":"normal",4.5);
    doc.text(trunc(th||"TBD",10),bx+1.2,by+TH2/2+1.6,{maxWidth:TW2-1.5});
    if(hw){col(255,255,255);font("bold",5.5);doc.text("✓",bx+TW2-2.5,by+TH2/2+1.6,{align:"right"});}
    ln(bx,by+TH2,bx+TW2,by+TH2,190,200,220,.3);
    if(aw){bg(0,140,60);}else if(hasA){bg(250,252,255);}else{bg(245,245,245);}
    doc.rect(bx,by+TH2+.5,TW2,TH2,"F");
    col(aw?255:hasA?10:140, aw?255:hasA?25:145, aw?255:hasA?70:165);
    font(aw?"bold":"normal",4.5);
    doc.text(trunc(ta||"TBD",10),bx+1.2,by+TH2+.5+TH2/2+1.6,{maxWidth:TW2-1.5});
    if(aw){col(255,255,255);font("bold",5.5);doc.text("✓",bx+TW2-2.5,by+TH2+.5+TH2/2+1.6,{align:"right"});}
    const brd=winner?[255,180,0]:[180,190,210];
    doc.setDrawColor(...brd);doc.setLineWidth(winner?.5:.2);doc.rect(bx,by,TW2,mH2);
  }

  const lbls2={r32:"16VOS",r16:"OCTAVOS",qf:"CUARTOS",sf:"SEMIS"};
  function roundLabel(txt,x,y){col(10,20,50);font("bold",4.5);doc.text(txt,x,y,{align:"center"});}

  const leftR32order=[1,4,0,2,10,11,8,9];
  const rightR32order=[3,5,6,7,13,15,12,14];
  const leftRounds=[
    {rid:"r32",ms:leftR32order.map(i=>B.r32[i]),ws:B.r32w,n:8,c:0},
    {rid:"r16",ms:[B.r16[0],B.r16[1],B.r16[4],B.r16[5]],ws:B.r16w,n:4,c:1},
    {rid:"qf", ms:[B.qf[0],B.qf[2]],ws:B.qfw,n:2,c:2},
    {rid:"sf", ms:B.sf.slice(0,1),ws:B.sfw,n:1,c:3},
  ];
  const rightRounds=[
    {rid:"r32",ms:rightR32order.map(i=>B.r32[i]),ws:B.r32w,n:8,c:8},
    {rid:"r16",ms:[B.r16[2],B.r16[3],B.r16[6],B.r16[7]],ws:B.r16w,n:4,c:7},
    {rid:"qf", ms:[B.qf[1],B.qf[3]],ws:B.qfw,n:2,c:6},
    {rid:"sf", ms:B.sf.slice(1,2),ws:B.sfw,n:1,c:5},
  ];

  [...leftRounds,...rightRounds].forEach(({rid,ms,ws,n,c})=>{
    const x=colX(c);
    roundLabel(lbls2[rid]||rid,x+TW2/2,bTop-1);
    ms.forEach((m,i)=>{const y=mY(i,n);drawBM(rid,m.id,x,y,m.h,m.a,ws[m.id]||null);});
  });

  for(let ri=0;ri<leftRounds.length-1;ri++){
    const cur=leftRounds[ri],nxt=leftRounds[ri+1];
    for(let i=0;i<cur.n;i+=2){
      const y0=mY(i,cur.n)+mH2/2,y1=mY(i+1,cur.n)+mH2/2,yn=mY(i/2,nxt.n)+mH2/2;
      const x0=colX(cur.c)+TW2,x1=colX(nxt.c),mx=(x0+x1)/2;
      doc.setDrawColor(150,170,210);doc.setLineWidth(.25);
      doc.lines([[mx-x0,0],[0,yn-y0]],x0,y0);
      doc.lines([[mx-x0,0],[0,yn-y1]],x0,y1);
      doc.line(mx,yn,x1,yn);
    }
  }
  for(let ri=0;ri<rightRounds.length-1;ri++){
    const cur=rightRounds[ri],nxt=rightRounds[ri+1];
    for(let i=0;i<cur.n;i+=2){
      const y0=mY(i,cur.n)+mH2/2,y1=mY(i+1,cur.n)+mH2/2,yn=mY(i/2,nxt.n)+mH2/2;
      const x0=colX(cur.c),x1=colX(nxt.c)+TW2,mx=(x0+x1)/2;
      doc.setDrawColor(150,170,210);doc.setLineWidth(.25);
      doc.lines([[mx-x0,0],[0,yn-y0]],x0,y0);
      doc.lines([[mx-x0,0],[0,yn-y1]],x0,y1);
      doc.line(mx,yn,x1,yn);
    }
  }

  const cx=colX(4),finY=bTop+bH2*0.12,f3Y=bTop+bH2*0.58;
  roundLabel("FINAL",cx+TW2/2,bTop-1);
  drawBM("final",0,cx,finY,B.fin.h,B.fin.a,B.finw[0]||null);
  col(120,80,20);font("bold",4.5);
  doc.text("3ER LUGAR",cx+TW2/2,f3Y-1.5,{align:"center"});
  drawBM("f3",0,cx,f3Y,B.f3.h,B.f3.a,B.f3w[0]||null);

  doc.setDrawColor(150,170,210);doc.setLineWidth(.25);
  doc.line(colX(3)+TW2,mY(0,1)+mH2/2,cx,finY+TH2/2);
  doc.line(colX(5),mY(0,1)+mH2/2,cx+TW2,finY+TH2+.5+TH2/2);

  const chY=finY+mH2+3;
  if(B.champion){
    bg(10,20,50);doc.roundedRect(cx-1,chY,TW2+2,14,2,2,"F");
    doc.setDrawColor(255,200,0);doc.setLineWidth(.6);doc.roundedRect(cx-1,chY,TW2+2,14,2,2);
    col(255,200,0);font("bold",5.5);
    doc.text("CAMPEON DEL MUNDO",cx+TW2/2,chY+5.5,{align:"center"});
    col(255,255,255);font("bold",7);
    doc.text(trunc(B.champion,12),cx+TW2/2,chY+11.5,{align:"center"});
  } else {
    bg(240,245,255);doc.roundedRect(cx-1,chY,TW2+2,14,2,2,"F");
    doc.setDrawColor(180,200,240);doc.setLineWidth(.3);doc.roundedRect(cx-1,chY,TW2+2,14,2,2);
    col(150,170,200);font("normal",5);
    doc.text("CAMPEON",cx+TW2/2,chY+8,{align:"center"});
  }

  bg(10,20,50);doc.rect(0,H-5,W,5,"F");
  col(180,190,210);font("normal",4);
  doc.text(p.name+"  |  Quiniela FIFA World Cup 2026  |  "+submitStr,W/2,H-1.8,{align:"center"});
}

// ── LEAGUE PDF: All participants in one file ─────────────
function generateLeaguePDF(lid){
  if(!window.jspdf?.jsPDF){alert("PDF no disponible. Recarga la página.");return;}
  const lg=STATE.leagues.find(l=>l.id===lid);
  if(!lg){alert("Liga no encontrada.");return;}
  const {jsPDF}=window.jspdf;
  const members=lg.memberIds
    .map(pid=>STATE.participants.find(x=>x.id===pid))
    .filter(p=>p&&!p.hidden);
  if(members.length===0){alert("No hay participantes en esta liga.");return;}

  const W=297,H=210;
  const doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});

  // ── COVER PAGE ──
  doc.setFillColor(10,20,50);doc.rect(0,0,W,H,"F");
  // Gold bar
  doc.setFillColor(255,200,0);doc.rect(0,H*0.38,W,2,"F");
  doc.setFillColor(255,200,0);doc.rect(0,H*0.62,W,2,"F");
  // Title
  doc.setTextColor(255,200,0);doc.setFont("helvetica","bold");doc.setFontSize(22);
  doc.text("QUINIELA FIFA WORLD CUP 2026",W/2,H*0.3,{align:"center"});
  // League name
  doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(16);
  doc.text(lg.name.toUpperCase(),W/2,H*0.5,{align:"center"});
  // Subtitle
  doc.setTextColor(150,170,200);doc.setFont("helvetica","normal");doc.setFontSize(9);
  doc.text(members.length+" participante"+(members.length!==1?"s":"")+"  ·  Generado: "
    +new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"long",year:"numeric"}),
    W/2,H*0.68,{align:"center"});
  // Participant index — dynamic layout to fit all
  const listStartY=H*0.74, listEndY=H-8, availH=listEndY-listStartY;
  // Determine columns and font based on participant count
  let numCols=3, listFontSize=7.5, rowH=8;
  if(members.length>30){numCols=4;listFontSize=6;rowH=6.5;}
  else if(members.length>18){numCols=4;listFontSize=6.5;rowH=7;}
  const rowsPerPage=Math.floor(availH/rowH);
  const perPage=numCols*rowsPerPage;

  doc.setTextColor(180,190,210);doc.setFont("helvetica","normal");doc.setFontSize(listFontSize);
  const colWL=W/numCols;

  members.forEach((p,i)=>{
    // If this participant goes on an overflow page
    if(i>0 && i%perPage===0){
      doc.addPage();
      doc.setFillColor(10,20,50);doc.rect(0,0,W,H,"F");
      doc.setFillColor(255,200,0);doc.rect(0,H*0.38,W,2,"F");
      doc.setFillColor(255,200,0);doc.rect(0,H*0.62,W,2,"F");
      doc.setTextColor(255,200,0);doc.setFont("helvetica","bold");doc.setFontSize(11);
      doc.text(lg.name.toUpperCase()+" — PARTICIPANTES (cont.)",W/2,H*0.3,{align:"center"});
      doc.setFillColor(0,0,0);doc.rect(0,H-6,W,6,"F");
      doc.setTextColor(100,120,160);doc.setFont("helvetica","normal");doc.setFontSize(4.5);
      doc.text("Quiniela FIFA World Cup 2026  ·  Documento de constancia  ·  "+lg.name,W/2,H-2,{align:"center"});
      doc.setTextColor(180,190,210);doc.setFont("helvetica","normal");doc.setFontSize(listFontSize);
    }
    const pageIdx=i%perPage;
    const cx=(pageIdx%numCols)*colWL+colWL/2;
    const cy=listStartY+Math.floor(pageIdx/numCols)*rowH;
    doc.text((i+1)+". "+p.name,cx,cy,{align:"center",maxWidth:colWL-6});
  });
  // Footer
  doc.setFillColor(0,0,0);doc.rect(0,H-6,W,6,"F");
  doc.setTextColor(100,120,160);doc.setFont("helvetica","normal");doc.setFontSize(4.5);
  doc.text("Quiniela FIFA World Cup 2026  ·  Documento de constancia  ·  "+lg.name,W/2,H-2,{align:"center"});

  // ── ONE PARTICIPANT PER 2 PAGES ──
  members.forEach((p,idx)=>{
    try{ buildParticipantPages(doc, p.id, false); }
    catch(e){ console.warn("PDF error for",p.name,e); }
  });

  const safeName=(lg.name||"liga").toLowerCase().replace(/[^a-z0-9]/gi,"-").replace(/-+/g,"-");
  doc.save("quiniela-liga-"+safeName+".pdf");
}

function genPDF(pid){
  const doc=buildPDFDoc(pid);
  if(!doc){alert("PDF no disponible. Recarga la página.");return;}
  const p=STATE.participants.find(x=>x.id===pid);
  doc.save(`quiniela-2026-${p.name.toLowerCase().replace(/\s+/g,"-")}.pdf`);
}

renderApp();

// ── iOS install prompt ──
window.addEventListener("load",function(){
  const isIos=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.matchMedia("(display-mode:standalone)").matches||window.navigator.standalone;
  const dismissed=localStorage.getItem("pwa-prompt-dismissed");
  if(isIos&&!isStandalone&&!dismissed){
    const banner=document.createElement("div");
    banner.id="ios-install-banner";
    banner.style.cssText="position:fixed;bottom:0;left:0;right:0;background:#1a2236;border-top:1px solid rgba(255,200,0,.3);padding:.8rem 1rem;z-index:1000;display:flex;align-items:center;gap:.7rem;font-family:Arial,sans-serif";
    banner.innerHTML=`
      <span style="font-size:1.6rem">⚽</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:.82rem;font-weight:700;color:#ffc800">Agregar a pantalla de inicio</div>
        <div style="font-size:.7rem;color:#aaa">Toca <strong style="color:#fff">Compartir</strong> 
        <span style="font-size:.85rem">⬆️</span> y luego <strong style="color:#fff">"Agregar a inicio"</strong></div>
      </div>
      <button onclick="document.getElementById('ios-install-banner').remove();localStorage.setItem('pwa-prompt-dismissed','1')"
        style="background:none;border:none;color:#aaa;font-size:1.2rem;cursor:pointer;padding:0;width:auto;flex-shrink:0">✕</button>
    `;
    document.body.appendChild(banner);
  }
});
